version: '3.8'

services:
  tinytuya-controller:
    build: .
    container_name: tinytuya-controller
    restart: unless-stopped
    
    # 使用 host 网络模式，确保能访问局域网内的涂鸦设备
    network_mode: host
    
    environment:
      # MQTT 配置（外网服务器）
      - MQTT_HOST=8.134.248.240
      - MQTT_PORT=1883
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=mms6332628
      - MQTT_CLIENT_ID=tinytuya-mqtt-tiangong
      
      # ===== 网关配置 =====
      # 网关1（包房）
      - GATEWAY_1_IP=${GATEWAY_1_IP:-192.168.110.10}
      - GATEWAY_1_KEY=${GATEWAY_1_KEY:-k[BxEj?<'^;cu|]1}
      
      # 网关2（新增时取消注释并配置）
      # - GATEWAY_2_IP=${GATEWAY_2_IP:-192.168.110.11}
      # - GATEWAY_2_KEY=${GATEWAY_2_KEY:-新的local_key}
      
      # 更多网关继续添加...
      # - GATEWAY_3_IP=...
      # - GATEWAY_3_KEY=...
    
    volumes:
      - ./logs:/app/logs
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"