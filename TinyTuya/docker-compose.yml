version: '3.8'

services:
  tinytuya-controller:
    build: .
    container_name: tinytuya-controller
    restart: unless-stopped
    
    # 使用 host 网络模式，确保能访问局域网内的涂鸦设备
    network_mode: host
    
    environment:
      # MQTT 配置（外网服务器）
      - MQTT_HOST=8.134.248.240
      - MQTT_PORT=1883
      - MQTT_USERNAME=admin
      - MQTT_PASSWORD=mms6332628
      - MQTT_CLIENT_ID=tinytuya-mqtt-tiangong
      
      # 涂鸦设备配置（所有设备共享）
      - TUYA_LOCAL_KEY=k[BxEj?<'^;cu|]1
      - GATEWAY_IP=${GATEWAY_IP:-}
    
    volumes:
      - ./logs:/app/logs
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"