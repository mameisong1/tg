<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乐捐管理 - 天宫国际后台</title>
  <script src="js/time-util.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 220px; background: rgba(20,20,30,0.8); border-right: 1px solid rgba(218,165,32,0.1); padding: 20px 0; flex-shrink: 0; overflow-y: auto; height: 100vh; position: sticky; top: 0; }
    .sidebar-logo { padding: 0 20px 30px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .sidebar-logo img { width: 32px; height: 32px; filter: sepia(60%) saturate(200%) hue-rotate(10deg); }
    .sidebar-title { font-size: 16px; color: #d4af37; }
    .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: all 0.2s; cursor: pointer; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .nav-icon { font-size: 18px; }
    
    .nav-group { border-bottom: 1px solid rgba(255,255,255,0.03); }
    .nav-group-title { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .nav-group-title:hover { background: rgba(212,175,55,0.05); color: rgba(255,255,255,0.8); }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    .nav-submenu { display: none; background: rgba(0,0,0,0.2); }
    .nav-group.open .nav-submenu { display: block; }
    .nav-submenu .nav-item { padding-left: 48px; font-size: 13px; }
    
    /* Main Content */
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }
    .logout-btn { padding: 8px 16px; background: transparent; border: 1px solid rgba(231,76,60,0.3); border-radius: 8px; color: #e74c3c; font-size: 13px; cursor: pointer; }
    
    /* Filter Bar */
    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
    .filter-bar select, .filter-bar input {
      padding: 8px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; color: #fff; font-size: 13px;
    }
    .filter-bar select option { background: #1a1a2e; color: #fff; }
    
    /* Table */
    .data-table { width: 100%; background: rgba(20,20,30,0.6); border-radius: 12px; border: 1px solid rgba(218,165,32,0.1); overflow: hidden; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 12px 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    .data-table th { background: rgba(212,175,55,0.1); font-weight: 500; color: rgba(255,255,255,0.7); white-space: nowrap; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }
    
    /* Buttons */
    .btn { padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer; border: none; transition: all 0.2s; white-space: nowrap; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-danger { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
    .btn-success { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
    .btn-sm { padding: 5px 10px; font-size: 11px; }
    
    /* Badge */
    .badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-pending { background: rgba(241,196,15,0.2); color: #f1c40f; }
    .badge-active { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .badge-returned { background: rgba(46,204,113,0.2); color: #2ecc71; }
    
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1001; display: none; }
    .toast.show { display: block; animation: fadeOut 3s forwards; }
    @keyframes fadeOut { 0%, 70% { opacity: 1; } 100% { opacity: 0; } }
    
    .empty { text-align: center; padding: 40px; color: rgba(255,255,255,0.3); font-size: 14px; }
    
    .stats-row { display: flex; gap: 16px; margin-bottom: 20px; }
    .stat-card { flex: 1; background: rgba(20,20,30,0.6); border-radius: 10px; padding: 14px; border: 1px solid rgba(218,165,32,0.1); text-align: center; }
    .stat-num { font-size: 24px; font-weight: 600; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 4px; }
    .stat-active .stat-num { color: #e74c3c; }
    .stat-pending .stat-num { color: #f1c40f; }
    .stat-returned .stat-num { color: #2ecc71; }
    
    .hint-banner { background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; }
    .hint-banner .hint-title { font-size: 14px; color: #d4af37; font-weight: 600; }
    .hint-banner .hint-text { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 4px; display: block; line-height: 1.5; }
    
    .proof-thumb { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; cursor: pointer; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="/assets/logo.png" alt="Logo" onerror="this.style.display='none'">
      <div>
        <div class="sidebar-title">天宫国际</div>
        <div class="sidebar-sub">后台管理系统</div>
      </div>
    </div>
    
    <a href="index.html" class="nav-item"><span class="nav-icon">📊</span> 数据概览</a>
    
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">💰</span><span class="group-text">收银管理</span><span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="cashier-dashboard.html" class="nav-item">收银看板</a>
        <a href="products.html" class="nav-item">商品管理</a>
        <a href="vip-rooms.html" class="nav-item">包房管理</a>
        <a href="tables.html" class="nav-item">台桌管理</a>
        <a href="categories.html" class="nav-item">商品分类</a>
      </div>
    </div>
    
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">👩</span><span class="group-text">助教管理</span><span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="coaches.html" class="nav-item">助教列表</a>
        <a href="lejuan-records.html" class="nav-item active">🎱 乐捐管理</a>
      </div>
    </div>
    
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">⚙️</span><span class="group-text">系统设置</span><span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="operation-logs.html" class="nav-item">操作日志</a>
        <a href="home.html" class="nav-item">首页配置</a>
        <a href="users.html" class="nav-item">用户管理</a>
        <a href="settings.html" class="nav-item">系统配置</a>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <h1 class="page-title">🎱 乐捐管理</h1>
      <button class="logout-btn" onclick="doLogout()">退出登录</button>
    </div>

    <!-- 流程提示栏 -->
    <div class="hint-banner">
      <div class="hint-title">📌 乐捐管理流程</div>
      <div class="hint-text">助教提交预约 → 到时间自动生效（当前小时提交立即生效） → 助教回店后点击「乐捐归来」计算外出小时数 → 恢复水牌为空闲</div>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-row" id="statsRow">
      <div class="stat-card stat-active">
        <div class="stat-num" id="statActive">0</div>
        <div class="stat-label">乐捐中</div>
      </div>
      <div class="stat-card stat-pending">
        <div class="stat-num" id="statPending">0</div>
        <div class="stat-label">待出发</div>
      </div>
      <div class="stat-card stat-returned">
        <div class="stat-num" id="statReturned">0</div>
        <div class="stat-label">已归来（今日）</div>
      </div>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
      <select id="statusFilter" onchange="loadRecords()">
        <option value="all">全部状态</option>
        <option value="active">乐捐中</option>
        <option value="pending">待出发</option>
        <option value="returned">已归来</option>
      </select>
      <select id="daysFilter" onchange="loadRecords()">
        <option value="1">近1天</option>
        <option value="3" selected>近3天</option>
        <option value="7">近7天</option>
        <option value="30">近30天</option>
      </select>
      <button class="btn btn-primary" onclick="loadRecords()">刷新</button>
    </div>

    <!-- 数据表格 -->
    <table class="data-table">
      <thead>
        <tr>
          <th>工号</th>
          <th>艺名</th>
          <th>班次</th>
          <th>预约时间</th>
          <th>预计小时</th>
          <th>状态</th>
          <th>实际开始</th>
          <th>归来时间</th>
          <th>乐捐小时</th>
          <th>付款截图</th>
          <th>备注</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="recordsBody">
        <tr><td colspan="12" class="empty">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '/api';
    let currentUser = null;

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadRecords();
    });

    function toggleGroup(el) {
      el.parentElement.classList.toggle('open');
    }

    function checkAuth() {
      const token = localStorage.getItem('adminToken');
      const user = localStorage.getItem('adminUser');
      if (!token) {
        window.location.href = 'login.html';
        return;
      }
      try {
        currentUser = JSON.parse(user || '{}');
      } catch (e) {
        currentUser = {};
      }
    }

    function getToken() {
      return localStorage.getItem('adminToken');
    }

    function doLogout() {
      localStorage.removeItem('adminToken');
      localStorage.removeItem('adminUser');
      window.location.href = 'login.html';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function statusBadge(status) {
      const map = {
        pending: '<span class="badge badge-pending">待出发</span>',
        active: '<span class="badge badge-active">乐捐中</span>',
        returned: '<span class="badge badge-returned">已归来</span>'
      };
      return map[status] || status;
    }

    function formatTime(t) {
      if (!t) return '-';
      return t.replace('T', ' ').substring(5, 16);
    }

    async function loadRecords() {
      const status = document.getElementById('statusFilter').value;
      const days = document.getElementById('daysFilter').value;
      const token = getToken();

      try {
        const res = await fetch(`${API_BASE}/lejuan-records/list?status=${status}&days=${days}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        if (!data.success) {
          document.getElementById('recordsBody').innerHTML = `<tr><td colspan="12" class="empty">${data.error || '加载失败'}</td></tr>`;
          return;
        }

        const records = data.data || [];
        renderRecords(records);
        updateStats(records);
      } catch (e) {
        document.getElementById('recordsBody').innerHTML = `<tr><td colspan="12" class="empty">网络错误</td></tr>`;
      }
    }

    function updateStats(records) {
      let active = 0, pending = 0, returnedToday = 0;
      const today = TimeUtil.today();
      records.forEach(r => {
        if (r.lejuan_status === 'active') active++;
        else if (r.lejuan_status === 'pending') pending++;
        else if (r.lejuan_status === 'returned' && r.return_time && r.return_time.startsWith(today)) returnedToday++;
      });
      document.getElementById('statActive').textContent = active;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statReturned').textContent = returnedToday;
    }

    function renderRecords(records) {
      const tbody = document.getElementById('recordsBody');
      if (records.length === 0) {
        tbody.innerHTML = '<tr><td colspan="12" class="empty">暂无记录</td></tr>';
        return;
      }

      tbody.innerHTML = records.map(r => {
        const proofCell = r.proof_image_url
          ? `<img src="${r.proof_image_url}" class="proof-thumb" onclick="window.open('${r.proof_image_url}')" />`
          : '-';
        
        const actionCell = r.lejuan_status === 'active'
          ? `<button class="btn btn-success btn-sm" onclick="handleReturn(${r.id}, '${(r.stage_name || '').replace(/'/g, "\\'")}')">乐捐归来</button>`
          : '-';

        return `<tr>
          <td>${r.employee_id || '-'}</td>
          <td>${r.stage_name || '-'}</td>
          <td>${r.shift || '-'}</td>
          <td>${formatTime(r.scheduled_start_time)}</td>
          <td>${r.extra_hours ? r.extra_hours + 'h' : '-'}</td>
          <td>${statusBadge(r.lejuan_status)}</td>
          <td>${r.actual_start_time ? formatTime(r.actual_start_time) : '-'}</td>
          <td>${r.return_time ? formatTime(r.return_time) : '-'}</td>
          <td>${r.lejuan_hours !== null && r.lejuan_hours !== undefined ? r.lejuan_hours + 'h' : '-'}</td>
          <td>${proofCell}</td>
          <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${r.remark || ''}">${r.remark || '-'}</td>
          <td>${actionCell}</td>
        </tr>`;
      }).join('');
    }

    async function handleReturn(recordId, stageName) {
      if (!confirm(`确认「${stageName}」乐捐归来？将自动计算外出小时数并恢复水牌为空闲。`)) return;

      const token = getToken();
      try {
        const res = await fetch(`${API_BASE}/lejuan-records/${recordId}/return`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
          },
          body: JSON.stringify({ operator: currentUser.username || 'admin' })
        });
        const data = await res.json();
        if (data.success) {
          showToast(`乐捐归来成功！${stageName} 外出 ${data.data.lejuan_hours} 小时`);
          loadRecords();
        } else {
          showToast(data.error || '操作失败');
        }
      } catch (e) {
        showToast('网络错误');
      }
    }
  </script>
</body>
</html>
