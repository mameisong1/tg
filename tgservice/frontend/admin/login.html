<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 100%; max-width: 400px; padding: 40px 30px; background: rgba(20,20,30,0.8); border-radius: 20px; border: 1px solid rgba(218,165,32,0.2); margin: 20px; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo-text { font-size: 28px; color: #d4af37; letter-spacing: 4px; }
    .logo-sub { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 8px; }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
    .form-input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 15px; }
    .form-input:focus { outline: none; border-color: #d4af37; }
    .login-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); border: none; border-radius: 12px; color: #000; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .error-msg { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); border-radius: 8px; padding: 12px; color: #e74c3c; font-size: 13px; margin-bottom: 20px; display: none; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="logo-text">天宫国际</div>
      <div class="logo-sub">后台管理系统</div>
    </div>
    <div class="error-msg" id="errorMsg"></div>
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input type="text" class="form-input" id="username" placeholder="请输入用户名">
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input type="password" class="form-input" id="password" placeholder="请输入密码">
    </div>
    <button class="login-btn" onclick="login()">登录</button>
  </div>
  <script>
    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { showError('请填写用户名和密码'); return; }
      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = 'index.html';
        } else {
          showError(data.error || '登录失败');
        }
      } catch (err) { showError('网络错误'); }
    }
    if (localStorage.getItem('adminToken')) window.location.href = 'index.html';
  </script>
</body>
</html>
