<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设备开关管理 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: rgba(20,20,30,0.8); border-right: 1px solid rgba(218,165,32,0.1); padding: 20px 0; flex-shrink: 0; overflow-y: auto; height: 100vh; position: sticky; top: 0; }
    .sidebar-logo { padding: 0 20px 30px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .sidebar-logo img { width: 32px; height: 32px; }
    .sidebar-title { font-size: 16px; color: #d4af37; }
    .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .nav-icon { font-size: 18px; }
    .nav-group { border-bottom: 1px solid rgba(255,255,255,0.03); }
    .nav-group-title { display: flex; align-items: center; padding: 12px 20px; color: rgba(255,255,255,0.5); font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .nav-group-title:hover { background: rgba(212,175,55,0.05); color: rgba(255,255,255,0.8); }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    .nav-submenu { display: none; background: rgba(0,0,0,0.2); }
    .nav-group.open .nav-submenu { display: block; }
    .nav-submenu .nav-item { padding-left: 48px; font-size: 13px; }
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-danger { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* 筛选栏 */
    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
    .filter-bar input, .filter-bar select { padding: 10px 14px; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }

    /* 表格 */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 12px 16px; background: rgba(218,165,32,0.1); color: #d4af37; font-size: 13px; font-weight: 500; border-bottom: 1px solid rgba(218,165,32,0.2); }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; }
    .data-table tr:hover td { background: rgba(212,175,55,0.05); }

    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; border: 1px solid rgba(218,165,32,0.2); }
    .modal-title { font-size: 18px; margin-bottom: 20px; }
    .modal-form { display: flex; flex-direction: column; gap: 16px; }
    .form-row { display: flex; flex-direction: column; gap: 8px; }
    .form-row label { font-size: 13px; color: rgba(255,255,255,0.6); }
    .form-row input, .form-row select { padding: 12px; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .form-row input:focus, .form-row select:focus { outline: none; border-color: rgba(218,165,32,0.5); }
    .form-actions { display: flex; gap: 12px; margin-top: 8px; }
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; z-index: 2000; font-size: 14px; display: none; }
    .toast.success { background: rgba(34,197,94,0.9); color: #fff; }
    .toast.error { background: rgba(231,76,60,0.9); color: #fff; }
  </style>
</head>
<body>
  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="../images/logo.png" alt="logo">
      <div>
        <div class="sidebar-title">天宫国际</div>
        <div class="sidebar-sub">后台管理系统</div>
      </div>
    </div>
    <a href="index.html" class="nav-item"><span class="nav-icon">📊</span> 数据概览</a>
    <a href="members.html" class="nav-item"><span class="nav-icon">👥</span> 会员管理</a>
    <div class="nav-group open">
      <div class="nav-group-title" onclick="toggleGroup(this)"><span class="group-icon">🏠</span><span class="group-text">前厅</span><span class="arrow">▼</span></div>
      <div class="nav-submenu">
        <a href="cashier-dashboard.html" class="nav-item">💰 收银看板</a>
        <a href="products.html" class="nav-item">📦 商品管理</a>
        <a href="vip-rooms.html" class="nav-item">🛋️ 包房管理</a>
        <a href="tables.html" class="nav-item">🎱 台桌管理</a>
        <a href="categories.html" class="nav-item">🏷️ 商品分类</a>
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)"><span class="group-icon">👩‍🏫</span><span class="group-text">助教管理</span><span class="arrow">▼</span></div>
      <div class="nav-submenu">
        <a href="coaches.html" class="nav-item">👩 助教列表</a>
      </div>
    </div>
    <div class="nav-group open">
      <div class="nav-group-title" onclick="toggleGroup(this)"><span class="group-icon">💡</span><span class="group-text">设备管理</span><span class="arrow">▼</span></div>
      <div class="nav-submenu">
        <a href="switch-devices.html" class="nav-item active"><span class="nav-icon">🔌</span> 设备开关管理</a>
        <a href="table-devices.html" class="nav-item"><span class="nav-icon">🎱</span> 台桌设备关系</a>
        <a href="switch-scenes.html" class="nav-item"><span class="nav-icon">🎬</span> 开关场景管理</a>
      </div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)"><span class="group-icon">⚙️</span><span class="group-text">系统</span><span class="arrow">▼</span></div>
      <div class="nav-submenu">
        <a href="operation-logs.html" class="nav-item">📜 操作日志</a>
        <a href="home.html" class="nav-item">🏠 首页配置</a>
        <a href="users.html" class="nav-item">👥 用户管理</a>
        <a href="settings.html" class="nav-item">🛡️ 系统配置</a>
      </div>
    </div>
  </div>

  <!-- 主内容区 -->
  <div class="main">
    <div class="page-header">
      <div class="page-title">🔌 设备开关管理</div>
      <div style="display:flex;gap:12px;">
        <button class="btn btn-primary" onclick="openAddModal()">+ 新增</button>
        <button class="btn btn-secondary" onclick="importFromExcel()">📥 Excel导入</button>
      </div>
    </div>

    <!-- 筛选 -->
    <div class="filter-bar">
      <input type="text" id="filterLabel" placeholder="按开关标签筛选" oninput="loadData()">
    </div>

    <!-- 数据表格 -->
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>开关ID</th>
          <th>开关序号</th>
          <th>开关标签</th>
          <th>自动关灯开始</th>
          <th>自动关灯结束</th>
          <th>自动开灯开始</th>
          <th>自动开灯结束</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="9" style="text-align:center;color:rgba(255,255,255,0.4);">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 新增/编辑弹窗 -->
  <div class="modal" id="formModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">新增设备开关</div>
      <div class="modal-form">
        <input type="hidden" id="editId">
        <div class="form-row">
          <label>开关ID *</label>
          <input type="text" id="f_switch_id" placeholder="如 0xa4c1380bbd942cbe">
        </div>
        <div class="form-row">
          <label>开关序号 *</label>
          <input type="text" id="f_switch_seq" placeholder="如 state_l1">
        </div>
        <div class="form-row">
          <label>开关标签 *</label>
          <input type="text" id="f_switch_label" placeholder="如 1, 2, tv">
        </div>
        <div class="form-row">
          <label>自动关灯开始时间 (HH:MM，留空=不启用)</label>
          <input type="text" id="f_auto_off_start" placeholder="如 22:00">
        </div>
        <div class="form-row">
          <label>自动关灯结束时间 (HH:MM，留空=不启用)</label>
          <input type="text" id="f_auto_off_end" placeholder="如 06:00">
        </div>
        <div class="form-row">
          <label>定时自动开灯开始时间 (HH:MM，留空=不启用)</label>
          <input type="text" id="f_auto_on_start" placeholder="如 06:00">
        </div>
        <div class="form-row">
          <label>定时自动开灯结束时间 (HH:MM，留空=不启用)</label>
          <input type="text" id="f_auto_on_end" placeholder="如 22:00">
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="saveRecord()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    const API = '/api/admin/switches';
    let allData = [];

    async function loadData() {
      try {
        const res = await fetch(API, { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') } });
        if (!res.ok) throw new Error('请求失败');
        allData = await res.json();

        const filter = document.getElementById('filterLabel').value.trim();
        const filtered = filter ? allData.filter(d => d.switch_label === filter) : allData;

        const tbody = document.getElementById('tableBody');
        if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:rgba(255,255,255,0.4);">暂无数据</td></tr>';
          return;
        }

        tbody.innerHTML = filtered.map(d => `
          <tr>
            <td>${d.id}</td>
            <td style="font-family:monospace;font-size:12px;">${d.switch_id}</td>
            <td style="font-family:monospace;">${d.switch_seq}</td>
            <td>${d.switch_label}</td>
            <td>${d.auto_off_start || '-'}</td>
            <td>${d.auto_off_end || '-'}</td>
            <td>${d.auto_on_start || '-'}</td>
            <td>${d.auto_on_end || '-'}</td>
            <td>
              <button class="btn btn-sm btn-secondary" onclick="openEditModal(${d.id})">编辑</button>
              <button class="btn btn-sm btn-danger" onclick="deleteRecord(${d.id})">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="9" style="text-align:center;color:#e74c3c;">加载失败: ${err.message}</td></tr>`;
      }
    }

    function openAddModal() {
      document.getElementById('modalTitle').textContent = '新增设备开关';
      document.getElementById('editId').value = '';
      ['f_switch_id','f_switch_seq','f_switch_label','f_auto_off_start','f_auto_off_end','f_auto_on_start','f_auto_on_end'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('formModal').classList.add('show');
    }

    function openEditModal(id) {
      const d = allData.find(x => x.id === id);
      if (!d) return;
      document.getElementById('modalTitle').textContent = '编辑设备开关';
      document.getElementById('editId').value = d.id;
      document.getElementById('f_switch_id').value = d.switch_id;
      document.getElementById('f_switch_seq').value = d.switch_seq;
      document.getElementById('f_switch_label').value = d.switch_label;
      document.getElementById('f_auto_off_start').value = d.auto_off_start || '';
      document.getElementById('f_auto_off_end').value = d.auto_off_end || '';
      document.getElementById('f_auto_on_start').value = d.auto_on_start || '';
      document.getElementById('f_auto_on_end').value = d.auto_on_end || '';
      document.getElementById('formModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('formModal').classList.remove('show');
    }

    async function saveRecord() {
      const id = document.getElementById('editId').value;
      const data = {
        switch_id: document.getElementById('f_switch_id').value.trim(),
        switch_seq: document.getElementById('f_switch_seq').value.trim(),
        switch_label: document.getElementById('f_switch_label').value.trim(),
        auto_off_start: document.getElementById('f_auto_off_start').value.trim(),
        auto_off_end: document.getElementById('f_auto_off_end').value.trim(),
        auto_on_start: document.getElementById('f_auto_on_start').value.trim(),
        auto_on_end: document.getElementById('f_auto_on_end').value.trim()
      };

      if (!data.switch_id || !data.switch_seq || !data.switch_label) {
        showToast('请填写必填字段', 'error');
        return;
      }

      try {
        const url = id ? `${API}/${id}` : API;
        const method = id ? 'PUT' : 'POST';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || '操作失败');
        closeModal();
        showToast(id ? '修改成功' : '新增成功', 'success');
        loadData();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function deleteRecord(id) {
      if (!confirm('确认删除该设备开关？')) return;
      try {
        const res = await fetch(`${API}/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') }
        });
        if (!res.ok) throw new Error('删除失败');
        showToast('删除成功', 'success');
        loadData();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function importFromExcel() {
      showToast('请使用后端脚本: node scripts/import-switch-data.js', 'success');
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    function toggleGroup(el) {
      el.parentElement.classList.toggle('open');
    }

    loadData();
  </script>
</body>
</html>
