<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>收银看板 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: rgba(20,20,30,0.8); border-right: 1px solid rgba(218,165,32,0.1); padding: 20px 0; flex-shrink: 0; }
    .sidebar-logo { padding: 0 20px 30px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .sidebar-logo img { width: 32px; height: 32px; filter: sepia(60%) saturate(200%) hue-rotate(10deg); }
    .sidebar-title { font-size: 16px; color: #d4af37; }
    .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .nav-icon { font-size: 18px; }
    
    .nav-group { border-bottom: 1px solid rgba(255,255,255,0.03); }
    .nav-group-title { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .nav-group-title:hover { background: rgba(212,175,55,0.05); color: rgba(255,255,255,0.8); }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    .nav-submenu { display: none; background: rgba(0,0,0,0.2); }
    .nav-group.open .nav-submenu { display: block; }
    .nav-submenu .nav-item { padding-left: 48px; font-size: 13px; }
    
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }
    .logout-btn { padding: 8px 16px; background: transparent; border: 1px solid rgba(231,76,60,0.3); border-radius: 8px; color: #e74c3c; font-size: 13px; cursor: pointer; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 20px; border: 1px solid rgba(218,165,32,0.1); }
    .stat-value { font-size: 28px; color: #d4af37; }
    .stat-label { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }
    
    .data-table { width: 100%; background: rgba(20,20,30,0.6); border-radius: 12px; border: 1px solid rgba(218,165,32,0.1); overflow: hidden; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .data-table th { background: rgba(212,175,55,0.1); font-weight: 500; font-size: 13px; color: rgba(255,255,255,0.7); }
    .data-table td { font-size: 14px; }
    
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    
    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; }
    .badge-pending { background: rgba(241,196,15,0.2); color: #f1c40f; }
    .badge-done { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .badge-cancelled { background: rgba(231,76,60,0.2); color: #e74c3c; }
    
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1001; display: none; }
    .toast.show { display: block; }
    
    .filter-bar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
    .filter-bar select, .filter-bar input { padding: 8px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 13px; }
    
    .auto-refresh-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 10px 16px; background: rgba(20,20,30,0.6); border-radius: 8px; border: 1px solid rgba(218,165,32,0.1); }
    .auto-refresh-bar label { font-size: 13px; color: rgba(255,255,255,0.6); }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="/images/logo.png" alt="Logo">
      <div>
        <div class="sidebar-title">天宫国际</div>
        <div class="sidebar-sub">后台管理系统</div>
      </div>
    </div>
    <a href="index.html" class="nav-item"><span class="nav-icon">📊</span> 数据概览</a>
    <a href="cashier-dashboard.html" class="nav-item active"><span class="nav-icon">💰</span> 收银看板</a>
    <a href="products.html" class="nav-item"><span class="nav-icon">📦</span> 商品管理</a>
    <a href="vip-rooms.html" class="nav-item"><span class="nav-icon">🛋️</span> 包房管理</a>
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">👩‍🏫</span><span class="group-text">助教管理</span><span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="coaches.html" class="nav-item"><span class="nav-icon">👩</span> 助教列表</a>
        <a href="coaches.html#batch-shift" class="nav-item"><span class="nav-icon">🔄</span> 批量更新班次</a>
      </div>
    </div>
    <a href="water-boards.html" class="nav-item"><span class="nav-icon">📋</span> 水牌管理</a>
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">📝</span><span class="group-text">约客审查</span><span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="invitation-review.html?shift=early" class="nav-item"><span class="nav-icon">☀️</span> 早班约客</a>
        <a href="invitation-review.html?shift=late" class="nav-item"><span class="nav-icon">🌙</span> 晚班约客</a>
      </div>
    </div>
    <a href="operation-logs.html" class="nav-item"><span class="nav-icon">📜</span> 操作日志</a>
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">⚙️</span><span class="group-text">配置</span><span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span> 首页配置</a>
        <a href="users.html" class="nav-item"><span class="nav-icon">👥</span> 用户管理</a>
        <a href="settings.html" class="nav-item"><span class="nav-icon">🛡️</span> 系统配置</a>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="page-header">
      <div class="page-title">💰 收银看板</div>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="btn btn-primary" onclick="refreshData()">🔄 刷新</button>
        <button class="logout-btn" onclick="logout()">退出登录</button>
      </div>
    </div>

    <!-- 自动刷新指示 -->
    <div class="auto-refresh-bar">
      <div class="pulse"></div>
      <span style="font-size:13px;color:rgba(255,255,255,0.6)">自动刷新中 · 每30秒</span>
      <span style="font-size:12px;color:rgba(255,255,255,0.4);margin-left:auto" id="lastRefresh">上次刷新: --</span>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statPending">-</div>
        <div class="stat-label">待处理订单</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTodayOrders">-</div>
        <div class="stat-label">今日订单数</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statTodayRevenue">-</div>
        <div class="stat-label">今日营业额</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statAvgOrder">-</div>
        <div class="stat-label">平均客单价</div>
      </div>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
      <label style="font-size:13px;color:rgba(255,255,255,0.5)">状态筛选：</label>
      <select id="filterStatus" onchange="applyFilter()">
        <option value="">全部</option>
        <option value="待处理">待处理</option>
        <option value="已完成">已完成</option>
        <option value="已取消">已取消</option>
      </select>
    </div>

    <!-- 订单列表 -->
    <table class="data-table">
      <thead>
        <tr><th>订单号</th><th>类型</th><th>金额</th><th>状态</th><th>下单时间</th><th>操作</th></tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';

    let allOrders = [];
    let refreshInterval = null;

    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function formatBeijingTime(timeStr) {
      if (!timeStr) return '-';
      const d = new Date(timeStr + ' UTC');
      return d.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function formatMoney(n) { return '¥' + (n || 0).toFixed(2); }

    function getStatusBadge(status) {
      const map = { '待处理': 'badge-pending', '已完成': 'badge-done', '已取消': 'badge-cancelled' };
      return map[status] || 'badge-pending';
    }

    async function refreshData() {
      try {
        const orders = await api('/api/admin/orders');
        allOrders = orders || [];
        applyFilter();
        document.getElementById('lastRefresh').textContent = '上次刷新: ' + new Date().toLocaleTimeString('zh-CN');
      } catch (e) {
        showToast('获取订单数据失败');
      }
    }

    function applyFilter() {
      const statusFilter = document.getElementById('filterStatus').value;
      const filtered = statusFilter ? allOrders.filter(o => o.status === statusFilter) : allOrders;

      // 统计
      const today = new Date().toISOString().split('T')[0];
      const todayOrders = allOrders.filter(o => o.created_at && o.created_at.startsWith(today));
      const pendingOrders = allOrders.filter(o => o.status === '待处理');
      const todayRevenue = todayOrders.reduce((sum, o) => sum + (o.total_price || 0), 0);
      const avgOrder = todayOrders.length > 0 ? todayRevenue / todayOrders.length : 0;

      document.getElementById('statPending').textContent = pendingOrders.length;
      document.getElementById('statTodayOrders').textContent = todayOrders.length;
      document.getElementById('statTodayRevenue').textContent = formatMoney(todayRevenue);
      document.getElementById('statAvgOrder').textContent = formatMoney(avgOrder);

      // 表格
      document.getElementById('ordersTable').innerHTML = filtered.length === 0
        ? '<tr><td colspan="6" style="text-align:center;color:rgba(255,255,255,0.3);padding:40px">暂无数据</td></tr>'
        : filtered.slice(0, 50).map(o => `
          <tr>
            <td>${o.order_no || o.id}</td>
            <td>${o.order_type || '-'}</td>
            <td style="color:#d4af37">${formatMoney(o.total_price)}</td>
            <td><span class="badge ${getStatusBadge(o.status)}">${o.status || '-'}</span></td>
            <td>${formatBeijingTime(o.created_at)}</td>
            <td>
              ${o.status === '待处理' ? `<button class="btn btn-sm btn-primary" onclick="completeOrder('${o.id}')">完成</button>` : '-'}
            </td>
          </tr>
        `).join('');
    }

    async function completeOrder(orderId) {
      if (!confirm('确认完成此订单？')) return;
      try {
        const res = await api(`/api/admin/orders/${orderId}`, { method: 'PUT', body: JSON.stringify({ status: '已完成' }) });
        if (res.success || res.data) {
          showToast('订单已完成');
          refreshData();
        } else {
          showToast(res.error || '操作失败');
        }
      } catch (e) {
        showToast('操作失败: ' + e.message);
      }
    }

    function logout() {
      localStorage.removeItem('adminToken');
      window.location.href = 'login.html';
    }

    function toggleGroup(el) {
      el.parentElement.classList.toggle('open');
    }

    // 自动刷新
    refreshData();
    refreshInterval = setInterval(refreshData, 30000);
  </script>
  <script src="nav-control.js"></script>
</body>
</html>
