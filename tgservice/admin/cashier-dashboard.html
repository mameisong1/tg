<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天宫国际 收银看板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; overflow: hidden; }
    .sidebar { width: 220px; background: rgba(20,20,30,0.8); border-right: 1px solid rgba(218,165,32,0.1); padding: 20px 0; flex-shrink: 0; overflow-y: auto; }
    .sidebar-logo { padding: 0 20px 30px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .sidebar-logo img { width: 32px; height: 32px; filter: sepia(60%) saturate(200%) hue-rotate(10deg); }
    .sidebar-title { font-size: 16px; color: #d4af37; }
    .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .nav-icon { font-size: 18px; }
    
    .nav-group { border-bottom: 1px solid rgba(255,255,255,0.03); }
    .nav-group-title { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .nav-group-title:hover { background: rgba(212,175,55,0.05); color: rgba(255,255,255,0.8); }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    .nav-submenu { display: none; background: rgba(0,0,0,0.2); }
    .nav-group.open .nav-submenu { display: block; }
    .nav-submenu .nav-item { padding-left: 48px; font-size: 13px; }
    
    .main { flex: 1; padding: 20px; overflow-y: auto; height: 100vh; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-title { font-size: 24px; font-weight: 600; background: linear-gradient(135deg, #d4af37, #ffd700); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logout-btn { padding: 8px 16px; background: transparent; border: 1px solid rgba(231,76,60,0.3); border-radius: 8px; color: #e74c3c; font-size: 13px; cursor: pointer; }
    
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-danger { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
    .btn-success { background: rgba(46,204,113,0.2); color: #2ecc71; border: 1px solid rgba(46,204,113,0.3); }
    
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1001; display: none; }
    .toast.show { display: block; }
    
    .auto-refresh-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding: 10px 16px; background: rgba(20,20,30,0.6); border-radius: 8px; border: 1px solid rgba(218,165,32,0.1); }
    .pulse { width: 8px; height: 8px; border-radius: 50%; background: #2ecc71; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    
    /* 全屏样式 */
    .fullscreen-btn { padding: 8px 16px; background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; color: #d4af37; font-size: 13px; cursor: pointer; }
    .fullscreen-btn:hover { background: rgba(212,175,55,0.25); }
    
    /* 声音/警报按钮 */
    .alert-btn { padding: 8px 16px; background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.3); border-radius: 8px; color: #e74c3c; font-size: 13px; cursor: pointer; }
    .alert-btn:hover { background: rgba(231,76,60,0.25); }
    .alert-btn.active { background: rgba(231,76,60,0.3); border-color: #e74c3c; }
    .sound-btn { padding: 8px 16px; background: rgba(52,152,219,0.15); border: 1px solid rgba(52,152,219,0.3); border-radius: 8px; color: #3498db; font-size: 13px; cursor: pointer; }
    .sound-btn:hover { background: rgba(52,152,219,0.25); }
    .sound-btn.active { background: rgba(52,152,219,0.3); border-color: #3498db; }

    /* 三列布局 */
    .three-columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; height: calc(100vh - 180px); }
    .column { background: rgba(20,20,30,0.4); border-radius: 12px; border: 1px solid rgba(218,165,32,0.1); display: flex; flex-direction: column; overflow: hidden; }
    .column-header { padding: 12px 16px; border-bottom: 1px solid rgba(218,165,32,0.1); }
    .column-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .column-title { font-size: 16px; font-weight: 600; }
    .column-count { font-size: 13px; color: rgba(255,255,255,0.5); }
    
    /* 筛选按钮 */
    .filter-btns { display: flex; gap: 6px; }
    .filter-btn { padding: 4px 12px; border-radius: 12px; font-size: 11px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.5); transition: all 0.2s; }
    .filter-btn:hover { background: rgba(255,255,255,0.1); }
    .filter-btn.active { background: rgba(212,175,55,0.2); border-color: #d4af37; color: #d4af37; }
    .filter-btn.active-pending { background: rgba(241,196,15,0.2); border-color: #f1c40f; color: #f1c40f; }
    .filter-btn.active-completed { background: rgba(46,204,113,0.2); border-color: #2ecc71; color: #2ecc71; }
    .filter-btn.active-cancelled { background: rgba(231,76,60,0.2); border-color: #e74c3c; color: #e74c3c; }
    
    .column-body { flex: 1; overflow-y: auto; padding: 12px; }
    .column-body::-webkit-scrollbar { width: 6px; }
    .column-body::-webkit-scrollbar-track { background: transparent; }
    .column-body::-webkit-scrollbar-thumb { background: rgba(218,165,32,0.2); border-radius: 3px; }
    
    /* 商品卡片样式 */
    .product-order-card { background: rgba(30,30,45,0.8); border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid rgba(218,165,32,0.08); }
    .product-order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .product-order-no { font-size: 13px; color: rgba(255,255,255,0.6); }
    .product-order-time { font-size: 11px; color: rgba(255,255,255,0.3); }
    .product-order-items { margin-bottom: 10px; }
    .product-order-item { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 4px 0; color: rgba(255,255,255,0.7); }
    .product-order-item .item-info { display: flex; align-items: center; gap: 8px; }
    .product-order-item .item-cancel-btn { padding: 2px 8px; border-radius: 4px; font-size: 10px; background: rgba(231,76,60,0.15); color: #e74c3c; border: none; cursor: pointer; }
    .product-order-item .item-cancel-btn:hover { background: rgba(231,76,60,0.3); }
    .product-order-total { display: flex; justify-content: space-between; align-items: center; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
    .product-order-price { font-size: 16px; color: #d4af37; font-weight: 600; }
    
    /* 服务订单卡片 */
    .service-order-card { background: rgba(30,30,45,0.8); border-radius: 10px; padding: 14px; margin-bottom: 10px; border-left: 3px solid #3498db; }
    .service-order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .service-order-no { font-size: 13px; color: #3498db; }
    .service-order-time { font-size: 11px; color: rgba(255,255,255,0.3); }
    .service-order-info { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
    .service-order-coach { font-size: 12px; color: rgba(255,255,255,0.5); }
    .service-order-actions { display: flex; gap: 8px; margin-top: 10px; }
    .service-order-actions .btn { flex: 1; }
    
    /* 助教上下桌单卡片 */
    .coach-session-card { background: rgba(30,30,45,0.8); border-radius: 10px; padding: 14px; margin-bottom: 10px; border-left: 3px solid #9b59b6; }
    .coach-session-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .coach-session-no { font-size: 13px; color: #9b59b6; }
    .coach-session-time { font-size: 11px; color: rgba(255,255,255,0.3); }
    .coach-session-info { font-size: 13px; color: rgba(255,255,255,0.7); margin-bottom: 4px; }
    .coach-session-detail { font-size: 12px; color: rgba(255,255,255,0.5); }
    .coach-session-actions { display: flex; gap: 8px; margin-top: 10px; }
    .coach-session-actions .btn { flex: 1; }
    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 10px; font-size: 11px; }
    .status-pending { background: rgba(241,196,15,0.2); color: #f1c40f; }
    .status-done { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .status-cancelled { background: rgba(231,76,60,0.2); color: #e74c3c; }
    
    /* 空状态 */
    .empty-state { text-align: center; padding: 40px 20px; color: rgba(255,255,255,0.3); }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    
    /* 取消商品弹窗 */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; border: 1px solid rgba(218,165,32,0.2); }
    .modal-title { font-size: 18px; margin-bottom: 20px; color: #d4af37; }
    .modal-form { display: flex; flex-direction: column; gap: 12px; }
    .modal-form label { font-size: 13px; color: rgba(255,255,255,0.6); }
    .modal-form input, .modal-form select { padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; padding: 12px; }
    
    /* 红色警报闪烁效果 */
    @keyframes redFlash {
      0%, 100% { box-shadow: 0 0 0 rgba(231,76,60,0); }
      50% { box-shadow: 0 0 20px rgba(231,76,60,0.5); }
    }
    .product-order-card.pending-alert { animation: redFlash 1s infinite; border-color: rgba(231,76,60,0.3); }
    .service-order-card.pending-alert { animation: redFlash 1s infinite; border-color: rgba(231,76,60,0.3); }
    .coach-session-card.pending-alert { animation: redFlash 1s infinite; border-color: rgba(231,76,60,0.3); }
    
    /* 新订单滑入动画 */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .card-new { animation: slideIn 0.3s ease-out; }
    
    /* 开启声音覆盖层 */
    .sound-overlay {
      display: none;
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .sound-overlay.show { display: flex; }
    .sound-overlay-box {
      background: rgba(20,20,30,0.95); border-radius: 20px; padding: 40px;
      text-align: center; border: 2px solid rgba(218,165,32,0.3);
      max-width: 360px;
    }
    .sound-overlay-box .icon { font-size: 48px; margin-bottom: 16px; }
    .sound-overlay-box h3 { color: #d4af37; margin-bottom: 12px; }
    .sound-overlay-box p { color: rgba(255,255,255,0.6); margin-bottom: 24px; font-size: 14px; }
    .sound-overlay-btn {
      padding: 14px 32px; background: linear-gradient(135deg, #d4af37, #ffd700);
      color: #000; border: none; border-radius: 10px; font-size: 16px;
      cursor: pointer; font-weight: 600;
    }
    .sound-overlay-btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <!-- 开启声音覆盖层 -->
  <div class="sound-overlay" id="soundOverlay">
    <div class="sound-overlay-box">
      <div class="icon">🔔</div>
      <h3>开启声音警报</h3>
      <p>点击按钮开启声音功能<br>有新的待处理订单时将发出警报声</p>
      <button class="sound-overlay-btn" onclick="enableSound()">🔊 点击开启</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-logo">
      <img src="/images/logo.png" alt="Logo">
      <div>
        <div class="sidebar-title">天宫国际</div>
        <div class="sidebar-sub">后台管理系统</div>
      </div>
    </div>
    <a href="index.html" class="nav-item"><span class="nav-icon">📊</span> 数据概览</a>
    
    <!-- 前厅 -->
    <div class="nav-group open">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">🏠</span><span class="group-text">前厅</span><span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="cashier-dashboard.html" class="nav-item active"><span class="nav-icon">💰</span> 收银看板</a>
        <a href="products.html" class="nav-item"><span class="nav-icon">📦</span> 商品管理</a>
        <a href="vip-rooms.html" class="nav-item"><span class="nav-icon">🛋️</span> 包房管理</a>
        <a href="tables.html" class="nav-item"><span class="nav-icon">🎱</span> 台桌管理</a>
        <a href="categories.html" class="nav-item"><span class="nav-icon">🏷️</span> 商品分类</a>
      </div>
    </div>
    
    <!-- 助教管理 -->
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">👩‍🏫</span><span class="group-text">助教管理</span><span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="coaches.html" class="nav-item"><span class="nav-icon">👩</span> 助教列表</a>
        <a href="coaches.html#batch-shift" class="nav-item"><span class="nav-icon">🔄</span> 批量更新班次</a>
        <a href="water-boards.html" class="nav-item"><span class="nav-icon">📋</span> 水牌管理</a>
        <a href="invitation-review.html?shift=early" class="nav-item"><span class="nav-icon">☀️</span> 早班约课</a>
        <a href="invitation-review.html?shift=late" class="nav-item"><span class="nav-icon">🌙</span> 晚班约课</a>
      </div>
    </div>
    
    <a href="operation-logs.html" class="nav-item"><span class="nav-icon">📜</span> 操作日志</a>
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">⚙️</span><span class="group-text">配置</span><span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span> 首页配置</a>
        <a href="users.html" class="nav-item"><span class="nav-icon">👥</span> 用户管理</a>
        <a href="settings.html" class="nav-item"><span class="nav-icon">🛡️</span> 系统配置</a>
      </div>
    </div>
  </div>

  <div class="main" id="mainContent">
    <div class="page-header">
      <div class="page-title">天宫国际 收银看板</div>
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊 声音</button>
        <button class="alert-btn" id="alertBtn" onclick="toggleAlert()">🚨 红色警报</button>
        <button class="fullscreen-btn" id="fullscreenBtn" onclick="toggleFullscreen()">🖥️ 全屏</button>
        <button class="btn btn-primary" onclick="fullRefresh()">🔄 刷新</button>
        <button class="logout-btn" onclick="logout()">退出登录</button>
      </div>
    </div>

    <!-- 自动刷新指示 -->
    <div class="auto-refresh-bar">
      <div class="pulse"></div>
      <span style="font-size:13px;color:rgba(255,255,255,0.6)">自动轮询中 · 每10秒检查新订单</span>
      <span style="font-size:12px;color:rgba(255,255,255,0.4);margin-left:auto" id="lastRefresh">上次检查: --</span>
    </div>

    <!-- 三列布局 -->
    <div class="three-columns">
      <!-- 商品订单列 -->
      <div class="column">
        <div class="column-header">
          <div class="column-title-row">
            <span class="column-title">📦 商品订单</span>
            <span class="column-count" id="productCount">0</span>
          </div>
          <div class="filter-btns" id="productFilterBtns">
            <span class="filter-btn active-pending" data-filter="待处理" data-column="product" onclick="setFilter('product','待处理')">待处理</span>
            <span class="filter-btn" data-filter="已完成" data-column="product" onclick="setFilter('product','已完成')">已完成</span>
            <span class="filter-btn" data-filter="已取消" data-column="product" onclick="setFilter('product','已取消')">已取消</span>
          </div>
        </div>
        <div class="column-body" id="productOrdersList"></div>
      </div>
      
      <!-- 服务订单列 -->
      <div class="column">
        <div class="column-header">
          <div class="column-title-row">
            <span class="column-title">🎯 服务订单</span>
            <span class="column-count" id="serviceCount">0</span>
          </div>
          <div class="filter-btns" id="serviceFilterBtns">
            <span class="filter-btn active-pending" data-filter="待处理" data-column="service" onclick="setFilter('service','待处理')">待处理</span>
            <span class="filter-btn" data-filter="已完成" data-column="service" onclick="setFilter('service','已完成')">已完成</span>
            <span class="filter-btn" data-filter="已取消" data-column="service" onclick="setFilter('service','已取消')">已取消</span>
          </div>
        </div>
        <div class="column-body" id="serviceOrdersList"></div>
      </div>
      
      <!-- 助教上下桌单列 -->
      <div class="column">
        <div class="column-header">
          <div class="column-title-row">
            <span class="column-title">👩‍🏫 助教上下桌单</span>
            <span class="column-count" id="coachSessionCount">0</span>
          </div>
          <div class="filter-btns" id="coachFilterBtns">
            <span class="filter-btn active-pending" data-filter="待处理" data-column="coach" onclick="setFilter('coach','待处理')">待处理</span>
            <span class="filter-btn" data-filter="已完成" data-column="coach" onclick="setFilter('coach','已完成')">已完成</span>
            <span class="filter-btn" data-filter="已取消" data-column="coach" onclick="setFilter('coach','已取消')">已取消</span>
          </div>
        </div>
        <div class="column-body" id="coachSessionsList"></div>
      </div>
    </div>
  </div>

  <!-- 取消商品弹窗 -->
  <div class="modal" id="cancelItemModal">
    <div class="modal-content">
      <div class="modal-title">🚫 取消商品</div>
      <div class="modal-form">
        <label>商品名称</label>
        <input type="text" id="cancelItemName" readonly>
        <label>当前数量</label>
        <input type="text" id="cancelItemCurrentQty" readonly>
        <label>取消数量</label>
        <select id="cancelItemQty"></select>
      </div>
      <div class="modal-actions">
        <button class="btn" style="background:rgba(255,255,255,0.1);color:#fff" onclick="closeCancelItemModal()">取消</button>
        <button class="btn btn-danger" onclick="confirmCancelItem()">确认取消</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';

    let productOrders = [];
    let serviceOrders = [];
    let coachSessions = [];
    let refreshInterval = null;
    let soundEnabled = false;
    let alertEnabled = false;
    let audioCtx = null;
    let hasUserGesture = false;
    
    // 记录已渲染的订单ID，用于增量更新
    let renderedProductIds = new Set();
    let renderedServiceIds = new Set();
    let renderedCoachIds = new Set();
    
    // 每列的筛选状态（默认待处理）
    let filters = { product: '待处理', service: '待处理', coach: '待处理' };
    
    // 取消商品相关
    let cancelItemOrderId = null;
    let cancelItemName = null;
    let cancelItemMaxQty = 1;

    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function formatBeijingTime(timeStr) {
      if (!timeStr) return '-';
      const d = new Date(timeStr + ' UTC');
      return d.toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    }

    function isWithinMinutes(timeStr, minutes) {
      if (!timeStr) return false;
      const d = new Date(timeStr + ' UTC');
      const now = new Date();
      const diffMs = now - d;
      return diffMs <= minutes * 60 * 1000;
    }

    function filterByTime(items, status) {
      if (status === '已完成' || status === '已取消') {
        return items.filter(o => isWithinMinutes(o.created_at, 120));
      }
      return items;
    }

    function formatMoney(n) { return '¥' + (n || 0).toFixed(2); }
    
    function getStatusClass(status) {
      if (status === '待处理') return 'status-pending';
      if (status === '已完成') return 'status-done';
      if (status === '已取消') return 'status-cancelled';
      return 'status-pending';
    }

    // ===== 声音/警报系统 =====
    
    // 获取AudioContext（复用）
    function getAudioContext() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    // 显示开启声音覆盖层
    function showSoundOverlay() {
      document.getElementById('soundOverlay').classList.add('show');
    }

    // 用户点击开启声音
    function enableSound() {
      try {
        getAudioContext();
        hasUserGesture = true;
        soundEnabled = true;
        alertEnabled = true;
        document.getElementById('soundBtn').classList.add('active');
        document.getElementById('alertBtn').classList.add('active');
        document.getElementById('soundOverlay').classList.remove('show');
        // 播放测试音
        playTone(800, 0.1, 0.1);
        showToast('✅ 声音警报已开启');
      } catch(e) {
        showToast('❌ 无法启用声音');
      }
    }

    // 播放音调
    function playTone(freq, gain, duration) {
      if (!hasUserGesture) return;
      try {
        const ctx = getAudioContext();
        if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g);
        g.connect(ctx.destination);
        osc.frequency.value = freq;
        g.gain.value = gain;
        osc.start();
        osc.stop(ctx.currentTime + duration);
      } catch(e) {}
    }

    // 播放警报声（两声短促）
    function playAlertSound() {
      if (!soundEnabled || !hasUserGesture) return;
      playTone(600, 0.15, 0.15);
      setTimeout(() => playTone(800, 0.15, 0.15), 200);
    }

    // 切换声音
    function toggleSound() {
      if (!hasUserGesture) {
        showSoundOverlay();
        return;
      }
      soundEnabled = !soundEnabled;
      document.getElementById('soundBtn').classList.toggle('active', soundEnabled);
      if (soundEnabled) {
        playTone(800, 0.1, 0.1);
      }
    }

    // 切换警报
    function toggleAlert() {
      if (!hasUserGesture) {
        showSoundOverlay();
        return;
      }
      alertEnabled = !alertEnabled;
      document.getElementById('alertBtn').classList.toggle('active', alertEnabled);
      renderAll();
    }

    // ===== 全屏 =====
    function toggleFullscreen() {
      const sidebar = document.querySelector('.sidebar');
      const btn = document.getElementById('fullscreenBtn');
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(() => {
          sidebar.style.display = 'none';
          btn.textContent = '🖥️ 退出全屏';
        }).catch(() => {
          sidebar.style.display = 'none';
          btn.textContent = '🖥️ 退出全屏';
        });
      } else {
        document.exitFullscreen().then(() => {
          sidebar.style.display = '';
          btn.textContent = '🖥️ 全屏';
        }).catch(() => {
          sidebar.style.display = '';
          btn.textContent = '🖥️ 全屏';
        });
      }
    }

    document.addEventListener('fullscreenchange', () => {
      const sidebar = document.querySelector('.sidebar');
      const btn = document.getElementById('fullscreenBtn');
      if (!document.fullscreenElement) {
        sidebar.style.display = '';
        btn.textContent = '🖥️ 全屏';
      }
    });

    // ===== 筛选 =====
    function setFilter(column, filter) {
      filters[column] = filter;
      document.querySelectorAll(`#${column}FilterBtns .filter-btn`).forEach(btn => {
        btn.classList.remove('active', 'active-pending', 'active-completed', 'active-cancelled');
        if (btn.dataset.filter === filter) {
          if (filter === '待处理') btn.classList.add('active-pending');
          else if (filter === '已完成') btn.classList.add('active-completed');
          else btn.classList.add('active-cancelled');
        }
      });
      renderAll();
    }

    // ===== 渲染函数 =====

    function renderProductOrders(newIds) {
      const container = document.getElementById('productOrdersList');
      const filtered = filterByTime(productOrders.filter(o => o.status === filters.product), filters.product);
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">📦</div><div>暂无商品订单</div></div>';
        renderedProductIds = new Set();
        return;
      }
      // 如果筛选状态不是待处理，全量渲染
      if (filters.product !== '待处理' || !newIds) {
        container.innerHTML = filtered.slice(0, 50).map(o => renderProductCard(o)).join('');
        renderedProductIds = new Set(filtered.map(o => o.id));
        return;
      }
      // 增量渲染：追加新卡片
      let html = container.innerHTML;
      for (const o of filtered) {
        if (!renderedProductIds.has(o.id)) {
          html = renderProductCard(o, true) + html;
          renderedProductIds.add(o.id);
        }
      }
      container.innerHTML = html;
      renderedProductIds = new Set(filtered.map(o => o.id));
    }

    function renderProductCard(o, isNew) {
      const items = (o.items || []);
      const isPending = o.status === '待处理';
      const alertClass = (isPending && alertEnabled) ? 'pending-alert' : '';
      const newClass = isNew ? 'card-new' : '';
      return `
        <div class="product-order-card ${alertClass} ${newClass}">
          <div class="product-order-header">
            <span class="product-order-no">${o.order_no || '订单#' + o.id}</span>
            <span class="product-order-time">${formatBeijingTime(o.created_at)}</span>
          </div>
          <div class="product-order-items">
            ${items.map(item => `
              <div class="product-order-item">
                <span class="item-info">${item.name} × ${item.quantity}</span>
                <div style="display:flex;align-items:center;gap:8px">
                  <span>¥${((item.price || 0) * (item.quantity || 1)).toFixed(2)}</span>
                  ${isPending ? `<button class="item-cancel-btn" onclick="openCancelItemModal(${o.id}, '${item.name}', ${item.quantity})">取消</button>` : ''}
                </div>
              </div>
            `).join('') || '<div class="product-order-item"><span>商品明细</span><span>-</span></div>'}
          </div>
          <div class="product-order-total">
            <span class="status-badge ${getStatusClass(o.status)}">${o.status || '待处理'}</span>
            <span class="product-order-price">${formatMoney(o.total_price)}</span>
          </div>
          ${isPending ? `<div style="margin-top:10px;display:flex;gap:8px">
            <button class="btn btn-sm btn-success" style="flex:1" onclick="completeOrder(${o.id})">✓ 完成</button>
            <button class="btn btn-sm btn-danger" style="flex:1" onclick="cancelOrder(${o.id})">✗ 取消订单</button>
          </div>` : ''}
        </div>
      `;
    }

    function renderServiceOrders(newIds) {
      const container = document.getElementById('serviceOrdersList');
      const filtered = filterByTime(serviceOrders.filter(o => o.status === filters.service), filters.service);
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🎯</div><div>暂无服务订单</div></div>';
        renderedServiceIds = new Set();
        return;
      }
      if (filters.service !== '待处理' || !newIds) {
        container.innerHTML = filtered.map(o => renderServiceCard(o)).join('');
        renderedServiceIds = new Set(filtered.map(o => o.id));
        return;
      }
      let html = container.innerHTML;
      for (const o of filtered) {
        if (!renderedServiceIds.has(o.id)) {
          html = renderServiceCard(o, true) + html;
          renderedServiceIds.add(o.id);
        }
      }
      container.innerHTML = html;
      renderedServiceIds = new Set(filtered.map(o => o.id));
    }

    function renderServiceCard(o, isNew) {
      const isPending = o.status === '待处理';
      const alertClass = (isPending && alertEnabled) ? 'pending-alert' : '';
      const newClass = isNew ? 'card-new' : '';
      return `
        <div class="service-order-card ${alertClass} ${newClass}">
          <div class="service-order-header">
            <span class="service-order-no">#${o.id}</span>
            <span class="status-badge ${getStatusClass(o.status)}">${o.status}</span>
          </div>
          <div class="service-order-info">🎱 ${o.table_no || '-'} | ${o.requirement || '无需求描述'}</div>
          <div class="service-order-coach">👤 ${o.requester_name || '-'} · ${o.requester_type || '-'}</div>
          <div class="service-order-time" style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px">${formatBeijingTime(o.created_at)}</div>
          ${isPending ? `<div class="service-order-actions">
            <button class="btn btn-sm btn-danger" onclick="updateServiceOrder(${o.id}, '已取消')">取消</button>
            <button class="btn btn-sm btn-success" onclick="updateServiceOrder(${o.id}, '已完成')">完成</button>
          </div>` : ''}
        </div>
      `;
    }

    function renderCoachSessions(newIds) {
      const container = document.getElementById('coachSessionsList');
      const filtered = filterByTime(coachSessions.filter(o => o.status === filters.coach), filters.coach);
      
      if (filtered.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="icon">👩‍🏫</div><div>暂无上下桌单</div></div>';
        renderedCoachIds = new Set();
        return;
      }
      if (filters.coach !== '待处理' || !newIds) {
        container.innerHTML = filtered.map(s => renderCoachCard(s)).join('');
        renderedCoachIds = new Set(filtered.map(s => s.id));
        return;
      }
      let html = container.innerHTML;
      for (const s of filtered) {
        if (!renderedCoachIds.has(s.id)) {
          html = renderCoachCard(s, true) + html;
          renderedCoachIds.add(s.id);
        }
      }
      container.innerHTML = html;
      renderedCoachIds = new Set(filtered.map(s => s.id));
    }

    function renderCoachCard(s, isNew) {
      const isPending = s.status === '待处理';
      const alertClass = (isPending && alertEnabled) ? 'pending-alert' : '';
      const newClass = isNew ? 'card-new' : '';
      // 显示工号而不是编号
      const displayId = s.employee_id || s.coach_no || '-';
      const idLabel = s.employee_id ? '工号' : '编号';
      return `
        <div class="coach-session-card ${alertClass} ${newClass}">
          <div class="coach-session-header">
            <span class="coach-session-no">#${s.id}</span>
            <span class="status-badge ${getStatusClass(s.status)}">${s.status}</span>
          </div>
          <div class="coach-session-info">
            ${s.order_type === '上桌单' ? '⬆️' : s.order_type === '下桌单' ? '⬇️' : '❌'} ${s.order_type || s.type || '-'}
            | 👤 ${s.stage_name || '-'} (${idLabel}${displayId})
          </div>
          <div class="coach-session-detail">🎱 台桌: ${s.table_no || '-'} ${s.action_category ? '| ' + s.action_category : ''}</div>
          <div class="coach-session-time" style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:4px">${formatBeijingTime(s.created_at)}</div>
          ${isPending ? `<div class="coach-session-actions">
            <button class="btn btn-sm btn-danger" onclick="updateTableOrder(${s.id}, '已取消')">取消</button>
            <button class="btn btn-sm btn-success" onclick="updateTableOrder(${s.id}, '已完成')">完成</button>
          </div>` : ''}
        </div>
      `;
    }

    function updateCounts() {
      const filteredProducts = filterByTime(productOrders.filter(o => o.status === filters.product), filters.product);
      const filteredServices = filterByTime(serviceOrders.filter(o => o.status === filters.service), filters.service);
      const filteredCoaches = filterByTime(coachSessions.filter(o => o.status === filters.coach), filters.coach);
      document.getElementById('productCount').textContent = filteredProducts.length + ' 单';
      document.getElementById('serviceCount').textContent = filteredServices.length + ' 单';
      document.getElementById('coachSessionCount').textContent = filteredCoaches.length + ' 单';
    }

    function renderAll() {
      renderProductOrders();
      renderServiceOrders();
      renderCoachSessions();
      updateCounts();
    }

    // ===== 数据加载 =====

    // 全量刷新（初次加载 + 手动刷新按钮）
    async function fullRefresh() {
      try {
        const orders = await api('/api/admin/orders');
        productOrders = Array.isArray(orders) ? orders : [];
      } catch(e) { productOrders = []; }
      
      try {
        const svcRes = await api('/api/service-orders');
        serviceOrders = (svcRes.success ? (svcRes.data || []) : []);
      } catch(e) { serviceOrders = []; }
      
      try {
        const tblRes = await api('/api/table-action-orders');
        coachSessions = (tblRes.success ? (tblRes.data || []) : []);
      } catch(e) { coachSessions = []; }
      
      // 如果服务订单为空，添加测试数据
      if (serviceOrders.length === 0) {
        serviceOrders = [
          { id: 1001, table_no: 'A03', requirement: '换垃圾袋', requester_name: '小美', requester_type: '助教', status: '待处理', created_at: new Date(Date.now() - 60000).toISOString() },
          { id: 1002, table_no: 'B07', requirement: '搞卫生', requester_name: '阿杰', requester_type: '助教', status: '待处理', created_at: new Date(Date.now() - 120000).toISOString() },
          { id: 1003, table_no: 'C02', requirement: '音响连接有问题，没声音', requester_name: '丽丽', requester_type: '助教', status: '待处理', created_at: new Date(Date.now() - 180000).toISOString() },
        ];
      }
      
      renderAll();
      document.getElementById('lastRefresh').textContent = '上次刷新: ' + new Date().toLocaleTimeString('zh-CN');
    }

    // 增量轮询（每10秒检查新订单）
    async function pollNewOrders() {
      try {
        let hasNew = false;
        
        // 检查商品订单
        try {
          const orders = await api('/api/admin/orders');
          const newOrders = Array.isArray(orders) ? orders : [];
          const newOnes = newOrders.filter(o => o.status === '待处理' && !renderedProductIds.has(o.id));
          if (newOnes.length > 0) {
            productOrders = newOrders;
            hasNew = true;
          } else {
            productOrders = newOrders;
          }
        } catch(e) {}
        
        // 检查服务订单
        try {
          const svcRes = await api('/api/service-orders');
          const newOrders = (svcRes.success ? (svcRes.data || []) : []);
          const newOnes = newOrders.filter(o => o.status === '待处理' && !renderedServiceIds.has(o.id));
          if (newOnes.length > 0) {
            serviceOrders = newOrders;
            hasNew = true;
          } else {
            serviceOrders = newOrders;
          }
        } catch(e) {}
        
        // 检查上下桌单
        try {
          const tblRes = await api('/api/table-action-orders');
          const newOrders = (tblRes.success ? (tblRes.data || []) : []);
          const newOnes = newOrders.filter(o => o.status === '待处理' && !renderedCoachIds.has(o.id));
          if (newOnes.length > 0) {
            coachSessions = newOrders;
            hasNew = true;
          } else {
            coachSessions = newOrders;
          }
        } catch(e) {}
        
        // 增量渲染
        renderProductOrders(true);
        renderServiceOrders(true);
        renderCoachSessions(true);
        updateCounts();
        
        // 有新订单且警报开启时播放声音
        if (hasNew && alertEnabled && soundEnabled) {
          playAlertSound();
        }
        
        document.getElementById('lastRefresh').textContent = '上次检查: ' + new Date().toLocaleTimeString('zh-CN');
      } catch (e) {
        console.error('轮询失败:', e);
      }
    }

    // ===== 操作函数 =====

    async function completeOrder(orderId) {
      if (!confirm('确认完成此订单？')) return;
      try {
        const res = await api(`/api/admin/orders/${orderId}/complete`, { method: 'POST' });
        if (res.success) {
          showToast('订单已完成');
          fullRefresh();
        } else {
          showToast(res.error || '操作失败');
        }
      } catch (e) { showToast('操作失败: ' + e.message); }
    }

    async function cancelOrder(orderId) {
      if (!confirm('确认取消此订单？')) return;
      try {
        const res = await api(`/api/admin/orders/${orderId}/cancel`, { method: 'POST' });
        if (res.success) {
          showToast('订单已取消');
          fullRefresh();
        } else {
          showToast(res.error || '操作失败');
        }
      } catch (e) { showToast('操作失败: ' + e.message); }
    }

    async function updateServiceOrder(id, status) {
      try {
        const res = await api(`/api/service-orders/${id}/status`, { method: 'PUT', body: JSON.stringify({ status }) });
        if (res.success) { showToast('操作成功'); fullRefresh(); }
        else { showToast(res.error || '操作失败'); }
      } catch (e) { showToast('操作失败: ' + e.message); }
    }

    async function updateTableOrder(id, status) {
      try {
        const res = await api(`/api/table-action-orders/${id}/status`, { method: 'PUT', body: JSON.stringify({ status }) });
        if (res.success) { showToast('操作成功'); fullRefresh(); }
        else { showToast(res.error || '操作失败'); }
      } catch (e) { showToast('操作失败: ' + e.message); }
    }

    function openCancelItemModal(orderId, itemName, qty) {
      cancelItemOrderId = orderId;
      cancelItemName = itemName;
      cancelItemMaxQty = qty;
      document.getElementById('cancelItemName').value = itemName;
      document.getElementById('cancelItemCurrentQty').value = qty;
      let opts = '';
      for (let i = 1; i <= qty; i++) {
        opts += `<option value="${i}">${i} ${i === qty ? '(全部)' : ''}</option>`;
      }
      document.getElementById('cancelItemQty').innerHTML = opts;
      document.getElementById('cancelItemModal').classList.add('show');
    }

    function closeCancelItemModal() {
      document.getElementById('cancelItemModal').classList.remove('show');
      cancelItemOrderId = null;
      cancelItemName = null;
    }

    async function confirmCancelItem() {
      if (!cancelItemOrderId || !cancelItemName) return;
      const qty = parseInt(document.getElementById('cancelItemQty').value);
      try {
        const res = await api(`/api/admin/orders/${cancelItemOrderId}/cancel-item`, {
          method: 'POST',
          body: JSON.stringify({ itemName: cancelItemName, cancelQuantity: qty })
        });
        if (res.success) {
          showToast(res.orderEmpty ? '订单已自动取消' : '商品已取消');
          closeCancelItemModal();
          fullRefresh();
        } else {
          showToast(res.error || '操作失败');
        }
      } catch (e) { showToast('操作失败: ' + e.message); }
    }

    function logout() {
      localStorage.removeItem('adminToken');
      window.location.href = 'login.html';
    }

    function toggleGroup(el) {
      el.parentElement.classList.toggle('open');
    }

    // ===== 初始化 =====
    fullRefresh();
    // 显示开启声音覆盖层
    setTimeout(showSoundOverlay, 500);
    // 每10秒增量轮询新订单
    refreshInterval = setInterval(pollNewOrders, 10000);
  </script>
  <script src="nav-control.js"></script>
</body>
</html>
