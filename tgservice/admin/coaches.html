<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>助教管理 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar-logo img { width: 32px; height: 32px; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-danger { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    
    .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .level-filter { display: flex; gap: 8px; flex-wrap: wrap; }
    .level-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .level-btn:hover { background: rgba(212,175,55,0.1); border-color: rgba(212,175,55,0.3); }
    .level-btn.active { background: rgba(212,175,55,0.2); border-color: #d4af37; color: #d4af37; }
    
    .status-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
    .status-btn { padding: 6px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; color: rgba(255,255,255,0.5); font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .status-btn:hover { background: rgba(255,255,255,0.08); }
    .status-btn.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); color: #fff; }
    
    .coach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .coach-card { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 16px; border: 1px solid rgba(218,165,32,0.1); display: flex; gap: 16px; }
    .coach-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: rgba(30,30,40,0.5); }
    .coach-info { flex: 1; }
    .coach-name { font-size: 16px; font-weight: 500; }
    .coach-level { display: inline-block; padding: 4px 10px; background: rgba(212,175,55,0.2); border-radius: 12px; font-size: 12px; color: #d4af37; margin: 8px 0; }
    .coach-status { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; margin-left: 6px; }
    .coach-status.full-time { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .coach-status.part-time { background: rgba(241,196,15,0.2); color: #f1c40f; }
    .coach-status.resigned { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .coach-shift-badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; background: rgba(52,152,219,0.2); color: #3498db; margin-left: 6px; }
    .coach-meta { font-size: 12px; color: rgba(255,255,255,0.4); }
    .coach-actions { margin-top: 12px; display: flex; gap: 8px; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(218,165,32,0.2); }
    .modal-title { font-size: 18px; margin-bottom: 20px; }
    .modal-form { display: flex; flex-direction: column; gap: 12px; }
    .form-row { display: flex; flex-direction: column; gap: 4px; }
    .form-row label { font-size: 12px; color: rgba(255,255,255,0.6); }
    .form-row input, .form-row select { padding: 10px; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .form-row select option { background: #1a1a24; color: #fff; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; padding: 12px; }
    .btn-cancel { background: rgba(255,255,255,0.1); color: #fff; }
    
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 8px; z-index: 1001; display: none; }
    .toast.show { display: block; }

    /* 台桌号标签样式 */
    .table-tag {
      display: inline-block;
      padding: 2px 8px;
      margin: 2px 4px 2px 0;
      background: rgba(243,156,18,0.2);
      border: 1px solid rgba(243,156,18,0.4);
      border-radius: 4px;
      color: #f39c12;
      font-size: 12px;
    }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }

    /* 批量修改班次 */
    /* 批量班次筛选栏 */
    .batch-filter-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .batch-filter-bar label { font-size: 13px; color: rgba(255,255,255,0.6); }
    .batch-filter-btn { padding: 6px 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .batch-filter-btn:hover { background: rgba(212,175,55,0.1); border-color: rgba(212,175,55,0.3); }
    .batch-filter-btn.active { background: rgba(212,175,55,0.2); border-color: #d4af37; color: #d4af37; }
    .batch-shift-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
    .batch-shift-card { background: rgba(20,20,30,0.6); border-radius: 10px; padding: 12px; border: 1px solid rgba(218,165,32,0.1); display: flex; gap: 12px; align-items: center; }
    .batch-shift-card .batch-shift-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: rgba(30,30,40,0.5); flex-shrink: 0; }
    .batch-shift-card .batch-shift-info { flex: 1; min-width: 0; }
    .batch-shift-card .batch-shift-name { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .batch-shift-card .batch-shift-id { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 4px; }
    /* 批量班次 - 单选按钮样式 */
    .shift-radio-group { display: flex; gap: 8px; margin-top: 6px; }
    .shift-radio-group label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .shift-radio-group label.selected {
      background: rgba(212,175,55,0.2);
      border-color: #d4af37;
      color: #d4af37;
    }
    .shift-radio-group input[type="radio"] { display: none; }
    .batch-shift-card .batch-shift-save { font-size: 11px; color: rgba(46,204,113,0.7); margin-top: 4px; display: none; }
    .batch-shift-card .batch-shift-save.show { display: block; }

    /* 批量班次视图 - 搜索筛选 */
    .batch-search { margin-bottom: 16px; }
    .batch-search input { padding: 10px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; width: 100%; max-width: 400px; }
</style>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <div class="sidebar"></div>

  <div class="main">
    <!-- 批量修改班次视图 -->
    <div id="batchShiftView" style="display:none">
      <div class="page-header">
        <div class="page-title">批量更新班次</div>
        <button class="btn btn-sm" style="background:rgba(255,255,255,0.1);color:#fff" onclick="expandAllShifts()">全部展开</button>
      </div>
      <p style="color:rgba(255,255,255,0.5);margin-bottom:12px">为每位助教选择班次，修改后自动保存</p>
      <!-- 筛选栏 -->
      <div class="batch-filter-bar">
        <label>等级：</label>
        <div id="batchLevelFilter"></div>
        <label style="margin-left:16px">班次：</label>
        <div id="batchShiftFilter"></div>
        <span id="batchCount" style="margin-left:auto;font-size:13px;color:rgba(255,255,255,0.4)"></span>
      </div>
      <div class="batch-shift-grid" id="batchShiftGrid"></div>
    </div>

    <!-- 助教列表视图 -->
    <div id="mainView">
      <div class="page-header">
        <div class="page-title">助教管理</div>
        <div style="display:flex;gap:12px">
          <button class="btn btn-primary" style="background:linear-gradient(135deg,#3498db,#2980b9);color:#fff" onclick="openSyncModal()">🔄 同步水牌</button>
          <button class="btn btn-primary" onclick="showModal()">+ 添加助教</button>
        </div>
      </div>
      
      <div class="toolbar">
        <div class="level-filter" id="levelFilter"></div>
        <div class="status-filter" id="statusFilter">
          <button class="status-btn active" data-status="全部">全部</button>
          <button class="status-btn" data-status="全职">全职</button>
          <button class="status-btn" data-status="兼职">兼职</button>
          <button class="status-btn" data-status="离职">离职</button>
        </div>
      </div>
      
      <div class="coach-grid" id="coachGrid"></div>
    </div>
  </div>
  
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">添加助教</div>
      <div class="modal-form">
        <div class="form-row"><label>工号 *</label><input type="text" id="formEmployeeId" placeholder="如：1"></div>
        <div style="display:flex;gap:12px">
          <div class="form-row" style="flex:1"><label>艺名 *</label><input type="text" id="formStageName" placeholder="如：歪歪"></div>
          <div class="form-row" style="flex:1"><label>真实姓名</label><input type="text" id="formRealName" placeholder="如：张三"></div>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-row" style="flex:1"><label>手机号</label><input type="text" id="formPhone" placeholder="如：13800138000" maxlength="11"></div>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-row" style="flex:1"><label>等级</label>
            <select id="formLevel">
              <option value="初级">初级</option>
              <option value="中级">中级</option>
              <option value="高级">高级</option>
              <option value="女神">女神</option>
            </select>
          </div>
          <div class="form-row" style="flex:1"><label>陪打价(元/小时，最低70元)</label><input type="number" id="formPrice" step="1" value="109" min="70"></div>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-row" style="flex:1"><label>班次</label>
            <select id="formShift">
              <option value="早班">早班</option>
              <option value="晚班">晚班</option>
            </select>
          </div>
          <div class="form-row" style="flex:1"><label>状态</label>
            <select id="formStatus">
              <option value="全职">全职</option>
              <option value="兼职">兼职</option>
              <option value="离职">离职</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveCoach()">保存</button>
      </div>
    </div>
  </div>
  
  <!-- 同步水牌弹窗 -->
  <div class="modal" id="syncModal">
    <div class="modal-content" style="max-width:600px">
      <div class="modal-title">🔄 同步水牌</div>
      
      <!-- 加载中 -->
      <div id="syncLoading" style="text-align:center;padding:40px;display:none">
        <div>⏳ 检测中...</div>
      </div>
      
      <!-- 检测结果 -->
      <div id="syncResult" style="display:none">
        <!-- 孤儿数据区 -->
        <div id="orphanSection" style="display:none;margin-bottom:16px">
          <div style="font-size:14px;color:#e74c3c;margin-bottom:8px">⚠️ 孤儿数据（<span id="orphanCount">0</span>条）— 将从水牌删除：</div>
          <table style="width:100%;font-size:13px;border-collapse:collapse">
            <thead><tr style="color:rgba(255,255,255,0.5);border-bottom:1px solid rgba(255,255,255,0.1)">
              <th style="padding:8px;text-align:left"><input type="checkbox" id="orphanSelectAll" onchange="toggleOrphanAll(this.checked)"></th>
              <th style="padding:8px;text-align:left">编号</th>
              <th style="padding:8px;text-align:left">艺名</th>
              <th style="padding:8px;text-align:left">当前状态</th>
              <th style="padding:8px;text-align:left">原因</th>
            </tr></thead>
            <tbody id="orphanTableBody"></tbody>
          </table>
        </div>
        
        <!-- 缺失数据区 -->
        <div id="missingSection" style="display:none;margin-bottom:16px">
          <div style="font-size:14px;color:#2ecc71;margin-bottom:8px">➕ 缺失数据（<span id="missingCount">0</span>条）— 将添加到水牌：</div>
          <table style="width:100%;font-size:13px;border-collapse:collapse">
            <thead><tr style="color:rgba(255,255,255,0.5);border-bottom:1px solid rgba(255,255,255,0.1)">
              <th style="padding:8px;text-align:left"><input type="checkbox" id="missingSelectAll" onchange="toggleMissingAll(this.checked)"></th>
              <th style="padding:8px;text-align:left">编号</th>
              <th style="padding:8px;text-align:left">艺名</th>
              <th style="padding:8px;text-align:left">状态</th>
              <th style="padding:8px;text-align:left">班次</th>
              <th style="padding:8px;text-align:left">初始状态</th>
            </tr></thead>
            <tbody id="missingTableBody"></tbody>
          </table>
        </div>
        
        <!-- 离店残留台桌区 -->
        <div id="offDutyTableSection" style="display:none;margin-bottom:16px">
          <div style="font-size:14px;color:#f39c12;margin-bottom:8px">
            ⚠️ 离店助教残留台桌（<span id="offDutyTableCount">0</span>人）— 将清空台桌号：
          </div>
          <table style="width:100%;font-size:13px;border-collapse:collapse">
            <thead><tr style="color:rgba(255,255,255,0.5);border-bottom:1px solid rgba(255,255,255,0.1)">
              <th style="padding:8px;text-align:left">
                <input type="checkbox" id="offDutyTableSelectAll" onchange="toggleOffDutyTableAll(this.checked)">
              </th>
              <th style="padding:8px;text-align:left">编号</th>
              <th style="padding:8px;text-align:left">艺名</th>
              <th style="padding:8px;text-align:left">当前状态</th>
              <th style="padding:8px;text-align:left">残留台桌号</th>
            </tr></thead>
            <tbody id="offDutyTableTableBody"></tbody>
          </table>
        </div>

        <!-- 摘要 -->
        <div id="syncSummary" style="padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;font-size:13px">
          将删除 <span id="summaryDelete">0</span> 条，添加 <span id="summaryAdd">0</span> 条
        </div>
      </div>
      
      <!-- 无需同步提示 -->
      <div id="syncNoDiff" style="display:none;text-align:center;padding:40px">
        <div style="font-size:48px;margin-bottom:16px">✅</div>
        <div style="font-size:16px;color:#2ecc71">水牌数据已同步，无需操作</div>
      </div>
      
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeSyncModal()">关闭</button>
        <button class="btn btn-primary" id="syncConfirmBtn" onclick="executeSync()" style="display:none">确认同步</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';
    
    let coaches = [];
    let currentLevel = '全部';
    let currentStatus = '全部';
    let editingNo = null;
    let editingPhotos = []; // 保存编辑时的照片数据
    
    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }
    
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    
    async function loadCoaches() {
      coaches = await api('/api/admin/coaches');
      // 按工号排序
      coaches.sort((a, b) => {
        const idA = parseInt(a.employee_id) || 9999;
        const idB = parseInt(b.employee_id) || 9999;
        return idA - idB;
      });
      renderLevelFilter();
      renderCoaches();
      // 数据加载完成后，如果当前在批量班次视图，重新渲染
      if (window.location.hash === '#batch-shift') {
        renderBatchShift();
      }
    }
    
    function renderLevelFilter() {
      const levels = ['全部', ...new Set(coaches.map(c => c.level).filter(Boolean))];
      const filter = document.getElementById('levelFilter');
      
      // 计算每个等级的在职助教数量
      const activeCoaches = coaches.filter(c => c.status !== '离职');
      const levelCounts = { '全部': activeCoaches.length };
      activeCoaches.forEach(c => {
        if (c.level) {
          levelCounts[c.level] = (levelCounts[c.level] || 0) + 1;
        }
      });
      
      filter.innerHTML = levels.map(l => {
        const count = levelCounts[l] || 0;
        return `<button class="level-btn ${currentLevel === l ? 'active' : ''}" onclick="filterByLevel('${l}')">${l} <span style="opacity:0.6;font-size:12px;">(${count})</span></button>`;
      }).join('');
    }
    
    function filterByLevel(level) {
      currentLevel = level;
      renderLevelFilter();
      renderCoaches();
    }
    
    // 状态筛选点击事件
    document.querySelectorAll('.status-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatus = btn.dataset.status;
        renderCoaches();
      });
    });
    
    function getStatusClass(status) {
      if (status === '全职') return 'full-time';
      if (status === '兼职') return 'part-time';
      if (status === '离职') return 'resigned';
      return 'full-time';
    }
    
    function renderCoaches() {
      let filtered = currentLevel === '全部' ? coaches : coaches.filter(c => c.level === currentLevel);
      filtered = currentStatus === '全部' ? filtered : filtered.filter(c => c.status === currentStatus);
      const grid = document.getElementById('coachGrid');
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.3)">暂无助教数据</div>';
        return;
      }
      
      grid.innerHTML = filtered.map(c => `
        <div class="coach-card">
          <img class="coach-avatar" src="${c.photos?.[0] || '/static/avatar-default.png'}" onerror="this.src='/static/avatar-default.png'">
          <div class="coach-info">
            <div class="coach-name">${c.stage_name || '-'} (${c.employee_id || '-'}号)</div>
            <span class="coach-level">${c.level || '初级'}</span>
            <span class="coach-status ${getStatusClass(c.status)}">${c.status || '全职'}</span>
            <span class="coach-shift-badge">${c.shift || '早班'}</span>
            <div class="coach-meta">
              工号: ${c.employee_id || '-'} | 陪打价: ¥${c.price || 109}/小时 | 人气: <span style="color:#d4af37;font-weight:600">${c.popularity || 0}</span>
            </div>
            <div class="coach-actions">
              <button class="btn btn-sm" onclick="editCoach(${c.coach_no})">编辑</button>
              <button class="btn btn-sm btn-danger" onclick="deleteCoach(${c.coach_no})" style="display:${c.status === '离职' ? 'inline-block' : 'none'}">删除</button>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    function showModal(no = null) {
      editingNo = no;
      editingPhotos = []; // 重置照片数据，防止新增时继承上次的值
      document.getElementById('modalTitle').textContent = no ? '编辑助教' : '添加助教';
      document.getElementById('formEmployeeId').value = '';
      document.getElementById('formStageName').value = '';
      document.getElementById('formRealName').value = '';
      document.getElementById('formPhone').value = '';
      document.getElementById('formLevel').value = '初级';
      document.getElementById('formPrice').value = '109';
      document.getElementById('formShift').value = '早班';
      document.getElementById('formStatus').value = '全职';
      document.getElementById('modal').classList.add('show');
    }
    
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    
    async function editCoach(no) {
      const c = coaches.find(x => x.coach_no === no);
      if (!c) return;
      showModal(no);
      document.getElementById('formEmployeeId').value = c.employee_id || '';
      document.getElementById('formStageName').value = c.stage_name || '';
      document.getElementById('formRealName').value = c.real_name || '';
      document.getElementById('formPhone').value = c.phone || '';
      document.getElementById('formLevel').value = c.level || '初级';
      document.getElementById('formPrice').value = c.price || 109;
      document.getElementById('formShift').value = c.shift || '早班';
      document.getElementById('formStatus').value = c.status || '全职';
      // 保存原有照片数据
      editingPhotos = c.photos || [];
    }
    
    async function saveCoach() {
      const data = {
        employeeId: document.getElementById('formEmployeeId').value,
        stageName: document.getElementById('formStageName').value,
        realName: document.getElementById('formRealName').value,
        phone: document.getElementById('formPhone').value || null,
        level: document.getElementById('formLevel').value,
        price: parseFloat(document.getElementById('formPrice').value) || 109,
        shift: document.getElementById('formShift').value,
        status: document.getElementById('formStatus').value,
        photos: editingPhotos // 保留原有照片
      };
      
      if (!data.stageName) { showToast('请输入艺名'); return; }
      if (!data.employeeId) { showToast('请输入工号'); return; }
      if (data.price < 70) { showToast('陪打价不能低于70元'); return; }
      
      try {
        if (editingNo) {
          await api(`/api/admin/coaches/${editingNo}`, { method: 'PUT', body: JSON.stringify(data) });
          showToast('更新成功');
        } else {
          await api('/api/admin/coaches', { method: 'POST', body: JSON.stringify(data) });
          showToast('添加成功');
        }
        closeModal();
        loadCoaches();
      } catch (err) { showToast('操作失败'); }
    }
    
    async function deleteCoach(no) {
      if (!confirm('确定删除该助教吗？')) return;
      try {
        const result = await api(`/api/admin/coaches/${no}`, { method: 'DELETE' });
        if (result.error) {
          showToast(result.error);
        } else {
          showToast('删除成功');
          loadCoaches();
        }
      } catch (err) { showToast('删除失败'); }
    }
    
    // ===== 同步水牌功能 =====
    let syncData = { orphans: [], missing: [], offDutyWithTables: [] };

    async function openSyncModal() {
      document.getElementById('syncModal').classList.add('show');
      document.getElementById('syncLoading').style.display = 'block';
      document.getElementById('syncResult').style.display = 'none';
      document.getElementById('syncNoDiff').style.display = 'none';
      document.getElementById('syncConfirmBtn').style.display = 'none';
      
      try {
        const data = await api('/api/admin/coaches/sync-water-boards/preview');
        document.getElementById('syncLoading').style.display = 'none';
        
        if (data.orphanRecords.length === 0 && data.missingRecords.length === 0 && (!data.offDutyWithTables || data.offDutyWithTables.length === 0)) {
          document.getElementById('syncNoDiff').style.display = 'block';
          return;
        }
        
        syncData = { orphans: data.orphanRecords, missing: data.missingRecords, offDutyWithTables: data.offDutyWithTables || [] };
        renderSyncResult();
        document.getElementById('syncResult').style.display = 'block';
        document.getElementById('syncConfirmBtn').style.display = 'inline-block';
      } catch (err) {
        document.getElementById('syncLoading').style.display = 'none';
        showToast('❌ 检测失败：' + (err.message || '网络错误'));
        setTimeout(closeSyncModal, 2000);
      }
    }

    function renderSyncResult() {
      // 渲染孤儿表格
      const orphanSection = document.getElementById('orphanSection');
      if (syncData.orphans.length > 0) {
        orphanSection.style.display = 'block';
        document.getElementById('orphanCount').textContent = syncData.orphans.length;
        document.getElementById('orphanTableBody').innerHTML = syncData.orphans.map((o, i) => `
          <tr style="border-bottom:1px solid rgba(255,255,255,0.05)">
            <td style="padding:8px"><input type="checkbox" class="orphan-check" data-index="${i}" checked onchange="updateSyncSummary()"></td>
            <td style="padding:8px">${o.employee_id || '-'}</td>
            <td style="padding:8px">${o.stage_name}</td>
            <td style="padding:8px">${o.wb_status}</td>
            <td style="padding:8px;color:rgba(255,255,255,0.5)">${o.reason}</td>
          </tr>
        `).join('');
      } else {
        orphanSection.style.display = 'none';
      }
      
      // 渲染缺失表格
      const missingSection = document.getElementById('missingSection');
      if (syncData.missing.length > 0) {
        missingSection.style.display = 'block';
        document.getElementById('missingCount').textContent = syncData.missing.length;
        document.getElementById('missingTableBody').innerHTML = syncData.missing.map((m, i) => {
          const initStatus = m.shift === '晚班' ? '晚班空闲' : '早班空闲';
          return `
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05)">
              <td style="padding:8px"><input type="checkbox" class="missing-check" data-index="${i}" checked onchange="updateSyncSummary()"></td>
              <td style="padding:8px">${m.employee_id || '-'}</td>
              <td style="padding:8px">${m.stage_name}</td>
              <td style="padding:8px">${m.status}</td>
              <td style="padding:8px">${m.shift}</td>
              <td style="padding:8px;color:#2ecc71">${initStatus}</td>
            </tr>
          `;
        }).join('');
      } else {
        missingSection.style.display = 'none';
      }
      
      // ===== 新增：离店残留台桌 =====
      const offDutyData = syncData.offDutyWithTables || [];
      const offDutySection = document.getElementById('offDutyTableSection');
      if (offDutyData.length > 0) {
        offDutySection.style.display = 'block';
        document.getElementById('offDutyTableCount').textContent = offDutyData.length;
        document.getElementById('offDutyTableTableBody').innerHTML = offDutyData.map((o, i) => {
          const tableTags = o.table_no_list.map(t => `<span class="table-tag">${t}</span>`).join('');
          return `
            <tr style="border-bottom:1px solid rgba(255,255,255,0.05)">
              <td style="padding:8px">
                <input type="checkbox" class="offDutyTable-check" data-index="${i}" checked onchange="updateSyncSummary()">
              </td>
              <td style="padding:8px">${o.employee_id || '-'}</td>
              <td style="padding:8px">${o.stage_name}</td>
              <td style="padding:8px">${o.status}</td>
              <td style="padding:8px">${tableTags}</td>
            </tr>
          `;
        }).join('');
        document.getElementById('offDutyTableSelectAll').checked = true;
      } else {
        offDutySection.style.display = 'none';
      }
      
      // 全选checkbox状态
      document.getElementById('orphanSelectAll').checked = true;
      document.getElementById('missingSelectAll').checked = true;
      
      updateSyncSummary();
    }

    function toggleOrphanAll(checked) {
      document.querySelectorAll('.orphan-check').forEach(cb => cb.checked = checked);
      updateSyncSummary();
    }

    function toggleMissingAll(checked) {
      document.querySelectorAll('.missing-check').forEach(cb => cb.checked = checked);
      updateSyncSummary();
    }

    function toggleOffDutyTableAll(checked) {
      document.querySelectorAll('.offDutyTable-check').forEach(cb => cb.checked = checked);
      updateSyncSummary();
    }

    function updateSyncSummary() {
      const deleteCount = document.querySelectorAll('.orphan-check:checked').length;
      const addCount = document.querySelectorAll('.missing-check:checked').length;
      const clearCount = document.querySelectorAll('.offDutyTable-check:checked').length;
      document.getElementById('summaryDelete').textContent = deleteCount;
      document.getElementById('summaryAdd').textContent = addCount;
      document.getElementById('syncSummary').innerHTML =
        `将删除 <span id="summaryDelete">${deleteCount}</span> 条，添加 <span id="summaryAdd">${addCount}</span> 条，清空 <span id="summaryClear">${clearCount}</span> 人台桌号`;
    }

    async function executeSync() {
      const deleteOrphanIds = [];
      document.querySelectorAll('.orphan-check:checked').forEach(cb => {
        deleteOrphanIds.push(syncData.orphans[parseInt(cb.dataset.index)].coach_no);
      });
      
      const addMissingIds = [];
      document.querySelectorAll('.missing-check:checked').forEach(cb => {
        addMissingIds.push(syncData.missing[parseInt(cb.dataset.index)].coach_no);
      });
      
      // 收集要清理台桌的教练编号
      const clearTableCoachNos = [];
      document.querySelectorAll('.offDutyTable-check:checked').forEach(cb => {
        clearTableCoachNos.push(syncData.offDutyWithTables[parseInt(cb.dataset.index)].coach_no);
      });
      
      if (deleteOrphanIds.length === 0 && addMissingIds.length === 0 && clearTableCoachNos.length === 0) {
        showToast('请至少选择一条操作');
        return;
      }
      
      const btn = document.getElementById('syncConfirmBtn');
      btn.disabled = true;
      btn.textContent = '同步中...';
      
      try {
        const result = await api('/api/admin/coaches/sync-water-boards/execute', {
          method: 'POST',
          body: JSON.stringify({ deleteOrphanIds, addMissingIds, clearTableCoachNos })
        });
        
        if (result.error) {
          showToast('❌ 同步失败：' + result.error);
        } else {
          let msg = `✅ 同步完成`;
          if (result.deleted) msg += `：删除${result.deleted}条`;
          if (result.added) msg += `，添加${result.added}条`;
          if (result.cleared) msg += `，清空${result.cleared}人台桌号`;
          showToast(msg);
          closeSyncModal();
          loadCoaches(); // 刷新助教列表
        }
      } catch (err) {
        showToast('❌ 同步失败：网络错误');
      } finally {
        btn.disabled = false;
        btn.textContent = '确认同步';
      }
    }

    function closeSyncModal() {
      document.getElementById('syncModal').classList.remove('show');
      syncData = { orphans: [], missing: [], offDutyWithTables: [] };
    }
    
    loadCoaches();
  </script>
  <script>
    
    // ===== 批量修改班次 =====
    const savingShifts = {}; // 记录正在保存中的教练号，防止重复提交

    function checkHash() {
      const hash = window.location.hash;
      if (hash === '#batch-shift') {
        document.getElementById('batchShiftView').style.display = 'block';
        document.getElementById('mainView').style.display = 'none';
        // 更新侧边栏激活状态
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(item => {
          if (item.getAttribute('href') === 'coaches.html#batch-shift') {
            item.classList.add('active');
          }
        });
        // 展开助教管理菜单
        document.querySelectorAll('.nav-group').forEach(g => {
          if (g.querySelector('a[href="coaches.html#batch-shift"]')) {
            g.classList.add('open');
          }
        });
        renderBatchShift();
      } else {
        document.getElementById('batchShiftView').style.display = 'none';
        document.getElementById('mainView').style.display = 'block';
      }
    }

    // 批量班次筛选状态
    let batchLevelFilter = '全部';
    let batchShiftFilter = '全部';

    function renderBatchShift() {
      const grid = document.getElementById('batchShiftGrid');
      if (coaches.length === 0) {
        grid.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.3)">暂无助教数据</div>';
        return;
      }
      renderBatchFilters();
      // 筛选
      let filtered = coaches;
      if (batchLevelFilter !== '全部') filtered = filtered.filter(c => c.level === batchLevelFilter);
      if (batchShiftFilter !== '全部') filtered = filtered.filter(c => (c.shift || '早班') === batchShiftFilter);
      document.getElementById('batchCount').textContent = `显示 ${filtered.length} / ${coaches.length} 人`;
      if (filtered.length === 0) {
        grid.innerHTML = '<div style="text-align:center;padding:40px;color:rgba(255,255,255,0.3)">没有符合条件的助教</div>';
        return;
      }
      grid.innerHTML = filtered.map(c => {
        const currentShift = c.shift || '早班';
        return `
          <div class="batch-shift-card" data-coach-no="${c.coach_no}">
            <img class="batch-shift-avatar" src="${c.photos?.[0] || '/static/avatar-default.png'}" onerror="this.src='/static/avatar-default.png'">
            <div class="batch-shift-info">
              <div class="batch-shift-name">${c.stage_name || '-'} (${c.employee_id || '-'}号)</div>
              <div class="batch-shift-id">工号: ${c.employee_id || '-'} | 等级: ${c.level || '初级'}</div>
              <div class="shift-radio-group" data-coach-no="${c.coach_no}">
                <label class="shift-radio-label ${currentShift === '早班' ? 'selected' : ''}" data-coach-no="${c.coach_no}" data-shift="早班">
                  <input type="radio" name="shift-${c.coach_no}" value="早班" ${currentShift === '早班' ? 'checked' : ''}>
                  ☀️ 早班
                </label>
                <label class="shift-radio-label ${currentShift === '晚班' ? 'selected' : ''}" data-coach-no="${c.coach_no}" data-shift="晚班">
                  <input type="radio" name="shift-${c.coach_no}" value="晚班" ${currentShift === '晚班' ? 'checked' : ''}>
                  🌙 晚班
                </label>
              </div>
              <div class="batch-shift-save" id="save-indicator-${c.coach_no}">✓ 已保存</div>
            </div>
          </div>
        `;
      }).join('');
    }

    async function onShiftChange(coachNo, newShift) {
      // 更新单选按钮的选中样式
      const group = document.querySelector(`.shift-radio-group[data-coach-no="${coachNo}"]`);
      if (group) {
        group.querySelectorAll('.shift-radio-label').forEach(label => {
          label.classList.toggle('selected', label.dataset.shift === newShift);
        });
      }
      // 防止重复提交
      if (savingShifts[coachNo]) return;
      savingShifts[coachNo] = true;
      const indicator = document.getElementById(`save-indicator-${coachNo}`);
      if (indicator) {
        indicator.textContent = '⏳ 保存中...';
        indicator.style.color = '#f1c40f';
        indicator.classList.add('show');
      }
      try {
        // 使用专用班次修改API，只更新班次字段，不影响其他数据
        const res = await api(`/api/admin/coaches/${coachNo}/shift`, {
          method: 'PUT',
          body: JSON.stringify({ shift: newShift })
        });
        if (res.error) {
          throw new Error(res.error);
        }
        if (indicator) {
          indicator.textContent = '✓ 已保存';
          indicator.style.color = 'rgba(46,204,113,0.7)';
          indicator.classList.add('show');
          // 2秒后隐藏提示
          setTimeout(() => indicator.classList.remove('show'), 2000);
        }
        showToast(`${newShift}已保存`);
        // 更新本地数据
        const coach = coaches.find(c => c.coach_no == coachNo);
        if (coach) coach.shift = newShift;
      } catch (err) {
        if (indicator) {
          indicator.textContent = '✗ 保存失败';
          indicator.style.color = '#e74c3c';
          indicator.classList.add('show');
        }
        showToast('保存失败，请重试');
        // 恢复单选按钮到原值
        const coach = coaches.find(c => c.coach_no == coachNo);
        if (coach) {
          const origShift = coach.shift || '早班';
          group.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.checked = radio.value === origShift;
          });
          group.querySelectorAll('.shift-radio-label').forEach(label => {
            label.classList.toggle('selected', label.dataset.shift === origShift);
          });
        }
      } finally {
        savingShifts[coachNo] = false;
      }
    }

    // 为单选按钮绑定事件（事件委托）
    document.addEventListener('change', function(e) {
      if (e.target.type === 'radio' && e.target.name && e.target.name.startsWith('shift-')) {
        const coachNo = e.target.name.replace('shift-', '');
        onShiftChange(coachNo, e.target.value);
      }
    });

    function renderBatchFilters() {
      // 等级筛选
      const levels = ['全部', '网红', '女神', '高级', '中级', '初级'];
      document.getElementById('batchLevelFilter').innerHTML = levels.map(l => {
        const count = l === '全部' ? coaches.length : coaches.filter(c => c.level === l).length;
        return `<button class="batch-filter-btn ${batchLevelFilter === l ? 'active' : ''}" onclick="setBatchLevelFilter('${l}')">${l} (${count})</button>`;
      }).join('');
      // 班次筛选
      const shifts = ['全部', '早班', '晚班'];
      document.getElementById('batchShiftFilter').innerHTML = shifts.map(s => {
        const count = s === '全部' ? coaches.length : coaches.filter(c => (c.shift || '早班') === s).length;
        return `<button class="batch-filter-btn ${batchShiftFilter === s ? 'active' : ''}" onclick="setBatchShiftFilter('${s}')">${s} (${count})</button>`;
      }).join('');
    }

    function setBatchLevelFilter(level) {
      batchLevelFilter = level;
      renderBatchShift();
    }

    function setBatchShiftFilter(shift) {
      batchShiftFilter = shift;
      renderBatchShift();
    }

    function expandAllShifts() {
      // 滚动到顶部
      document.getElementById('batchShiftGrid').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // 监听 hash 变化
    window.addEventListener('hashchange', checkHash);
    // 页面加载时检查 hash
    checkHash();
</script>
  <script src="sidebar.js"></script>
</body>
