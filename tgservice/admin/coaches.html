<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>助教管理 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: rgba(20,20,30,0.8); border-right: 1px solid rgba(218,165,32,0.1); padding: 20px 0; flex-shrink: 0; }
    .sidebar-logo { padding: 0 20px 30px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .sidebar-logo img { width: 32px; height: 32px; }
    .sidebar-title { font-size: 16px; color: #d4af37; }
    .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .nav-icon { font-size: 18px; }
    
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-danger { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    
    .toolbar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .level-filter { display: flex; gap: 8px; flex-wrap: wrap; }
    .level-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer; transition: all 0.2s; }
    .level-btn:hover { background: rgba(212,175,55,0.1); border-color: rgba(212,175,55,0.3); }
    .level-btn.active { background: rgba(212,175,55,0.2); border-color: #d4af37; color: #d4af37; }
    
    .status-filter { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; }
    .status-btn { padding: 6px 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; color: rgba(255,255,255,0.5); font-size: 12px; cursor: pointer; transition: all 0.2s; }
    .status-btn:hover { background: rgba(255,255,255,0.08); }
    .status-btn.active { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3); color: #fff; }
    
    .coach-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .coach-card { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 16px; border: 1px solid rgba(218,165,32,0.1); display: flex; gap: 16px; }
    .coach-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: rgba(30,30,40,0.5); }
    .coach-info { flex: 1; }
    .coach-name { font-size: 16px; font-weight: 500; }
    .coach-level { display: inline-block; padding: 4px 10px; background: rgba(212,175,55,0.2); border-radius: 12px; font-size: 12px; color: #d4af37; margin: 8px 0; }
    .coach-status { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; margin-left: 6px; }
    .coach-status.full-time { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .coach-status.part-time { background: rgba(241,196,15,0.2); color: #f1c40f; }
    .coach-status.resigned { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .coach-meta { font-size: 12px; color: rgba(255,255,255,0.4); }
    .coach-actions { margin-top: 12px; display: flex; gap: 8px; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; border: 1px solid rgba(218,165,32,0.2); }
    .modal-title { font-size: 18px; margin-bottom: 20px; }
    .modal-form { display: flex; flex-direction: column; gap: 12px; }
    .form-row { display: flex; flex-direction: column; gap: 4px; }
    .form-row label { font-size: 12px; color: rgba(255,255,255,0.6); }
    .form-row input, .form-row select { padding: 10px; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .form-row select option { background: #1a1a24; color: #fff; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; padding: 12px; }
    .btn-cancel { background: rgba(255,255,255,0.1); color: #fff; }
    
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 8px; z-index: 1001; display: none; }
    .toast.show { display: block; }
  
    /* 折叠菜单 */
    .nav-group { border-bottom: 1px solid rgba(255,255,255,0.03); }
    .nav-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-group-title:hover { background: rgba(212,175,55,0.05); color: rgba(255,255,255,0.8); }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    
    .nav-submenu { display: none; background: rgba(0,0,0,0.2); }
    .nav-group.open .nav-submenu { display: block; }
    .nav-submenu .nav-item { padding-left: 48px; font-size: 13px; }
</style>
</head>
<body>

      </div>
    </div>

    <a href="vip-rooms.html" class="nav-item"><span class="nav-icon">🛋️</span> 包房管理</a>
    
    <!-- 助教管理 -->
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">👩‍🏫</span>

      </div>

    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">📝</span>

    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">⚙️</span>

        <span class="arrow">▼</span>

      <div class="nav-submenu">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span> 首页配置</a>

  <div class="main">
    <div class="page-header">
      <div class="page-title">助教管理</div>
      <button class="btn btn-primary" onclick="showModal()">+ 添加助教</button>
    </div>
    
    <div class="toolbar">
      <div class="level-filter" id="levelFilter"></div>
      <div class="status-filter" id="statusFilter">
        <button class="status-btn active" data-status="全部">全部</button>
        <button class="status-btn" data-status="全职">全职</button>
        <button class="status-btn" data-status="兼职">兼职</button>
        <button class="status-btn" data-status="离职">离职</button>
      </div>
    </div>
    
    <div class="coach-grid" id="coachGrid"></div>
  </div>
  
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">添加助教</div>
      <div class="modal-form">
        <div style="display:flex;gap:12px">
          <div class="form-row" style="flex:1"><label>编号</label><input type="text" id="formCoachNo" disabled></div>
          <div class="form-row" style="flex:1"><label>工号 *</label><input type="text" id="formEmployeeId" placeholder="如：1"></div>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-row" style="flex:1"><label>艺名 *</label><input type="text" id="formStageName" placeholder="如：歪歪"></div>
          <div class="form-row" style="flex:1"><label>真实姓名</label><input type="text" id="formRealName" placeholder="如：张三"></div>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-row" style="flex:1"><label>手机号</label><input type="text" id="formPhone" placeholder="如：13800138000" maxlength="11"></div>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-row" style="flex:1"><label>等级</label>
            <select id="formLevel">
              <option value="初级">初级</option>
              <option value="中级">中级</option>
              <option value="高级">高级</option>
              <option value="女神">女神</option>
            </select>
          </div>
          <div class="form-row" style="flex:1"><label>陪打价(元/小时，最低70元)</label><input type="number" id="formPrice" step="1" value="109" min="70"></div>
        </div>
        <div style="display:flex;gap:12px">
          <div class="form-row" style="flex:1"><label>状态</label>
            <select id="formStatus">
              <option value="全职">全职</option>
              <option value="兼职">兼职</option>
              <option value="离职">离职</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveCoach()">保存</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';
    
    let coaches = [];
    let currentLevel = '全部';
    let currentStatus = '全部';
    let editingNo = null;
    let editingPhotos = []; // 保存编辑时的照片数据
    
    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }
    
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    
    async function loadCoaches() {
      coaches = await api('/api/admin/coaches');
      // 按工号排序
      coaches.sort((a, b) => {
        const idA = parseInt(a.employee_id) || 9999;
        const idB = parseInt(b.employee_id) || 9999;
        return idA - idB;
      });
      renderLevelFilter();
      renderCoaches();
    }
    
    function renderLevelFilter() {
      const levels = ['全部', ...new Set(coaches.map(c => c.level).filter(Boolean))];
      const filter = document.getElementById('levelFilter');
      
      // 计算每个等级的在职助教数量
      const activeCoaches = coaches.filter(c => c.status !== '离职');
      const levelCounts = { '全部': activeCoaches.length };
      activeCoaches.forEach(c => {
        if (c.level) {
          levelCounts[c.level] = (levelCounts[c.level] || 0) + 1;
        }
      });
      
      filter.innerHTML = levels.map(l => {
        const count = levelCounts[l] || 0;
        return `<button class="level-btn ${currentLevel === l ? 'active' : ''}" onclick="filterByLevel('${l}')">${l} <span style="opacity:0.6;font-size:12px;">(${count})</span></button>`;
      }).join('');
    }
    
    function filterByLevel(level) {
      currentLevel = level;
      renderLevelFilter();
      renderCoaches();
    }
    
    // 状态筛选点击事件
    document.querySelectorAll('.status-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.status-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatus = btn.dataset.status;
        renderCoaches();
      });
    });
    
    function getStatusClass(status) {
      if (status === '全职') return 'full-time';
      if (status === '兼职') return 'part-time';
      if (status === '离职') return 'resigned';
      return 'full-time';
    }
    
    function renderCoaches() {
      let filtered = currentLevel === '全部' ? coaches : coaches.filter(c => c.level === currentLevel);
      filtered = currentStatus === '全部' ? filtered : filtered.filter(c => c.status === currentStatus);
      const grid = document.getElementById('coachGrid');
      
      if (filtered.length === 0) {
        grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.3)">暂无助教数据</div>';
        return;
      }
      
      grid.innerHTML = filtered.map(c => `
        <div class="coach-card">
          <img class="coach-avatar" src="${c.photos?.[0] || '/static/avatar-default.png'}" onerror="this.src='/static/avatar-default.png'">
          <div class="coach-info">
            <div class="coach-name">${c.stage_name || '-'} (${c.employee_id || '-'}号)</div>
            <span class="coach-level">${c.level || '初级'}</span>
            <span class="coach-status ${getStatusClass(c.status)}">${c.status || '全职'}</span>
            <div class="coach-meta">
              编号: ${c.coach_no} | 陪打价: ¥${c.price || 109}/小时 | 人气: <span style="color:#d4af37;font-weight:600">${c.popularity || 0}</span>
            </div>
            <div class="coach-actions">
              <button class="btn btn-sm" onclick="editCoach(${c.coach_no})">编辑</button>
              <button class="btn btn-sm btn-danger" onclick="deleteCoach(${c.coach_no})" style="display:${c.status === '离职' ? 'inline-block' : 'none'}">删除</button>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    function showModal(no = null) {
      editingNo = no;
      editingPhotos = []; // 重置照片数据，防止新增时继承上次的值
      document.getElementById('modalTitle').textContent = no ? '编辑助教' : '添加助教';
      document.getElementById('formCoachNo').value = no || '(自动生成)';
      document.getElementById('formEmployeeId').value = '';
      document.getElementById('formStageName').value = '';
      document.getElementById('formRealName').value = '';
      document.getElementById('formPhone').value = '';
      document.getElementById('formLevel').value = '初级';
      document.getElementById('formPrice').value = '109';
      document.getElementById('formStatus').value = '全职';
      document.getElementById('modal').classList.add('show');
    }
    
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    
    async function editCoach(no) {
      const c = coaches.find(x => x.coach_no === no);
      if (!c) return;
      showModal(no);
      document.getElementById('formEmployeeId').value = c.employee_id || '';
      document.getElementById('formStageName').value = c.stage_name || '';
      document.getElementById('formRealName').value = c.real_name || '';
      document.getElementById('formPhone').value = c.phone || '';
      document.getElementById('formLevel').value = c.level || '初级';
      document.getElementById('formPrice').value = c.price || 109;
      document.getElementById('formStatus').value = c.status || '全职';
      // 保存原有照片数据
      editingPhotos = c.photos || [];
    }
    
    async function saveCoach() {
      const data = {
        employeeId: document.getElementById('formEmployeeId').value,
        stageName: document.getElementById('formStageName').value,
        realName: document.getElementById('formRealName').value,
        phone: document.getElementById('formPhone').value || null,
        level: document.getElementById('formLevel').value,
        price: parseFloat(document.getElementById('formPrice').value) || 109,
        status: document.getElementById('formStatus').value,
        photos: editingPhotos // 保留原有照片
      };
      
      if (!data.stageName) { showToast('请输入艺名'); return; }
      if (!data.employeeId) { showToast('请输入工号'); return; }
      if (data.price < 70) { showToast('陪打价不能低于70元'); return; }
      
      try {
        if (editingNo) {
          await api(`/api/admin/coaches/${editingNo}`, { method: 'PUT', body: JSON.stringify(data) });
          showToast('更新成功');
        } else {
          await api('/api/admin/coaches', { method: 'POST', body: JSON.stringify(data) });
          showToast('添加成功');
        }
        closeModal();
        loadCoaches();
      } catch (err) { showToast('操作失败'); }
    }
    
    async function deleteCoach(no) {
      if (!confirm('确定删除该助教吗？')) return;
      try {
        const result = await api(`/api/admin/coaches/${no}`, { method: 'DELETE' });
        if (result.error) {
          showToast(result.error);
        } else {
          showToast('删除成功');
          loadCoaches();
        }
      } catch (err) { showToast('删除失败'); }
    }
    
    loadCoaches();
  </script>
  <script src="nav-control.js"></script>
  <script>
    // 折叠菜单切换
    function toggleGroup(el) {
      el.parentElement.classList.toggle('open');
    }
</script>
