<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水牌 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: rgba(20,20,30,0.8); border-right: 1px solid rgba(218,165,32,0.1); padding: 20px 0; flex-shrink: 0; overflow-y: auto; height: 100vh; position: sticky; top: 0; }
    .sidebar-logo { padding: 0 20px 30px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .sidebar-logo img { width: 32px; height: 32px; filter: sepia(60%) saturate(200%) hue-rotate(10deg); }
    .sidebar-title { font-size: 16px; color: #d4af37; }
    .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .nav-icon { font-size: 18px; }
    
    .nav-group { border-bottom: 1px solid rgba(255,255,255,0.03); }
    .nav-group-title { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .nav-group-title:hover { background: rgba(212,175,55,0.05); color: rgba(255,255,255,0.8); }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    .nav-submenu { display: none; background: rgba(0,0,0,0.2); }
    .nav-group.open .nav-submenu { display: block; }
    .nav-submenu .nav-item { padding-left: 48px; font-size: 13px; }
    
    .main { flex: 1; padding: 20px; overflow-y: auto; height: 100vh; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-title { font-size: 22px; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 8px; z-index: 1001; display: none; }
    .toast.show { display: block; }

    /* 状态分段 */
    .status-section { display: flex; gap: 12px; margin-bottom: 12px; border: 2px solid rgba(218,165,32,0.15); border-radius: 12px; padding: 10px; min-height: 60px; transition: border-color 0.3s, background 0.3s; }
    .status-section.drag-over { border-color: #d4af37; background: rgba(212,175,55,0.08); }
    .section-header { display: flex; flex-direction: column; justify-content: center; align-items: center; min-width: 70px; padding-right: 12px; border-right: 1px solid rgba(255,255,255,0.1); gap: 2px; cursor: pointer; }
    .section-header:hover .section-title { text-decoration: underline; }
    .section-title { font-size: 14px; font-weight: 600; color: #d4af37; white-space: nowrap; }
    .section-expand-icon { font-size: 13px; color: rgba(255,255,255,0.5); }
    .section-content { flex: 1; }

    /* 助教圆形卡片 */
    .coach-chips { display: flex; flex-wrap: wrap; gap: 10px; max-height: 80px; overflow: hidden; align-items: flex-start; padding-bottom: 4px; -webkit-touch-callout: none; }
    /* 早班空闲和晚班空闲显示两行 */
    .status-section[data-status="早班空闲"] .coach-chips,
    .status-section[data-status="晚班空闲"] .coach-chips { max-height: 170px; }
    .coach-chip {
      display: flex; flex-direction: column; align-items: center; width: 70px; padding: 6px 4px;
      background: rgba(20,20,30,0.6); border: 1px solid rgba(218,165,32,0.15);
      border-radius: 50%; cursor: grab; transition: transform 0.2s, box-shadow 0.2s;
      user-select: none; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none;
      -webkit-touch-callout: none; touch-action: manipulation; pointer-events: auto;
    }
    .coach-chip * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; pointer-events: none; }
    .coach-chip-avatar { -webkit-touch-callout: none; pointer-events: none; }
    .coach-chip:hover { transform: scale(1.08); box-shadow: 0 0 15px rgba(212,175,55,0.3); }
    .coach-chip-avatar {
      width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
      border: 2px solid rgba(218,165,32,0.3); margin-bottom: 4px;
    }
    .coach-chip-id { font-size: 11px; color: #d4af37; font-weight: 600; }
    .coach-chip-name { font-size: 11px; color: rgba(255,255,255,0.7); text-align: center; line-height: 1.1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 65px; }
    .coach-chip-table { font-size: 8px; color: rgba(255,255,255,0.3); }

    /* 状态颜色 */
    .status-section[data-status="早班上桌"] { border-color: rgba(52,152,219,0.3); }
    .status-section[data-status="早班空闲"] { border-color: rgba(46,204,113,0.3); background: rgba(255,255,255,0.18); }
    .status-section[data-status="晚班上桌"] { border-color: rgba(155,89,182,0.3); }
    .status-section[data-status="晚班空闲"] { border-color: rgba(241,196,15,0.3); background: rgba(255,255,255,0.18); }
    .status-section[data-status="早加班"] { border-color: rgba(230,126,34,0.3); }
    .status-section[data-status="晚加班"] { border-color: rgba(231,76,60,0.3); }
    .status-section[data-status="休息"] { border-color: rgba(149,165,166,0.3); }
    .status-section[data-status="公休"] { border-color: rgba(26,188,156,0.3); }
    .status-section[data-status="请假"] { border-color: rgba(52,73,94,0.3); }
    .status-section[data-status="乐捐"] { border-color: rgba(243,156,18,0.3); }
    .status-section[data-status="下班"] { border-color: rgba(44,62,80,0.3); }

    .status-section[data-status="早班上桌"] .section-title { color: #3498db; }
    .status-section[data-status="早班空闲"] .section-title { color: #2ecc71; }
    .status-section[data-status="晚班上桌"] .section-title { color: #9b59b6; }
    .status-section[data-status="晚班空闲"] .section-title { color: #f1c40f; }
    .status-section[data-status="早加班"] .section-title { color: #e67e22; }
    .status-section[data-status="晚加班"] .section-title { color: #e74c3c; }
    .status-section[data-status="休息"] .section-title { color: #95a5a6; }
    .status-section[data-status="公休"] .section-title { color: #1abc9c; }
    .status-section[data-status="请假"] .section-title { color: #7f8c8d; }
    .status-section[data-status="乐捐"] .section-title { color: #f39c12; }
    .status-section[data-status="下班"] .section-title { color: #bdc3c7; }

    .empty-section { text-align: center; padding: 16px; color: rgba(255,255,255,0.15); font-size: 12px; }

    /* 桌号输入弹窗 */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 380px; border: 1px solid rgba(218,165,32,0.3); }
    .modal-box-title { font-size: 18px; color: #d4af37; margin-bottom: 16px; }
    .modal-box-form { display: flex; flex-direction: column; gap: 12px; }
    .modal-box-form label { font-size: 13px; color: rgba(255,255,255,0.6); }
    .modal-box-form input, .modal-box-form select { padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .modal-box-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-box-actions .btn { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-cancel { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-confirm { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }

    /* 全屏按钮样式 */
    .fullscreen-btn { padding: 8px 16px; background: rgba(212,175,55,0.15); border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; color: #d4af37; font-size: 13px; cursor: pointer; }
    .fullscreen-btn:hover { background: rgba(212,175,55,0.25); }

    /* 长按修改状态弹窗 */
    .status-modal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
    .status-modal-btn { padding: 10px 8px; border-radius: 8px; font-size: 12px; cursor: pointer; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: #fff; transition: all 0.2s; }
    .status-modal-btn:hover { background: rgba(212,175,55,0.2); border-color: #d4af37; }
    .status-modal-btn.current { background: rgba(212,175,55,0.3); border-color: #d4af37; color: #d4af37; font-weight: 600; }

    /* 分段放大弹窗 */
    .section-expand-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; align-items: center; justify-content: center; }
    .section-expand-overlay.show { display: flex; }
    .section-expand-box { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 800px; max-height: 80vh; overflow-y: auto; border: 2px solid rgba(218,165,55,0.3); }
    .section-expand-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .section-expand-title { font-size: 18px; font-weight: 600; }
    .section-expand-count { font-size: 13px; color: rgba(255,255,255,0.4); }
    .section-expand-box .coach-chips { max-height: none; }
    .section-expand-box .coach-chip { width: 100px; padding: 10px 6px; }
    .section-expand-box .coach-chip-avatar { width: 56px; height: 56px; margin-bottom: 6px; }
    .section-expand-box .coach-chip-id { font-size: 11px; }
    .section-expand-box .coach-chip-name { font-size: 11px; max-width: 90px; }
    .section-expand-box .coach-chip-table { font-size: 10px; }
  </style>
</head>

    </div>

  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';
    
    const STATUS_LIST = [
      '早班上桌', '早班空闲', '晚班上桌', '晚班空闲',
      '早加班', '晚加班', '休息', '公休', '请假', '乐捐', '下班'
    ];
    
    let allData = [];
    
    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }
    
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
    
    // 全屏切换
    function toggleFullscreen() {
      const sidebar = document.querySelector('.sidebar');
      const btn = document.getElementById('fullscreenBtn');
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().then(() => {
          sidebar.style.display = 'none';
          btn.textContent = '🖥️ 退出全屏';
        }).catch(() => {
          sidebar.style.display = 'none';
          btn.textContent = '🖥️ 退出全屏';
        });
      } else {
        document.exitFullscreen().then(() => {
          sidebar.style.display = '';
          btn.textContent = '🖥️ 全屏';
        }).catch(() => {
          sidebar.style.display = '';
          btn.textContent = '🖥️ 全屏';
        });
      }
    }

    // 监听全屏状态变化（用户按 ESC 退出全屏时）
    document.addEventListener('fullscreenchange', () => {
      const sidebar = document.querySelector('.sidebar');
      const btn = document.getElementById('fullscreenBtn');
      if (!document.fullscreenElement) {
        sidebar.style.display = '';
        btn.textContent = '🖥️ 全屏';
      }
    });
    
    async function refreshData() {
      try {
        const res = await api('/api/water-boards');
        if (res.success) {
          allData = res.data;
          renderSections();
        } else {
          showToast('获取水牌数据失败');
        }
      } catch (e) {
        showToast('获取数据失败: ' + e.message);
      }
    }
    
    function renderSections() {
      const container = document.getElementById('statusSections');
      
      // 按状态分组
      const groups = {};
      STATUS_LIST.forEach(s => { groups[s] = []; });
      allData.forEach(item => {
        if (groups[item.status]) {
          groups[item.status].push(item);
        } else {
          groups[item.status] = [item];
        }
      });
      
      let html = '';
      STATUS_LIST.forEach(status => {
        const coaches = groups[status] || [];
        html += `
          <div class="status-section" data-status="${status}">
            <div class="section-header" onclick="showSectionExpand('${status}')">
              <span class="section-title">${status}</span>
              <span class="section-expand-icon">⛶ ${coaches.length}</span>
            </div>
            <div class="section-content">
              <div class="coach-chips">
                ${coaches.length === 0 ? '<div class="empty-section">暂无</div>' :
                  coaches.map(c => {
                    const eid = c.employee_id || c.coach_no;
                    const avatar = (c.photos && c.photos.length > 0) ? c.photos[0] : '/static/avatar-default.png';
                    return `
                    <div class="coach-chip" data-coach-no="${c.coach_no}"
                         ontouchstart="handleLongPressStart(event, '${c.coach_no}')" ontouchend="handleLongPressEnd(event)" ontouchmove="handleTouchMove(event)"
                         onmousedown="handleLongPressStart(event, '${c.coach_no}')" onmouseup="handleLongPressEnd(event)" onmouseleave="handleLongPressEnd(event)"
                         oncontextmenu="return false">
                      <img class="coach-chip-avatar" src="${avatar}" draggable="false"
                           onerror="this.src='/static/avatar-default.png'" oncontextmenu="return false">
                      <span class="coach-chip-id">${eid}</span>
                      <span class="coach-chip-name">${c.stage_name}</span>
                      ${c.table_no ? `<span class="coach-chip-table">${c.table_no}</span>` : ''}
                    </div>
                  `}).join('')
                }
              </div>
            </div>
          </div>
        `;
      });
      
      container.innerHTML = html;
    }
    
    // ===== 长按功能 =====
    let longPressTimer = null;
    let startX, startY;
    const LONG_PRESS_DURATION = 500; // 500ms长按阈值
    const MOVE_THRESHOLD = 10; // 移动10px视为拖动
    let currentCoachNo = null; // 当前长按的助教工号
    
    // ===== 镙按功能 =====
    function handleLongPressStart(e, coachNo) {
      // 阻止默认的长按菜单（右键菜单、iOS长按菜单等）
      e.preventDefault();
      e.stopPropagation();
      
      startX = e.touches ? e.touches[0].clientX : e.clientX;
      startY = e.touches ? e.touches[0].clientY : e.clientY;
      
      longPressTimer = setTimeout(() => {
        showStatusChangeModal(coachNo);
      }, LONG_PRESS_DURATION);
    }
    
    function handleLongPressEnd(e) {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }
    
    // 检测移动，如果移动超过阈值则取消长按
    function handleTouchMove(e) {
      if (!longPressTimer) return;
      
      const moveX = e.touches ? e.touches[0].clientX : e.clientX;
      const moveY = e.touches ? e.touches[0].clientY : e.clientY;
      
      if (Math.abs(moveX - startX) > MOVE_THRESHOLD || 
          Math.abs(moveY - startY) > MOVE_THRESHOLD) {
        clearTimeout(longPressTimer);
        longPressTimer = null;
        longPressFired = false;
      }
    }
    
    // ===== 状态修改弹窗 =====
    // 简化状态按钮列表（上桌/空闲/加班根据班次自动判断）
    const SIMPLE_STATUS_LIST = ['上桌', '空闲', '加班', '休息', '公休', '请假', '乐捐', '下班'];
    
    // 根据班次和简化状态获取实际状态
    function getActualStatus(simpleStatus, shift) {
      const shiftPrefix = shift === '晚班' ? '晚班' : '早班';
      switch (simpleStatus) {
        case '上桌': return shiftPrefix + '上桌';
        case '空闲': return shiftPrefix + '空闲';
        case '加班': return shiftPrefix === '早班' ? '早加班' : '晚加班';
        default: return simpleStatus;
      }
    }
    
    // 获取当前助教的简化状态显示名
    function getSimpleStatusDisplay(actualStatus) {
      if (actualStatus === '早班上桌' || actualStatus === '晚班上桌') return '上桌';
      if (actualStatus === '早班空闲' || actualStatus === '晚班空闲') return '空闲';
      if (actualStatus === '早加班' || actualStatus === '晚加班') return '加班';
      return actualStatus;
    }
    
    function showStatusChangeModal(coachNo) {
      currentCoachNo = coachNo;
      const coach = allData.find(c => c.coach_no === coachNo);
      if (!coach) return;
      
      const eid = coach.employee_id || coach.coach_no;
      const shift = coach.shift || '早班';
      document.getElementById('statusChangeCoachInfo').textContent = 
        `工号${eid} - ${coach.stage_name} (${shift})`;
      
      // 生成简化状态按钮
      const currentSimpleStatus = getSimpleStatusDisplay(coach.status);
      const grid = document.getElementById('statusChangeGrid');
      grid.innerHTML = SIMPLE_STATUS_LIST.map(status => `
        <button class="status-modal-btn ${currentSimpleStatus === status ? 'current' : ''}"
                onclick="changeStatus('${status}')">${status}</button>
      `).join('');
      
      document.getElementById('statusChangeModal').style.display = 'flex';
    }
    
    function closeStatusChangeModal() {
      document.getElementById('statusChangeModal').style.display = 'none';
      currentCoachNo = null;
    }
    
    async function changeStatus(simpleStatus) {
      if (!currentCoachNo) return;
      
      const coach = allData.find(c => c.coach_no === currentCoachNo);
      if (!coach) return;
      
      // 根据班次获取实际状态
      const actualStatus = getActualStatus(simpleStatus, coach.shift);
      
      try {
        const res = await api(`/api/water-boards/${currentCoachNo}/status`, {
          method: 'PUT',
          body: JSON.stringify({ status: actualStatus, table_no: coach.table_no || null })
        });
        
        if (res.success) {
          showToast(`${coach.stage_name}: ${coach.status} → ${actualStatus}`);
          closeStatusChangeModal();
          refreshData();
        } else {
          showToast(res.error || '更新失败');
        }
      } catch (err) {
        showToast('修改状态失败: ' + err.message);
      }
    }
    
    async function updateWaterBoardStatus(coach, oldStatus, newStatus, tableNo) {
      try {
        const res = await api(`/api/water-boards/${coach.coach_no}/status`, {
          method: 'PUT',
          body: JSON.stringify({ status: newStatus, table_no: tableNo })
        });
        
        if (res.success) {
          showToast(`${coach.stage_name}: ${oldStatus} → ${newStatus}`);
          refreshData();
        } else {
          showToast(res.error || '更新失败');
        }
      } catch (err) {
        showToast('更新失败: ' + err.message);
      }
    }
    
    function logout() {
      localStorage.removeItem('adminToken');
      window.location.href = 'login.html';
    }
    
    function toggleGroup(el) {
      el.parentElement.classList.toggle('open');
    }
    
    // ===== 分段放大功能 =====
    // 点击分段标题放大显示
    // 显示放大弹窗
    function showSectionExpand(status) {
      const coaches = allData.filter(c => c.status === status);
      // 获取状态对应的颜色
      const colorMap = {
        '早班上桌': '#3498db', '早班空闲': '#2ecc71', '晚班上桌': '#9b59b6', '晚班空闲': '#f1c40f',
        '早加班': '#e67e22', '晚加班': '#e74c3c', '休息': '#95a5a6', '公休': '#1abc9c',
        '请假': '#7f8c8d', '乐捐': '#f39c12', '下班': '#bdc3c7'
      };
      
      document.getElementById('sectionExpandTitle').textContent = status;
      document.getElementById('sectionExpandTitle').style.color = colorMap[status] || '#d4af37';
      document.getElementById('sectionExpandCount').textContent = `${coaches.length}人`;
      
      // 生成助教卡片
      const chips = document.getElementById('sectionExpandChips');
      chips.innerHTML = coaches.map(c => {
        const eid = c.employee_id || c.coach_no;
        const avatar = (c.photos && c.photos.length > 0) ? c.photos[0] : '/static/avatar-default.png';
        return `
          <div class="coach-chip" draggable="true" data-coach-no="${c.coach_no}"
               ondragstart="handleDragStart(event, '${c.coach_no}')" ondragend="handleDragEnd(event)"
               ontouchstart="handleLongPressStart(event, '${c.coach_no}')" ontouchend="handleLongPressEnd(event)" ontouchmove="handleTouchMove(event)"
               onmousedown="handleLongPressStart(event, '${c.coach_no}')" onmouseup="handleLongPressEnd(event)" onmouseleave="handleLongPressEnd(event)"
               oncontextmenu="return false">
            <img class="coach-chip-avatar" src="${avatar}" draggable="false" oncontextmenu="return false"
                 onerror="this.src='/static/avatar-default.png'">
            <span class="coach-chip-id">${eid}</span>
            <span class="coach-chip-name">${c.stage_name}</span>
            ${c.table_no ? `<span class="coach-chip-table">${c.table_no}</span>` : ''}
          </div>
        `;
      }).join('') || '<div class="empty-section">暂无</div>';
      
      document.getElementById('sectionExpandOverlay').classList.add('show');
    }
    
    // 点击空白处关闭放大弹窗
    document.getElementById('sectionExpandOverlay').addEventListener('click', (e) => {
      if (e.target.id === 'sectionExpandOverlay') {
        e.target.classList.remove('show');
      }
    });
    
    refreshData();
    
    // ===== 全局阻止长按菜单（鸿蒙系统兼容） =====
    // 在 capture 阶段捕获并阻止 contextmenu
    document.addEventListener('contextmenu', function(e) {
      const target = e.target;
      const chip = target.closest('.coach-chip');
      if (chip) {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        return false;
      }
    }, true); // capture 阶段
    
    // 阻止文本选择
    document.addEventListener('selectstart', function(e) {
      const chip = e.target.closest('.coach-chip');
      if (chip) {
        e.preventDefault();
        return false;
      }
    }, true);
    
    // 阻止拖拽
    document.addEventListener('dragstart', function(e) {
      const chip = e.target.closest('.coach-chip');
      if (chip && e.target.tagName === 'IMG') {
        e.preventDefault();
        return false;
      }
    }, true);
    
    // 页面进入时自动全屏
    setTimeout(() => {
      toggleFullscreen();
    }, 300);
  </script>
  <script src="nav-control.js"></script>
</body>
</html>
