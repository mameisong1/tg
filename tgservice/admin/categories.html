  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: rgba(20,20,30,0.8); border-right: 1px solid rgba(218,165,32,0.1); padding: 20px 0; }
    .sidebar-logo { padding: 0 20px 30px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .sidebar-logo img { width: 32px; height: 32px; filter: sepia(60%) saturate(200%) hue-rotate(10deg); }
    .sidebar-title { font-size: 16px; color: #d4af37; }
    .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .main { flex: 1; padding: 20px; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-danger { background: rgba(231,76,60,0.2); color: #e74c3c; }
    
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; }
    .card { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 20px; border: 1px solid rgba(218,165,32,0.1); }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .card-name { font-size: 18px; }
    .card-sort { 
      display: flex; 
      align-items: center; 
      gap: 8px; 
      background: rgba(255,255,255,0.05); 
      padding: 4px 8px; 
      border-radius: 6px; 
    }
    .card-sort input { 
      width: 50px; 
      padding: 4px 8px; 
      background: rgba(255,255,255,0.1); 
      border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 4px; 
      color: #fff; 
      text-align: center;
      font-size: 14px;
    }
    .card-sort-btn { 
      background: rgba(212,175,55,0.2); 
      border: none; 
      color: #d4af37; 
      padding: 4px 8px; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 12px;
    }
    .card-meta { font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
    .card-actions { display: flex; gap: 8px; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    
    .hint { 
      background: rgba(212,175,55,0.1); 
      border-radius: 8px; 
      padding: 12px 16px; 
      margin-bottom: 16px; 
      font-size: 13px; 
      color: rgba(255,255,255,0.7); 
    }
    .hint-icon { margin-right: 8px; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; }
    .modal-title { font-size: 18px; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 6px; display: block; }
    .form-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 8px; z-index: 1001; display: none; }
    .toast.show { display: block; }
  
    /* 折叠菜单 */
    .nav-group { border-bottom: 1px solid rgba(255,255,255,0.03); }
    .nav-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-group-title:hover { background: rgba(212,175,55,0.05); color: rgba(255,255,255,0.8); }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    
    .nav-submenu { display: none; background: rgba(0,0,0,0.2); }
    .nav-group.open .nav-submenu { display: block; }
    .nav-submenu .nav-item { padding-left: 48px; font-size: 13px; }
</style>
</head>
<body>
    <div class="sidebar">
    <div class="sidebar-logo">
      <img src="/images/logo.png" alt="Logo">
      <div>
        <div class="sidebar-title">天宫国际</div>
        <div class="sidebar-sub">后台管理系统</div>
      </div>
    </div>
    
    <a href="index.html" class="nav-item"><span class="nav-icon">📊</span> 数据概览</a>
    <a href="coaches.html" class="nav-item"><span class="nav-icon">👩</span> 助教管理</a>
    <a href="orders.html" class="nav-item"><span class="nav-icon">🛒</span> 订单管理</a>
    <a href="members.html" class="nav-item"><span class="nav-icon">👤</span> 会员管理</a>
    
    <div class="nav-group open">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">🏬</span>
        <span class="group-text">商品台桌包房</span>
        <span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="categories.html" class="nav-item active"><span class="nav-icon">📁</span> 分类管理</a>
        <a href="products.html" class="nav-item"><span class="nav-icon">📦</span> 商品管理</a>
        <a href="tables.html" class="nav-item"><span class="nav-icon">🎱</span> 台桌管理</a>
        <a href="vip-rooms.html" class="nav-item"><span class="nav-icon">🛋️</span> 包房管理</a>
      </div>
    </div>
    
    <div class="nav-group">
      <div class="nav-group-title" onclick="toggleGroup(this)">
        <span class="group-icon">⚙️</span>
        <span class="group-text">配置</span>
        <span class="arrow">▼</span>
      </div>
      <div class="nav-submenu">
        <a href="home.html" class="nav-item"><span class="nav-icon">🏠</span> 首页配置</a>
        <a href="users.html" class="nav-item"><span class="nav-icon">👥</span> 用户管理</a>
        <a href="settings.html" class="nav-item"><span class="nav-icon">🛡️</span> 系统配置</a>
      </div>
    </div>
  </div>
  
  
  
  <div class="main">
    <div class="page-header">
      <div class="page-title">分类管理</div>
      <button class="btn btn-primary" onclick="showModal()">+ 添加分类</button>
    </div>
    
    <div class="hint">
      <span class="hint-icon">💡</span>
      排序数字越小，前台分类按钮越靠前。数字相同则按名称排序。
    </div>
    
    <div class="card-grid" id="categoryGrid"></div>
  </div>
  
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-title">添加分类</div>
      <div class="form-group">
        <label class="form-label">分类名称 *</label>
        <input type="text" class="form-input" id="categoryName" placeholder="如：酒水、零食">
      </div>
      <div class="form-group">
        <label class="form-label">排序（数字越小越靠前）</label>
        <input type="number" class="form-input" id="categorySort" value="0" min="0">
      </div>
      <div style="display:flex;gap:12px">
        <button class="btn" style="flex:1;background:rgba(255,255,255,0.1);color:#fff" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" style="flex:1" onclick="saveCategory()">保存</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';
    
    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }
    
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    
    // 格式化为北京时区时间（数据库存的是UTC，需要转换）
    function formatBeijingTime(timeStr) {
      if (!timeStr) return '-';
      // 数据库存的是UTC时间，需要加8小时转为北京时间
      const d = new Date(timeStr + ' UTC');
      return d.toLocaleString('zh-CN', { 
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
    
    async function loadCategories() {
      const categories = await api('/api/admin/categories');
      document.getElementById('categoryGrid').innerHTML = categories.map(c => `
        <div class="card">
          <div class="card-header">
            <div class="card-name">${c.name}</div>
            <div class="card-sort">
              <input type="number" id="sort_${c.name.replace(/\s/g, '_')}" value="${c.sort_order || 0}" min="0">
              <button class="card-sort-btn" onclick="updateSort('${encodeURIComponent(c.name)}')">保存</button>
            </div>
          </div>
          <div class="card-meta">创建于 ${formatBeijingTime(c.created_at)}</div>
          <div class="card-actions">
            <button class="btn btn-sm btn-danger" onclick="deleteCategory('${encodeURIComponent(c.name)}')">删除</button>
          </div>
        </div>
      `).join('') || '<div style="color:rgba(255,255,255,0.3)">暂无分类</div>';
    }
    
    function showModal() { 
      document.getElementById('modal').classList.add('show'); 
      document.getElementById('categoryName').value = ''; 
      document.getElementById('categorySort').value = '0';
    }
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    
    async function saveCategory() {
      const name = document.getElementById('categoryName').value.trim();
      const sortOrder = parseInt(document.getElementById('categorySort').value) || 0;
      if (!name) { showToast('请输入分类名称'); return; }
      try {
        await api('/api/admin/categories', { method: 'POST', body: JSON.stringify({ name, sortOrder }) });
        showToast('添加成功');
        closeModal();
        loadCategories();
      } catch (err) { showToast('添加失败'); }
    }
    
    async function updateSort(name) {
      const decodedName = decodeURIComponent(name);
      const input = document.getElementById('sort_' + decodedName.replace(/\s/g, '_'));
      const sortOrder = parseInt(input.value) || 0;
      try {
        await api(`/api/admin/categories/${name}`, { method: 'PUT', body: JSON.stringify({ sortOrder }) });
        showToast('排序已保存');
        loadCategories();
      } catch (err) { showToast('保存失败'); }
    }
    
    async function deleteCategory(name) {
      if (!confirm('确定删除该分类吗？')) return;
      try {
        const result = await api(`/api/admin/categories/${name}`, { method: 'DELETE' });
        if (result.error) { showToast(result.error); return; }
        showToast('删除成功');
        loadCategories();
      } catch (err) { showToast('删除失败'); }
    }
    
    loadCategories();
  </script>
  <script src="nav-control.js"></script>
  <script>
    // 折叠菜单切换
    function toggleGroup(el) {
      el.parentElement.classList.toggle('open');
    }
</script>
</body>
