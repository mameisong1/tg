<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>开关场景管理 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar-logo img { width: 32px; height: 32px; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
    .btn-danger { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .btn-warning { background: rgba(255,165,0,0.2); color: #ffa500; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th { text-align: left; padding: 12px 16px; background: rgba(218,165,32,0.1); color: #d4af37; font-size: 13px; font-weight: 500; border-bottom: 1px solid rgba(218,165,32,0.2); }
    .data-table td { padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 13px; vertical-align: top; }
    .data-table tr:hover td { background: rgba(212,175,55,0.05); }
    .action-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
    .action-on { background: rgba(34,197,94,0.2); color: #22c55e; }
    .action-off { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .switch-count { font-size: 13px; color: rgba(255,255,255,0.7); }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 700px; border: 1px solid rgba(218,165,32,0.2); max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 18px; margin-bottom: 20px; }
    .modal-form { display: flex; flex-direction: column; gap: 16px; }
    .form-row { display: flex; flex-direction: column; gap: 8px; }
    .form-row label { font-size: 13px; color: rgba(255,255,255,0.6); }
    .form-row input, .form-row select { padding: 12px; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .form-hint { font-size: 12px; color: rgba(255,255,255,0.4); }
    .form-actions { display: flex; gap: 12px; margin-top: 8px; }
    .radio-group { display: flex; gap: 20px; }
    .radio-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .toast { position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; z-index: 2000; font-size: 14px; display: none; }
    .toast.success { background: rgba(34,197,94,0.9); color: #fff; }
    .toast.error { background: rgba(231,76,60,0.9); color: #fff; }
    
    /* 开关文本框样式 */
    #f_switches_text {
      width: 100%;
      min-height: 300px;
      padding: 12px;
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      resize: vertical;
      line-height: 1.6;
    }
    #f_switches_text:focus {
      outline: none;
      border-color: rgba(212,175,55,0.5);
      box-shadow: 0 0 0 2px rgba(212,175,55,0.1);
    }
  </style>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="sidebar"></div>

  <div class="main">
    <div class="page-header">
      <div class="page-title">🎬 开关场景管理</div>
      <button class="btn btn-primary" onclick="openAddModal()">+ 新增场景</button>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>排序</th>
          <th>场景名称</th>
          <th>设备类型</th>
          <th>动作</th>
          <th>开关数量</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="6" style="text-align:center;color:rgba(255,255,255,0.4);">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 新增/编辑弹窗 -->
  <div class="modal" id="formModal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">新增开关场景</div>
      <div class="modal-form">
        <input type="hidden" id="f_id" value="">
        <div class="form-row">
          <label>场景名称 *</label>
          <input type="text" id="f_scene_name" placeholder="如 深夜模式">
        </div>
        <div class="form-row">
          <label>设备类型 *</label>
          <div class="radio-group">
            <label><input type="radio" name="f_device_type" value="灯" checked> 💡 灯</label>
            <label><input type="radio" name="f_device_type" value="空调"> ❄️ 空调</label>
          </div>
        </div>
        <div class="form-row">
          <label>动作 *</label>
          <div class="radio-group">
            <label><input type="radio" name="f_action" value="ON" checked> 💡 开灯 (ON)</label>
            <label><input type="radio" name="f_action" value="OFF"> 🌙 关灯 (OFF)</label>
          </div>
        </div>
        <div class="form-row">
          <label>开关列表 *</label>
          <textarea id="f_switches_text" placeholder="每行一个开关，格式：开关ID<TAB>开关序号&#10;例如：&#10;0xa4c1380bbd942cbe	state_l1&#10;0xa4c1380bbd942cbe	state_l2&#10;0xa4c1380bbd942cbe	state_l3"></textarea>
          <div class="form-hint">每行一个开关，格式：开关ID + Tab + 开关序号。支持从 Excel 直接粘贴。</div>
        </div>
        <div class="form-row">
          <label>排序序号</label>
          <input type="number" id="f_sort_order" value="0" min="0">
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="saveRecord()">保存</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API = '/api/admin/switch-scenes';
    let allData = [];

    /**
     * 解析多行文本为开关数组
     * 支持 TAB 或逗号分隔
     */
    function parseSwitchesText(text) {
      const lines = text.trim().split('\n').filter(l => l.trim());
      const switches = lines.map(line => {
        let parts = line.split('\t');
        if (parts.length < 2) parts = line.split(',');
        if (parts.length >= 2) {
          return {
            switch_id: parts[0].trim(),
            switch_seq: parts[1].trim()
          };
        }
        return null;
      }).filter(Boolean);
      return switches;
    }

    /**
     * 将开关数组转为多行文本
     */
    function switchesToText(switches) {
      return switches.map(s => `${s.switch_id}\t${s.switch_seq}`).join('\n');
    }

    async function loadData() {
      try {
        const res = await fetch(API, { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') } });
        if (!res.ok) throw new Error('请求失败');
        allData = await res.json();

        const tbody = document.getElementById('tableBody');
        if (allData.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:rgba(255,255,255,0.4);">暂无数据</td></tr>';
          return;
        }

        tbody.innerHTML = allData.map(d => {
          let switchCount = 0;
          try {
            const sw = JSON.parse(d.switches);
            switchCount = sw.length;
          } catch (e) {
            switchCount = 0;
          }
          const deviceType = d.device_type || '灯';
          const deviceTypeBadge = deviceType === '灯' ? '💡' : '❄️';
          return `
          <tr>
            <td>${d.sort_order}</td>
            <td>${d.scene_name}</td>
            <td><span class="action-badge" style="background:rgba(255,255,255,0.1);color:#fff;">${deviceTypeBadge} ${deviceType}</span></td>
            <td><span class="action-badge ${d.action === 'ON' ? 'action-on' : 'action-off'}">${d.action === 'ON' ? '💡 开灯' : '🌙 关灯'}</span></td>
            <td class="switch-count">${switchCount} 个</td>
            <td>
              <button class="btn btn-sm btn-warning" onclick="openEditModal(${d.id})">编辑</button>
              <button class="btn btn-sm btn-danger" onclick="deleteRecord(${d.id})">删除</button>
            </td>
          </tr>
          `;
        }).join('');
      } catch (err) {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="6" style="text-align:center;color:#e74c3c;">加载失败: ${err.message}</td></tr>`;
      }
    }

    function openAddModal() {
      document.getElementById('f_id').value = '';
      document.getElementById('f_scene_name').value = '';
      document.getElementById('f_sort_order').value = '0';
      document.getElementById('modalTitle').textContent = '新增开关场景';
      document.getElementById('f_switches_text').value = '';
      // 重置 radio
      document.querySelector('input[name="f_device_type"][value="灯"]').checked = true;
      document.querySelector('input[name="f_action"][value="ON"]').checked = true;
      document.getElementById('formModal').classList.add('show');
    }

    function openEditModal(id) {
      const record = allData.find(d => d.id === id);
      if (!record) return;
      
      document.getElementById('f_id').value = id;
      document.getElementById('f_scene_name').value = record.scene_name;
      document.getElementById('f_sort_order').value = record.sort_order;
      document.getElementById('modalTitle').textContent = '编辑开关场景';
      
      // 设置设备类型
      const deviceType = record.device_type || '灯';
      document.querySelector(`input[name="f_device_type"][value="${deviceType}"]`).checked = true;
      
      // 设置动作
      document.querySelector(`input[name="f_action"][value="${record.action}"]`).checked = true;
      
      // 将开关数组转为多行文本
      try {
        const switches = JSON.parse(record.switches);
        document.getElementById('f_switches_text').value = switchesToText(switches);
      } catch (e) {
        document.getElementById('f_switches_text').value = record.switches;
      }
      
      document.getElementById('formModal').classList.add('show');
    }

    function closeModal() {
      document.getElementById('formModal').classList.remove('show');
    }

    async function saveRecord() {
      const id = document.getElementById('f_id').value;
      const scene_name = document.getElementById('f_scene_name').value.trim();
      const device_type = document.querySelector('input[name="f_device_type"]:checked').value;
      const action = document.querySelector('input[name="f_action"]:checked').value;
      const switchesText = document.getElementById('f_switches_text').value;
      const switches = parseSwitchesText(switchesText);
      const sort_order = parseInt(document.getElementById('f_sort_order').value) || 0;

      if (!scene_name) {
        showToast('请填写场景名称', 'error');
        return;
      }
      if (switches.length === 0) {
        showToast('请至少输入一个开关（格式：开关ID<TAB>开关序号）', 'error');
        return;
      }

      try {
        let res;
        if (id) {
          // 编辑模式
          res = await fetch(`${API}/${id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') },
            body: JSON.stringify({ scene_name, device_type, action, switches, sort_order })
          });
        } else {
          // 新增模式
          res = await fetch(API, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') },
            body: JSON.stringify({ scene_name, device_type, action, switches, sort_order })
          });
        }
        
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || '操作失败');
        closeModal();
        showToast(id ? '更新成功' : '新增成功', 'success');
        loadData();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    async function deleteRecord(id) {
      if (!confirm('确认删除该场景？')) return;
      try {
        const res = await fetch(`${API}/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + localStorage.getItem('adminToken') }
        });
        if (!res.ok) throw new Error('删除失败');
        showToast('删除成功', 'success');
        loadData();
      } catch (err) {
        showToast(err.message, 'error');
      }
    }

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = 'toast ' + type;
      t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    loadData();
  </script>
  <script src="sidebar.js"></script>
</body>
</html>
