<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户管理 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar-logo img { width: 32px; height: 32px; filter: sepia(60%) saturate(200%) hue-rotate(10deg); }
    .sidebar-logo img { width: 32px; height: 32px; filter: sepia(60%) saturate(200%) hue-rotate(10deg); }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }

    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-danger { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .data-table { width: 100%; background: rgba(20,20,30,0.6); border-radius: 12px; border: 1px solid rgba(218,165,32,0.1); overflow: hidden; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .data-table th { background: rgba(212,175,55,0.1); font-weight: 500; font-size: 13px; color: rgba(255,255,255,0.7); }
    .data-table td { font-size: 14px; }

    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; }
    .badge-admin { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .badge-store-manager { background: rgba(155,89,182,0.2); color: #9b59b6; }
    .badge-coach-manager { background: rgba(230,126,34,0.2); color: #e67e22; }
    .badge-coach { background: rgba(0,188,212,0.2); color: #00bcd4; }
    .badge-lobby-manager { background: rgba(33,150,243,0.2); color: #2196f3; }
    .badge-cashier { background: rgba(76,175,80,0.2); color: #4caf50; }
    .badge-waiter { background: rgba(158,158,158,0.2); color: #9e9e9e; }
    .badge-system { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .badge-owner { background: rgba(76,175,80,0.2); color: #4caf50; }

    .perm-tags { display: flex; flex-wrap: wrap; gap: 4px; }
    .perm-tag { font-size: 11px; padding: 2px 8px; background: rgba(255,255,255,0.05); border-radius: 4px; color: rgba(255,255,255,0.5); }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
    .modal-title { font-size: 18px; margin-bottom: 20px; }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
    .form-input { width: 100%; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    select.form-input { background: #1a1a2e; }
    select.form-input option { background: #1a1a2e; color: #fff; }
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 8px; z-index: 1001; display: none; }
    .toast.show { display: block; }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
</style>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <div class="sidebar"></div>
  </div>

  <div class="main">
    <div class="page-header">
      <div class="page-title">用户管理</div>
      <button class="btn btn-primary" onclick="showModal()">+ 添加用户</button>
    </div>

    <table class="data-table">
      <thead>
        <tr><th>用户名</th><th>姓名</th><th>角色</th><th>在职状态</th><th>权限</th><th>创建时间</th><th>操作</th></tr>
      </thead>
      <tbody id="usersTable"></tbody>
    </table>
  </div>

  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">添加用户</div>
      <div class="form-group">
        <label class="form-label">用户名(手机号)</label>
        <input type="text" class="form-input" id="formUsername">
      </div>
      <div class="form-group">
        <label class="form-label">姓名</label>
        <input type="text" class="form-input" id="formName" placeholder="请输入姓名">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="formPassword">
      </div>
      <div class="form-group">
        <label class="form-label">角色</label>
        <select class="form-input" id="formRole">
          <option value="管理员">管理员</option>
          <option value="店长">店长</option>
          <option value="助教管理">助教管理</option>
          <option value="教练">教练</option>
          <option value="前厅管理">前厅管理</option>
          <option value="收银">收银</option>
          <option value="服务员">服务员</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">在职状态</label>
        <select class="form-input" id="formEmploymentStatus">
          <option value="在职">在职</option>
          <option value="离职">离职</option>
        </select>
      </div>
      <div style="display:flex;gap:12px;margin-top:20px">
        <button class="btn" style="flex:1;background:rgba(255,255,255,0.1);color:#fff" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" style="flex:1" onclick="saveUser()">保存</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/time-util.js"></script>
  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';

    let users = [];
    let editingUsername = null;
    let currentUserRole = null;  // 当前用户角色

    // 获取当前用户角色
    function getCurrentUserRole() {
      try {
        const parts = token.split('.');
        if (parts.length < 2) return null;
        const b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
        while (b64.length % 4) b64 += '=';
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
          bytes[i] = binary.charCodeAt(i);
        }
        const payload = JSON.parse(new TextDecoder('utf-8').decode(bytes));
        return payload.role || '管理员';
      } catch (e) {
        return null;
      }
    }

    currentUserRole = getCurrentUserRole();

    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }

    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

    async function loadUsers() {
      users = await api('/api/admin/users');

      // 获取每个用户的权限
      const permsMap = {};
      for (const u of users) {
        try {
          const permRes = await api(`/api/admin/users/${u.username}/permissions`);
          if (permRes.success && permRes.data) {
            permsMap[u.username] = permRes.data.permissions || [];
          }
        } catch (e) {
          permsMap[u.username] = [];
        }
      }

      document.getElementById('usersTable').innerHTML = users.map(u => {
        let roleText = u.role || '管理员';
        let roleClass = 'badge-admin';
        const roleMap = {
          '管理员': ['管理员', 'badge-admin'],
          '店长': ['店长', 'badge-store-manager'],
          '助教管理': ['助教管理', 'badge-coach-manager'],
          '教练': ['教练', 'badge-coach'],
          '前厅管理': ['前厅管理', 'badge-lobby-manager'],
          '收银': ['收银', 'badge-cashier'],
          '服务员': ['服务员', 'badge-waiter'],
        };
        if (roleMap[u.role]) {
          roleText = roleMap[u.role][0];
          roleClass = roleMap[u.role][1];
        }
        if (u.username === 'tgadmin' && u.role === '管理员') {
          roleText = '超级管理员';
          roleClass = 'badge-system';
        }

        const perms = permsMap[u.username] || [];
        const permTags = perms.length > 0
          ? perms.map(p => `<span class="perm-tag">${p}</span>`).join('')
          : '<span style="color:rgba(255,255,255,0.3)">无</span>';

        const empStatus = u.employment_status || '在职';
        const empBadge = empStatus === '在职' ? 'badge-cashier' : 'badge-waiter';
        return `
          <tr>
            <td>${u.username}</td>
            <td>${u.name || '-'}</td>
            <td><span class="badge ${roleClass}">${roleText}</span></td>
            <td><span class="badge ${empBadge}">${empStatus}</span></td>
            <td><div class="perm-tags">${permTags}</div></td>
            <td>${formatBeijingTime(u.created_at)}</td>
            <td>
              ${u.username !== 'tgadmin' ? `<button class="btn btn-sm" onclick="editUser('${u.username}')">编辑</button> <button class="btn btn-sm btn-danger" onclick="deleteUser('${u.username}')">删除</button>` : '<span style="color:rgba(255,255,255,0.3)">不可操作</span>'}
            </td>
          </tr>
        `;
      }).join('');
    }

    function formatBeijingTime(timeStr) {
      return TimeUtil.format(timeStr);
    }

    function showModal() {
      editingUsername = null;
      document.getElementById('modalTitle').textContent = '添加用户';
      document.getElementById('formUsername').value = '';
      document.getElementById('formName').value = '';
      document.getElementById('formPassword').value = '';
      document.getElementById('formUsername').disabled = false;
      document.getElementById('formRole').disabled = false;
      document.getElementById('formEmploymentStatus').value = '在职';
      // 更新角色下拉框选项，默认选中店长
      updateRoleOptions('店长');
      document.getElementById('modal').classList.add('show');
    }

    function editUser(username) {
      const user = users.find(u => u.username === username);
      editingUsername = username;
      document.getElementById('modalTitle').textContent = '编辑用户';
      document.getElementById('formUsername').value = username;
      document.getElementById('formUsername').disabled = true;
      document.getElementById('formName').value = user?.name || '';
      document.getElementById('formPassword').value = '';
      document.getElementById('formRole').disabled = false;
      document.getElementById('formEmploymentStatus').value = user?.employment_status || '在职';
      // 先更新角色下拉框选项，再设置当前值
      updateRoleOptions(user?.role);
      document.getElementById('modal').classList.add('show');
    }

    function closeModal() { document.getElementById('modal').classList.remove('show'); }

    async function saveUser() {
      const username = document.getElementById('formUsername').value.trim();
      const name = document.getElementById('formName').value.trim();
      const password = document.getElementById('formPassword').value;
      const role = document.getElementById('formRole').value;
      const employmentStatus = document.getElementById('formEmploymentStatus').value;

      if (!editingUsername && !password) { showToast('请输入密码'); return; }

      try {
        if (editingUsername) {
          const updateData = { name, role, employmentStatus };
          if (password) updateData.password = password;
          await api(`/api/admin/users/${editingUsername}`, { method: 'PUT', body: JSON.stringify(updateData) });
          showToast('用户已更新');
        } else {
          if (!username) { showToast('请输入用户名'); return; }
          await api('/api/admin/users', { method: 'POST', body: JSON.stringify({ username, password, name, role }) });
          showToast('用户已添加');
        }
        closeModal();
        loadUsers();
      } catch (err) { showToast(err.message || '操作失败'); }
    }

    async function deleteUser(username) {
      if (!confirm(`确定删除用户 "${username}" 吗?`)) return;
      try {
        await api(`/api/admin/users/${username}`, { method: 'DELETE' });
        showToast('用户已删除');
        loadUsers();
      } catch (err) { showToast('删除失败'); }
    }

    // 根据当前用户角色更新下拉框选项，并设置当前选中值
    function updateRoleOptions(currentRole) {
      const roleSelect = document.getElementById('formRole');
      roleSelect.innerHTML = ''; // 清空

      // 店长不能授权管理员角色
      const roles = ['店长', '助教管理', '前厅管理', '收银', '教练', '服务员'];

      // 管理员可以授权所有角色
      if (currentUserRole === '管理员' || currentUserRole === 'admin' || currentUserRole === 'superadmin') {
        roles.unshift('管理员');
      }

      roles.forEach(role => {
        const option = document.createElement('option');
        option.value = role;
        option.textContent = role;
        roleSelect.appendChild(option);
      });

      // 设置当前选中的角色
      if (currentRole && roles.includes(currentRole)) {
        roleSelect.value = currentRole;
      }
    }

    loadUsers();
  </script>
  <script>
    </script>
  <script src="sidebar.js"></script>
</body>
</html>
