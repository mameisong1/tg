<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奖罚统计 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar-logo img { width: 32px; height: 32px; filter: sepia(60%) saturate(200%) hue-rotate(10deg); }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }

    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-danger { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .btn-success { background: rgba(76,175,80,0.2); color: #4caf50; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .btn-outline { background: transparent; border: 1px solid rgba(212,175,55,0.3); color: #d4af37; }
    .btn-outline.active { background: rgba(212,175,55,0.2); border-color: #d4af37; }

    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-group { display: flex; gap: 6px; }

    .data-table { width: 100%; background: rgba(20,20,30,0.6); border-radius: 12px; border: 1px solid rgba(218,165,32,0.1); border-collapse: collapse; }
    .data-table th, .data-table td { padding: 12px 14px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .data-table th { background: rgba(212,175,55,0.1); font-weight: 500; font-size: 13px; color: rgba(255,255,255,0.7); }
    .data-table td { font-size: 14px; }

    .amount-positive { color: #4caf50; }
    .amount-negative { color: #e74c3c; }

    .badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 11px; }
    .badge-executed { background: rgba(76,175,80,0.2); color: #4caf50; }
    .badge-pending { background: rgba(255,193,7,0.2); color: #ffc107; }

    /* 角色徽章样式 */
    .badge-coach { background: rgba(0,188,212,0.2); color: #00bcd4; }
    .badge-coach-manager { background: rgba(230,126,34,0.2); color: #e67e22; }
    .badge-waiter { background: rgba(158,158,158,0.2); color: #9e9e9e; }
    .badge-lobby-manager { background: rgba(33,150,243,0.2); color: #2196f3; }
    .badge-cashier { background: rgba(76,175,80,0.2); color: #4caf50; }
    .badge-store-manager { background: rgba(155,89,182,0.2); color: #9b59b6; }
    .badge-admin { background: rgba(231,76,60,0.2); color: #e74c3c; }

    /* 筛选下拉样式 */
    .filter-select { padding: 8px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.3); border-radius: 8px; color: #d4af37; font-size: 13px; cursor: pointer; }
    .filter-select option { background: #1a1a2e; color: #fff; }

    .stats-summary { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .stat-card { background: rgba(20,20,30,0.8); border-radius: 12px; padding: 16px 24px; border: 1px solid rgba(218,165,32,0.1); min-width: 150px; }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); }
    .stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; }
    .stat-value.positive { color: #4caf50; }
    .stat-value.negative { color: #e74c3c; }

    .batch-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(20,20,30,0.95); border: 1px solid #d4af37; border-radius: 12px; padding: 12px 24px; display: none; align-items: center; gap: 12px; z-index: 100; }
    .batch-bar.show { display: flex; }

    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 8px; z-index: 1001; display: none; }
    .toast.show { display: block; }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }

    .empty-state { text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.3); }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }

    /* 弹框样式 */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 1000;
      display: none; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal-content {
      background: #1a1a2e; border: 1px solid rgba(218,165,32,0.3);
      border-radius: 16px; width: 90%; max-width: 900px; max-height: 85vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 24px; border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-close {
      background: none; border: none; color: rgba(255,255,255,0.5);
      font-size: 24px; cursor: pointer; padding: 4px 8px; border-radius: 4px;
    }
    .modal-close:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.1);
      display: flex; justify-content: flex-end; gap: 12px;
    }

    /* 明细弹框统计栏 */
    .detail-stats {
      display: flex; gap: 20px; margin-bottom: 16px; padding: 12px 16px;
      background: rgba(212,175,55,0.05); border-radius: 8px;
    }
    .detail-stat-item { font-size: 14px; }
    .detail-stat-label { color: rgba(255,255,255,0.5); font-size: 12px; }
    .detail-stat-value { font-weight: 700; margin-top: 2px; }

    /* 弹框内金额输入框 */
    .amount-input {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; color: #fff; padding: 4px 8px; width: 90px;
      font-size: 13px; text-align: right;
    }
    .amount-input:focus { border-color: #d4af37; outline: none; }
    .amount-input:disabled { opacity: 0.5; cursor: not-allowed; }

    /* 弹框内明细表格 */
    .detail-table { width: 100%; border-collapse: collapse; }
    .detail-table th, .detail-table td {
      padding: 10px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
    }
    .detail-table th { color: rgba(255,255,255,0.6); font-weight: 500; }
    .detail-table tr:hover { background: rgba(212,175,55,0.03); }

    /* 删除按钮样式 */
    .btn-delete { background: rgba(231,76,60,0.1); color: #e74c3c; padding: 4px 10px; font-size: 12px; border-radius: 4px; cursor: pointer; border: 1px solid rgba(231,76,60,0.2); }
    .btn-delete:hover { background: rgba(231,76,60,0.2); }
  </style>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
  <div class="sidebar"></div>

  <div class="main">
    <div class="page-header">
      <div class="page-title">🏆 奖罚统计</div>
    </div>

    <!-- 篮选栏 -->
    <div class="filter-bar">
      <div class="filter-group" id="monthFilter">
        <button class="btn btn-outline active" data-month="this" onclick="setMonth('this')">本月</button>
        <button class="btn btn-outline" data-month="last" onclick="setMonth('last')">上月</button>
      </div>
      <div class="filter-group" id="typeFilter">
        <!-- 动态生成 -->
      </div>
      <div class="filter-group">
        <button class="btn btn-outline" data-status="" onclick="setExecStatus('')">全部状态</button>
        <button class="btn btn-outline active" data-status="未执行" onclick="setExecStatus('未执行')">未执行</button>
        <button class="btn btn-outline" data-status="已执行" onclick="setExecStatus('已执行')">已执行</button>
      </div>
      <select class="filter-select" id="roleFilter" onchange="setRole(this.value)">
        <option value="">全部角色</option>
        <option value="助教">助教</option>
        <option value="助教管理">助教管理</option>
        <option value="服务员">服务员</option>
        <option value="教练">教练</option>
        <option value="店长">店长</option>
        <option value="前厅管理">前厅管理</option>
        <option value="收银">收银</option>
        <option value="管理员">管理员</option>
      </select>
      <select class="filter-select" id="sortFilter" onchange="setSort(this.value)">
        <option value="">默认排序</option>
        <option value="amount_desc">金额降序</option>
        <option value="role">按角色</option>
        <option value="employee_id">按工号</option>
      </select>
      <button class="btn btn-primary" onclick="loadData()">🔍 查询</button>
      <button class="btn btn-outline" onclick="downloadExcel()">📥 下载Excel</button>
    </div>

    <!-- 统计摘要 -->
    <div class="stats-summary" id="statsSummary"></div>

    <!-- 数据表格 -->
    <table class="data-table">
      <thead>
        <tr>
          <th style="width:30px"><input type="checkbox" id="selectAll" onchange="toggleSelectAll(this)"></th>
          <th style="width:60px">工号</th>
          <th>姓名</th>
          <th>角色</th>
          <th>金额合计</th>
          <th style="width:100px">记录数</th>
          <th style="width:100px">执行状态</th>
          <th style="width:180px">操作</th>
        </tr>
      </thead>
      <tbody id="statsTable">
        <tr><td colspan="8" class="empty-state"><div class="empty-state-icon">📊</div><div>点击查询加载数据</div></td></tr>
      </tbody>
    </table>
  </div>

  <!-- 批量操作栏 -->
  <div class="batch-bar" id="batchBar">
    <span id="batchCount">已选 0 条</span>
    <button class="btn btn-success btn-sm" onclick="batchExecute()">批量执行</button>
    <button class="btn btn-sm" style="background:rgba(255,255,255,0.1);color:#fff" onclick="clearSelection()">取消</button>
  </div>

  <!-- 明细弹框 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle">奖罚明细</div>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <!-- 弹框内统计 -->
        <div class="detail-stats" id="detailStats"></div>
        <!-- 明细表格 -->
        <table class="detail-table">
          <thead>
            <tr>
              <th>奖罚类型</th>
              <th>确定日期</th>
              <th style="width:120px">金额</th>
              <th>备注</th>
              <th style="width:80px">状态</th>
              <th style="width:70px" id="deleteColHeader">操作</th>
            </tr>
          </thead>
          <tbody id="detailTableBody">
          </tbody>
        </table>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()">关闭</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/time-util.js"></script>
  <!-- SheetJS for Excel export -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';

    let currentMonth = '';
    let currentType = '';
    let currentExecStatus = '未执行';
    let currentRole = '';      // 角色筛选
    let currentSort = '';      // 排序
    let rewardTypes = [];
    let summaryData = [];       // 统计摘要数据
    let selectedIds = new Set();

    // 弹框相关
    let currentDetailPhone = '';
    let currentDetailRecords = [];
    let isAdmin = false;  // 管理员标识

    // 从 token 解析角色判断是否管理员
    function checkAdminRole() {
      try {
        const parts = token.split('.');
        if (parts.length !== 3) return false;
        let b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
        while (b64.length % 4) b64 += '=';
        const binary = atob(b64);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
        const payload = JSON.parse(new TextDecoder('utf-8').decode(bytes));
        const role = payload.role || '';
        return ['管理员', '超级管理员'].includes(role);
      } catch (e) {
        return false;
      }
    }

    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ============ 初始化 ============
    async function init() {
      // 初始化管理员标识
      isAdmin = checkAdminRole();
      // 非管理员隐藏操作列
      if (!isAdmin) {
        const delHeader = document.getElementById('deleteColHeader');
        if (delHeader) delHeader.style.display = 'none';
      }

      const res = await api('/api/admin/reward-penalty/types');
      if (res.success && res.types) {
        rewardTypes = res.types;
        renderTypeFilter();
      }
      currentMonth = TimeUtil.getBeijingMonth();
      loadData();
    }

    function renderTypeFilter() {
      const container = document.getElementById('typeFilter');
      let html = '<button class="btn btn-outline active" data-type="" onclick="setType(\'\')">全部类型</button>';
      rewardTypes.forEach(t => {
        html += `<button class="btn btn-outline" data-type="${t['奖罚类型']}" onclick="setType('${t['奖罚类型']}')">${t['奖罚类型']}</button>`;
      });
      container.innerHTML = html;
    }

    function setMonth(val) {
      if (val === 'this') {
        currentMonth = TimeUtil.getBeijingMonth();
      } else {
        currentMonth = TimeUtil.getPrevBeijingMonth();
      }
      document.querySelectorAll('#monthFilter .btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`#monthFilter .btn[data-month="${val}"]`).classList.add('active');
    }

    function setType(val) {
      currentType = val;
      document.querySelectorAll('#typeFilter .btn').forEach(b => b.classList.remove('active'));
      const btn = document.querySelector(`#typeFilter .btn[data-type="${val === null ? '' : val}"]`);
      if (btn) btn.classList.add('active');
    }

    function setExecStatus(val) {
      currentExecStatus = val;
      const filterBar = document.querySelectorAll('.filter-group')[2];
      filterBar.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
      filterBar.querySelector(`.btn[data-status="${val}"]`).classList.add('active');
    }

    function setRole(val) {
      currentRole = val;
    }

    function setSort(val) {
      currentSort = val;
    }

    // ============ 第一阶段：加载统计摘要 ============
    async function loadData() {
      try {
        const params = new URLSearchParams({
          month: currentMonth,
          type: currentType,
          execStatus: currentExecStatus,
          role: currentRole,
          sort: currentSort
        });
        const res = await api(`/api/reward-penalty/stats?${params.toString()}`);
        if (res.success) {
          summaryData = res.data || [];
          renderSummary(res.summary);
          renderTable();
        }
      } catch (e) {
        showToast('加载失败: ' + e.message);
      }
    }

    function renderSummary(summary) {
      if (!summary) {
        document.getElementById('statsSummary').innerHTML = '';
        return;
      }
      const container = document.getElementById('statsSummary');
      container.innerHTML = `
        <div class="stat-card">
          <div class="stat-label">合计金额</div>
          <div class="stat-value ${summary.totalAmount >= 0 ? 'positive' : 'negative'}">¥${Math.round(summary.totalAmount || 0)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">奖金合计</div>
          <div class="stat-value positive">+¥${Math.round(summary.totalBonus || 0)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">罚金合计</div>
          <div class="stat-value negative">-¥${Math.round(summary.totalPenalty || 0)}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">总记录数</div>
          <div class="stat-value">${summary.totalCount || 0}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">未执行</div>
          <div class="stat-value" style="color:#ffc107">${summary.pendingCount || 0}</div>
        </div>

      `;
    }

    // ============ 渲染统计表格 ============
    function renderTable() {
      const tbody = document.getElementById('statsTable');
      if (summaryData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state"><div class="empty-state-icon">📭</div><div>暂无奖罚数据</div></td></tr>';
        return;
      }

      let html = '';
      summaryData.forEach((person, idx) => {
        const empId = person.employee_id || '-';
        const role = person.role || '未知';
        const roleBadgeClass = getRoleBadgeClass(role);
        const statusText = person.pendingCount > 0
          ? `<span class="badge badge-pending">${person.pendingCount}/${person.totalCount} 未执行</span>`
          : `<span class="badge badge-executed">${person.totalCount}/${person.totalCount} 已执行</span>`;

        html += `<tr>
          <td><input type="checkbox" class="person-check" data-idx="${idx}" ${person.pendingCount === 0 ? 'disabled' : ''} onchange="togglePerson(${idx}, this.checked)"></td>
          <td>${empId}</td>
          <td>${person.name}</td>
          <td><span class="badge ${roleBadgeClass}">${role}</span></td>
          <td class="${person.personTotal >= 0 ? 'amount-positive' : 'amount-negative'}" id="amount-${idx}">${person.personTotal >= 0 ? '+' : ''}¥${Math.round(person.personTotal || 0)}</td>
          <td>${person.totalCount || 0}</td>
          <td>${statusText}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="openDetail(${idx})">查看明细</button>
            ${person.pendingCount > 0 ? `<button class="btn btn-success btn-sm" onclick="executePerson(${idx})">执行完毕</button>` : ''}
          </td>
        </tr>`;
      });

      tbody.innerHTML = html;
    }

    // 角色徽章样式映射
    function getRoleBadgeClass(role) {
      const roleMap = {
        '助教': 'badge-coach',
        '助教管理': 'badge-coach-manager',
        '服务员': 'badge-waiter',
        '教练': 'badge-coach',
        '店长': 'badge-store-manager',
        '前厅管理': 'badge-lobby-manager',
        '收银': 'badge-cashier',
        '管理员': 'badge-admin'
      };return roleMap[role] || 'badge-waiter';
    }

    // ============ 第二阶段：弹框加载明细 ============
    async function openDetail(idx) {
      const person = summaryData[idx];
      if (!person) return;

      currentDetailPhone = person.phone;
      const empId = person.employee_id || '-';
      document.getElementById('modalTitle').textContent = `${empId}号 ${person.name} - 奖罚明细`;

      // 先清空，显示加载中
      document.getElementById('detailTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:rgba(255,255,255,0.4)">加载中...</td></tr>';
      document.getElementById('detailStats').innerHTML = '';
      showModal();

      try {
        const res = await api(`/api/reward-penalty/stats/detail?phone=${person.phone}&month=${currentMonth}&type=${encodeURIComponent(currentType)}&execStatus=${encodeURIComponent(currentExecStatus)}`);
        if (res.success) {
          currentDetailRecords = res.data || [];
          renderDetailModal(person);
        }
      } catch (e) {
        document.getElementById('detailTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:#e74c3c">加载失败: ' + e.message + '</td></tr>';
      }
    }

    function renderDetailModal(person) {
      if (currentDetailRecords.length === 0) {
        document.getElementById('detailTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;padding:20px;color:rgba(255,255,255,0.4)">暂无明细数据</td></tr>';
        document.getElementById('detailStats').innerHTML = '';
        return;
      }

      // 计算弹框内统计
      let totalAmount = 0, totalBonus = 0, totalPenalty = 0;
      currentDetailRecords.forEach(r => {
        totalAmount += r.amount || 0;
        if (r.amount > 0) totalBonus += r.amount;
        else totalPenalty += Math.abs(r.amount);
      });

      document.getElementById('detailStats').innerHTML = `
        <div class="detail-stat-item">
          <div class="detail-stat-label">合计</div>
          <div class="detail-stat-value ${totalAmount >= 0 ? 'amount-positive' : 'amount-negative'}" id="detailTotalAmount">¥${Math.round(totalAmount)}</div>
        </div>
        <div class="detail-stat-item">
          <div class="detail-stat-label">奖金</div>
          <div class="detail-stat-value amount-positive">+¥${Math.round(totalBonus)}</div>
        </div>
        <div class="detail-stat-item">
          <div class="detail-stat-label">罚金</div>
          <div class="detail-stat-value amount-negative">-¥${Math.round(totalPenalty)}</div>
        </div>
      `;

      // 渲染明细表格
      let html = '';
      currentDetailRecords.forEach((r, rIdx) => {
        const isExecuted = r.exec_status === '已执行';
        const inputDisabled = isExecuted ? 'disabled' : '';
        // 删除按钮：只有管理员可见且只对未执行记录显示
        const deleteBtn = (isAdmin && !isExecuted) ? `<button class="btn-delete" onclick="deleteRecord(${rIdx})">删除</button>` : '<span style="color:rgba(255,255,255,0.2)">-</span>';
        html += `<tr data-ridx="${rIdx}" data-id="${r.id}">
          <td>${r.type}</td>
          <td>${r.confirm_date}</td>
          <td>
            <input type="number" step="1" class="amount-input"
                   value="${Math.round(r.amount)}"
                   data-id="${r.id}" data-ridx="${rIdx}" data-original="${r.amount}"
                   ${inputDisabled}
                   onblur="saveAmount(this)" onkeydown="if(event.key==='Enter'){this.blur(); event.preventDefault();}"
            />
          </td>
          <td>${r.remark || '-'}</td>
          <td><span class="badge ${isExecuted ? 'badge-executed' : 'badge-pending'}">${r.exec_status}</span></td>
          <td>${deleteBtn}</td>
        </tr>`;
      });
      document.getElementById('detailTableBody').innerHTML = html;
    }

    // ============ 金额修改保存 ============
    async function saveAmount(inputEl) {
      const id = parseInt(inputEl.dataset.id);
      const rIdx = parseInt(inputEl.dataset.ridx);
      const newAmount = parseFloat(inputEl.value);
      const originalAmount = parseFloat(inputEl.dataset.original);

      if (isNaN(newAmount) || newAmount === originalAmount) {
        inputEl.value = Math.round(originalAmount);
        return;
      }

      try {
        const res = await api(`/api/reward-penalty/detail/${id}`, {
          method: 'POST',
          body: JSON.stringify({ amount: newAmount })
        });
        if (res.success) {
          // 更新本地数据
          currentDetailRecords[rIdx].amount = newAmount;
          inputEl.dataset.original = newAmount;

          // 更新弹框内统计
          updateDetailStats();

          // 更新主表对应人员的金额
          updateMainTableAmount();

          showToast('金额已更新');
        } else {
          showToast(res.error || '保存失败');
          inputEl.value = Math.round(originalAmount);
        }
      } catch (e) {
        showToast('保存失败: ' + e.message);
        inputEl.value = Math.round(originalAmount);
      }
    }

    // ============ 删除奖罚明细（仅管理员）============
    async function deleteRecord(rIdx) {
      if (!isAdmin) {
        showToast('只有管理员才能删除');
        return;
      }
      const record = currentDetailRecords[rIdx];
      if (!record) return;

      // 已执行记录禁止删除
      if (record.exec_status === '已执行') {
        showToast('已执行记录不可删除');
        return;
      }

      // 确认删除
      const confirmMsg = `确认删除该奖罚记录？\n类型: ${record.type}\n金额: ¥${Math.round(record.amount)}\n日期: ${record.confirm_date}`;
      if (!confirm(confirmMsg)) return;

      try {
        const res = await api(`/api/reward-penalty/detail/${record.id}`, { method: 'DELETE' });
        if (res.success) {
          // 从本地数据中移除
          currentDetailRecords.splice(rIdx, 1);

          // 更新弹框内统计
          updateDetailStats();

          // 更新主表对应人员的金额和计数
          const idx = summaryData.findIndex(p => p.phone === currentDetailPhone);
          if (idx !== -1) {
            summaryData[idx].totalCount -= 1;
            summaryData[idx].pendingCount -= 1;
            summaryData[idx].personTotal -= record.amount;
            // 移除 pendingIds 中的该 ID
            const pidIdx = summaryData[idx].pendingIds.indexOf(record.id);
            if (pidIdx !== -1) summaryData[idx].pendingIds.splice(pidIdx, 1);
          }

          // 重新渲染弹框内容
          renderDetailModal(summaryData[idx] || { name: '', employee_id: '-' });

          // 更新主表显示
          renderTable();

          showToast('已删除');
        } else {
          showToast(res.error || '删除失败');
        }
      } catch (e) {
        showToast('删除失败: ' + e.message);
      }
    }

    function updateDetailStats() {
      let totalAmount = 0, totalBonus = 0, totalPenalty = 0;
      currentDetailRecords.forEach(r => {
        totalAmount += r.amount || 0;
        if (r.amount > 0) totalBonus += r.amount;
        else totalPenalty += Math.abs(r.amount);
      });
      const el = document.getElementById('detailTotalAmount');
      if (el) {
        el.textContent = `¥${Math.round(totalAmount)}`;
        el.className = `detail-stat-value ${totalAmount >= 0 ? 'amount-positive' : 'amount-negative'}`;
      }
    }

    function updateMainTableAmount() {
      // 找到当前人员在主表中的索引
      const idx = summaryData.findIndex(p => p.phone === currentDetailPhone);
      if (idx === -1) return;

      // 重新计算该人员的总金额（从弹框明细中计算）
      let totalAmount = 0;
      currentDetailRecords.forEach(r => { totalAmount += r.amount || 0; });
      summaryData[idx].personTotal = totalAmount;

      // 更新主表显示（取整）
      const amountEl = document.getElementById(`amount-${idx}`);
      if (amountEl) {
        amountEl.textContent = `${totalAmount >= 0 ? '+' : ''}¥${Math.round(totalAmount)}`;
        amountEl.className = totalAmount >= 0 ? 'amount-positive' : 'amount-negative';
      }

    }

    // ============ 弹框控制 ============
    function showModal() {
      document.getElementById('detailModal').classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('detailModal').classList.remove('show');
      document.body.style.overflow = '';
      // 关闭弹框后刷新主表数据
      loadData();
    }

    // 点击弹框背景关闭
    document.getElementById('detailModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // ============ 执行操作 ============
    async function executePerson(idx) {
      const person = summaryData[idx];
      if (!person || person.pendingCount === 0) {
        showToast('该人员所有记录已执行');
        return;
      }

      if (!confirm(`确认执行 ${person.name} 的所有 ${person.pendingCount} 条未执行记录？`)) return;

      try {
        const res = await api('/api/reward-penalty/stats/execute-person', {
          method: 'POST',
          body: JSON.stringify({
            phone: person.phone,
            month: currentMonth,
            type: currentType,
            execStatus: '未执行'
          })
        });
        if (res.success) {
          showToast(`${res.updated} 条已执行`);
          loadData();
        } else {
          showToast(res.error || '执行失败');
        }
      } catch (e) {
        showToast('执行失败: ' + e.message);
      }
    }

    // ============ 批量选择 & 执行（基于 pendingIds）============
    function togglePerson(idx, checked) {
      const person = summaryData[idx];
      if (!person) return;
      if (checked) {
        person.pendingIds.forEach(id => selectedIds.add(id));
      } else {
        person.pendingIds.forEach(id => selectedIds.delete(id));
      }
      updateSelection();
    }

    function toggleSelectAll(el) {
      const checked = el.checked;
      if (checked) {
        summaryData.forEach(p => p.pendingIds.forEach(id => selectedIds.add(id)));
      } else {
        selectedIds.clear();
      }
      document.querySelectorAll('.person-check').forEach(cb => cb.checked = checked);
      updateSelection();
    }

    function updateSelection() {
      const bar = document.getElementById('batchBar');
      const countEl = document.getElementById('batchCount');
      if (selectedIds.size > 0) {
        countEl.textContent = `已选 ${selectedIds.size} 条`;
        bar.classList.add('show');
      } else {
        bar.classList.remove('show');
      }
    }

    function clearSelection() {
      selectedIds.clear();
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      document.getElementById('batchBar').classList.remove('show');
    }

    async function batchExecute() {
      if (selectedIds.size === 0) return;
      try {
        const res = await api('/api/reward-penalty/batch-execute', {
          method: 'POST',
          body: JSON.stringify({ ids: [...selectedIds] })
        });
        if (res.success) {
          showToast(`${res.updated} 条已执行`);
          clearSelection();
          loadData();
        } else {
          showToast(res.error || '批量执行失败');
        }
      } catch (e) {
        showToast('批量执行失败: ' + e.message);
      }
    }

    // ============ 下载Excel功能 ============
    function downloadExcel() {
      if (summaryData.length === 0) {
        showToast('请先查询数据');
        return;
      }

      // 构建Excel数据
      const excelData = [
        ['工号', '姓名', '角色', '金额合计', '记录数', '未执行数']
      ];

      summaryData.forEach(p => {
        excelData.push([
          p.employee_id || '-',
          p.name,
          p.role || '未知',
          Math.round(p.personTotal),
          p.totalCount,
          p.pendingCount
        ]);
      });

      // 创建工作簿
      const wb = XLSX.utils.book_new();
      const ws = XLSX.utils.aoa_to_sheet(excelData);

      // 设置列宽
      ws['!cols'] = [{ wch: 8 }, { wch: 12 }, { wch: 10 }, { wch: 12 }, { wch: 8 }, { wch: 10 }];

      XLSX.utils.book_append_sheet(wb, ws, '奖罚统计');

      // 下载文件
      const fileName = `奖罚统计_${currentMonth}.xlsx`;XLSX.writeFile(wb, fileName);
      showToast('Excel已下载');
    }

    init();
  </script>
  <script src="sidebar.js"></script>
</body>
</html>
