<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-box { width: 100%; max-width: 400px; padding: 40px 30px; background: rgba(20,20,30,0.8); border-radius: 20px; border: 1px solid rgba(218,165,32,0.2); margin: 20px; }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo-text { font-size: 28px; color: #d4af37; letter-spacing: 4px; }
    .logo-sub { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 8px; }

    /* 登录方式切换标签 */
    .login-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .login-tab { flex: 1; padding: 12px; border: 1px solid rgba(218,165,32,0.3); background: rgba(20,20,30,0.6); color: rgba(255,255,255,0.6); border-radius: 8px; cursor: pointer; text-align: center; transition: all 0.2s; font-size: 14px; }
    .login-tab:hover { background: rgba(218,165,32,0.15); }
    .login-tab.active { background: rgba(218,165,32,0.25); color: #FFD700; border-color: rgba(218,165,32,0.6); }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
    .form-input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 15px; }
    .form-input:focus { outline: none; border-color: #d4af37; }

    /* 验证码行 */
    .code-row { display: flex; gap: 10px; }
    .code-row .form-input { flex: 1; }
    .code-btn { padding: 14px 16px; background: rgba(212,175,55,0.2); border: 1px solid rgba(218,165,32,0.3); border-radius: 12px; color: #d4af37; cursor: pointer; white-space: nowrap; font-size: 13px; min-width: 100px; }
    .code-btn:hover { background: rgba(212,175,55,0.3); }
    .code-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); border: none; border-radius: 12px; color: #000; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .error-msg { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); border-radius: 8px; padding: 12px; color: #e74c3c; font-size: 13px; margin-bottom: 20px; display: none; }
    .success-msg { background: rgba(46,204,113,0.1); border: 1px solid rgba(46,204,113,0.3); border-radius: 8px; padding: 12px; color: #2ecc71; font-size: 13px; margin-bottom: 20px; display: none; }

    /* 登录方式面板 */
    .login-panel { display: none; }
    .login-panel.active { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="logo-text">天宫国际</div>
      <div class="logo-sub">后台管理系统</div>
    </div>

    <!-- 登录方式切换 -->
    <div class="login-tabs">
      <div class="login-tab active" data-mode="password" onclick="switchLoginMode('password')">密码登录</div>
      <div class="login-tab" data-mode="sms" onclick="switchLoginMode('sms')">验证码登录</div>
    </div>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- 密码登录面板 -->
    <div class="login-panel active" id="passwordPanel">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" class="form-input" id="username" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="password" placeholder="请输入密码">
      </div>
      <button class="login-btn" onclick="loginWithPassword()">登录</button>
    </div>

    <!-- 验证码登录面板 -->
    <div class="login-panel" id="smsPanel">
      <div class="form-group">
        <label class="form-label">手机号</label>
        <input type="text" class="form-input" id="phone" placeholder="请输入手机号" maxlength="11">
      </div>
      <div class="form-group">
        <label class="form-label">验证码</label>
        <div class="code-row">
          <input type="text" class="form-input" id="smsCode" placeholder="请输入验证码" maxlength="6">
          <button class="code-btn" id="sendCodeBtn" onclick="sendSmsCode()">获取验证码</button>
        </div>
      </div>
      <button class="login-btn" onclick="loginWithSms()">登录</button>
    </div>
  </div>

  <script>
    let currentMode = 'password';
    let countdown = 0;
    let countdownTimer = null;

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('successMsg').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('successMsg');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('errorMsg').style.display = 'none';
    }

    function hideMessages() {
      document.getElementById('errorMsg').style.display = 'none';
      document.getElementById('successMsg').style.display = 'none';
    }

    // 切换登录方式
    function switchLoginMode(mode) {
      currentMode = mode;
      hideMessages();

      // 更新标签状态
      document.querySelectorAll('.login-tab').forEach(tab => {
        tab.classList.toggle('active', tab.dataset.mode === mode);
      });

      // 更新面板显示
      document.getElementById('passwordPanel').classList.toggle('active', mode === 'password');
      document.getElementById('smsPanel').classList.toggle('active', mode === 'sms');
    }

    // 密码登录
    async function loginWithPassword() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) { showError('请填写用户名和密码'); return; }

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = 'index.html';
        } else {
          showError(data.error || '登录失败');
        }
      } catch (err) { showError('网络错误'); }
    }

    // 发送验证码
    async function sendSmsCode() {
      const phone = document.getElementById('phone').value.trim();
      if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
        showError('请输入正确的手机号');
        return;
      }

      const btn = document.getElementById('sendCodeBtn');
      btn.disabled = true;
      hideMessages();

      try {
        const res = await fetch('/api/sms/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone })
        });
        const data = await res.json();
        if (data.success) {
          showSuccess(data.message || '验证码已发送');
          // 开始倒计时
          countdown = 60;
          updateCountdown();
          countdownTimer = setInterval(updateCountdown, 1000);
        } else {
          showError(data.error || '发送失败');
          btn.disabled = false;
        }
      } catch (err) {
        showError('网络错误');
        btn.disabled = false;
      }
    }

    // 更新倒计时
    function updateCountdown() {
      const btn = document.getElementById('sendCodeBtn');
      if (countdown > 0) {
        btn.textContent = `${countdown}秒后重发`;
        countdown--;
      } else {
        btn.textContent = '获取验证码';
        btn.disabled = false;
        if (countdownTimer) {
          clearInterval(countdownTimer);
          countdownTimer = null;
        }
      }
    }

    // 验证码登录
    async function loginWithSms() {
      const phone = document.getElementById('phone').value.trim();
      const code = document.getElementById('smsCode').value.trim();

      if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
        showError('请输入正确的手机号');
        return;
      }
      if (!code || code.length !== 6) {
        showError('请输入6位验证码');
        return;
      }

      try {
        const res = await fetch('/api/admin/login/sms', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, code })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('adminToken', data.token);
          window.location.href = 'index.html';
        } else {
          showError(data.error || '登录失败');
        }
      } catch (err) { showError('网络错误'); }
    }

    // 已登录则跳转
    if (localStorage.getItem('adminToken')) window.location.href = 'index.html';
  </script>
</body>
</html>
