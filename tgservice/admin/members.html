<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>会员管理 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar-logo img { width: 32px; height: 32px; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #d4af37; border: 1px solid rgba(218,165,32,0.3); }
    .btn-secondary:hover { background: rgba(212,175,55,0.15); }
    .btn-danger { background: rgba(255,77,79,0.8); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    
    .stats-bar { display: flex; gap: 20px; margin-bottom: 20px; }
    .stat-card { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 16px 24px; border: 1px solid rgba(218,165,32,0.1); }
    .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); }
    .stat-value { font-size: 24px; color: #d4af37; font-weight: 600; margin-top: 4px; }
    
    .member-table { width: 100%; border-collapse: collapse; background: rgba(20,20,30,0.4); border-radius: 12px; overflow: hidden; }
    .member-table th, .member-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .member-table th { background: rgba(212,175,55,0.1); color: #d4af37; font-weight: 500; font-size: 13px; }
    .member-table td { font-size: 14px; color: rgba(255,255,255,0.8); }
    .member-table tr:hover { background: rgba(255,255,255,0.02); }
    .member-table .phone { font-family: monospace; color: #d4af37; }
    .member-table .gender-male { color: #3498db; }
    .member-table .gender-female { color: #e91e63; }
    .member-table .actions { display: flex; gap: 8px; }
    .member-table .fingerprint { font-family: monospace; font-size: 12px; color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 4px; }

    .pagination { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; padding: 12px; }
    .pagination .page-info { font-size: 13px; color: rgba(255,255,255,0.5); margin-right: 12px; }
    .pagination button { padding: 6px 14px; border-radius: 6px; border: 1px solid rgba(218,165,32,0.3); background: rgba(255,255,255,0.05); color: #d4af37; cursor: pointer; font-size: 13px; }
    .pagination button:hover:not(:disabled) { background: rgba(212,175,55,0.15); }
    .pagination button:disabled { opacity: 0.3; cursor: default; }
    .pagination button.active { background: rgba(212,175,55,0.2); border-color: #d4af37; }
    .pagination .page-size-info { font-size: 12px; color: rgba(255,255,255,0.4); margin-left: 12px; }
    
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; border: 1px solid rgba(218,165,32,0.2); }
    .modal-title { font-size: 18px; margin-bottom: 20px; }
    .modal-form { display: flex; flex-direction: column; gap: 12px; }
    .form-row { display: flex; flex-direction: column; gap: 4px; }
    .form-row label { font-size: 12px; color: rgba(255,255,255,0.6); }
    .form-row input, .form-row select { padding: 10px; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .form-row select option { background: #1a1a24; color: #fff; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; padding: 12px; }
    .btn-cancel { background: rgba(255,255,255,0.1); color: #fff; }
    
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 8px; z-index: 1001; display: none; }
    .toast.show { display: block; }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
</style>
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <div class="sidebar"></div>

  <div class="main">
    <div class="page-header">
      <div class="page-title">会员管理</div>
      <div>
        <button class="btn btn-secondary" onclick="openSyncCoachModal()" style="margin-right: 8px;">🔄 同步助教</button>
        <button class="btn btn-primary" onclick="showModal()">+ 添加会员</button>
      </div>
    </div>
    
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">会员总数</div>
        <div class="stat-value" id="totalMembers">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">今日新增</div>
        <div class="stat-value" id="todayMembers">0</div>
      </div>
    </div>
    
    <table class="member-table">
      <thead>
        <tr>
          <th>会员号</th>
          <th>手机号</th>
          <th>姓名</th>
          <th>性别</th>
          <th>设备指纹</th>
          <th>注册时间</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody id="memberList"></tbody>
    </table>

    <div class="pagination" id="pagination"></div>
  </div>
  
  <div class="modal" id="modal">
    <div class="modal-content">
      <div class="modal-title" id="modalTitle">添加会员</div>
      <div class="modal-form">
        <div class="form-row">
          <label>手机号 *</label>
          <input type="tel" id="formPhone" placeholder="请输入手机号" maxlength="11">
        </div>
        <div class="form-row">
          <label>姓名</label>
          <input type="text" id="formName" placeholder="请输入姓名">
        </div>
        <div class="form-row">
          <label>性别</label>
          <select id="formGender">
            <option value="">未设置</option>
            <option value="男">男</option>
            <option value="女">女</option>
          </select>
        </div>
        <div class="form-row">
          <label>备注</label>
          <input type="text" id="formRemark" placeholder="备注信息">
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn btn-primary" onclick="saveMember()">保存</button>
      </div>
    </div>
  </div>
  
  <!-- 同步助教弹窗 -->
  <div class="modal" id="syncCoachModal">
    <div class="modal-content" style="max-width: 700px;">
      <div class="modal-title">🔄 同步助教信息到会员</div>
      <div id="syncCoachLoading" style="text-align:center; padding: 40px; color: rgba(255,255,255,0.5);">正在匹配...</div>
      <div id="syncCoachSummary" style="display:none; margin-bottom: 16px;"></div>
      <div id="syncCoachList" style="display:none; max-height: 400px; overflow-y: auto;">
        <table class="member-table" style="font-size: 13px;">
          <thead>
            <tr>
              <th style="width: 40px;"><input type="checkbox" id="syncAllCheck" onchange="toggleAllSync(this.checked)"></th>
              <th>会员号</th>
              <th>手机号</th>
              <th>姓名</th>
              <th>性别</th>
              <th>备注</th>
              <th>助教工号</th>
              <th>助教艺名</th>
              <th>同步后效果</th>
            </tr>
          </thead>
          <tbody id="syncCoachTableBody"></tbody>
        </table>
      </div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeSyncCoachModal()">取消</button>
        <button class="btn btn-primary" onclick="executeSync()" id="syncExecBtn" disabled>确认同步 (<span id="syncCount">0</span>)</button>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    // time-util loaded via separate script tag
  </script>
  <script src="js/time-util.js"></script>
  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';
    
    let members = [];
    let editingNo = null;
    let currentPage = 1;
    let totalMembers = 0;
    const PAGE_SIZE = 50;
    
    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }
    
    function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }
    
    async function loadMembers(page = 1) {
      currentPage = page;
      const res = await api(`/api/admin/members?page=${page}&pageSize=${PAGE_SIZE}`);
      members = res.data || [];
      totalMembers = res.total || 0;

      // 统计
      document.getElementById('totalMembers').textContent = totalMembers;
      const today = TimeUtil.today();
      const todayCount = members.filter(m => m.created_at && m.created_at.startsWith(today)).length;
      document.getElementById('todayMembers').textContent = todayCount;

      renderMembers();
      renderPagination();
    }
    
    function renderMembers() {
      const tbody = document.getElementById('memberList');
      
      if (members.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:rgba(255,255,255,0.3)">暂无会员数据</td></tr>';
        return;
      }
      
      tbody.innerHTML = members.map(m => `
        <tr>
          <td>${m.member_no}</td>
          <td class="phone">${maskPhone(m.phone)}</td>
          <td>${m.name || '-'}</td>
          <td><span class="${m.gender === '男' ? 'gender-male' : m.gender === '女' ? 'gender-female' : ''}">${m.gender || '-'}</span></td>
          <td>${m.device_fingerprint ? `<span class="fingerprint">${m.device_fingerprint}</span>` : '-'}</td>
          <td>${formatTime(m.created_at)}</td>
          <td class="actions">
            <button class="btn btn-sm" onclick="editMember(${m.member_no})">编辑</button>
          </td>
        </tr>
      `).join('');
    }
    
    function maskPhone(phone) {
      if (!phone || phone.length < 7) return phone;
      return phone.substring(0, 3) + '****' + phone.substring(7);
    }
    
    function formatTime(timeStr) {
      if (!timeStr) return '-';
      return timeStr.replace('T', ' ').substring(0, 16);
    }
    
    function showModal(no = null) {
      editingNo = no;
      document.getElementById('modalTitle').textContent = no ? '编辑会员' : '添加会员';
      document.getElementById('formPhone').value = '';
      document.getElementById('formName').value = '';
      document.getElementById('formGender').value = '';
      document.getElementById('formRemark').value = '';
      document.getElementById('modal').classList.add('show');
    }
    
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    
    async function editMember(no) {
      const m = members.find(x => x.member_no === no);
      if (!m) return;
      showModal(no);
      document.getElementById('formPhone').value = m.phone || '';
      document.getElementById('formName').value = m.name || '';
      document.getElementById('formGender').value = m.gender || '';
      document.getElementById('formRemark').value = m.remark || '';
    }
    
    async function saveMember() {
      const phone = document.getElementById('formPhone').value.trim();
      const name = document.getElementById('formName').value.trim();
      const gender = document.getElementById('formGender').value;
      const remark = document.getElementById('formRemark').value.trim();
      
      if (!phone) { showToast('请输入手机号'); return; }
      if (!/^1\d{10}$/.test(phone)) { showToast('手机号格式不正确'); return; }
      
      try {
        if (editingNo) {
          await api(`/api/admin/members/${editingNo}`, { method: 'PUT', body: JSON.stringify({ phone, name, gender, remark }) });
          showToast('更新成功');
        } else {
          await api('/api/admin/members', { method: 'POST', body: JSON.stringify({ phone, name, gender, remark }) });
          showToast('添加成功');
        }
        closeModal();
        loadMembers(currentPage);
      } catch (err) { 
        showToast(err.error || '操作失败'); 
      }
    }
    
    // ===== 同步助教功能 =====
    
    let syncCoachMatches = [];
    
    async function openSyncCoachModal() {
      document.getElementById('syncCoachModal').classList.add('show');
      document.getElementById('syncCoachLoading').style.display = 'block';
      document.getElementById('syncCoachSummary').style.display = 'none';
      document.getElementById('syncCoachList').style.display = 'none';
      document.getElementById('syncExecBtn').disabled = true;
      document.getElementById('syncExecBtn').innerHTML = '确认同步 (<span id="syncCount">0</span>)';
      
      try {
        const data = await api('/api/admin/members/sync-coaches/preview', { method: 'POST' });
        syncCoachMatches = data.matches || [];
        
        document.getElementById('syncCoachLoading').style.display = 'none';
        
        if (syncCoachMatches.length === 0) {
          document.getElementById('syncCoachSummary').style.display = 'block';
          document.getElementById('syncCoachSummary').innerHTML = 
            '<div style="text-align:center; padding: 20px; color: rgba(255,255,255,0.5);">暂无匹配到助教的会员</div>';
          return;
        }
        
        const summary = data.summary || {};
        document.getElementById('syncCoachSummary').style.display = 'block';
        document.getElementById('syncCoachSummary').innerHTML = 
          `<span style="color: #d4af37;">共 ${summary.matchedCount || syncCoachMatches.length} 位会员匹配到助教信息</span>`;
        
        renderSyncCoachList();
        document.getElementById('syncCoachList').style.display = 'block';
        
      } catch (err) {
        document.getElementById('syncCoachLoading').style.display = 'none';
        showToast('匹配失败：' + (err.error || '网络错误'));
      }
    }
    
    function closeSyncCoachModal() {
      document.getElementById('syncCoachModal').classList.remove('show');
      syncCoachMatches = [];
    }
    
    function renderSyncCoachList() {
      const tbody = document.getElementById('syncCoachTableBody');
      tbody.innerHTML = syncCoachMatches.map((m, i) => `
        <tr>
          <td><input type="checkbox" class="sync-check" data-index="${i}" onchange="updateSyncCount()"></td>
          <td>${m.member_no}</td>
          <td style="font-family: monospace; color: #d4af37;">${maskPhone(m.phone)}</td>
          <td>${m.name || '<span style="color:rgba(255,255,255,0.3)">空</span>'}</td>
          <td>${m.gender || '<span style="color:rgba(255,255,255,0.3)">空</span>'}</td>
          <td style="max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" title="${(m.remark || '').replace(/"/g, '&quot;')}">${m.remark || '-'}</td>
          <td style="color: #3498db;">${m.coach_employee_id || '-'}</td>
          <td style="color: #e91e63;">${m.coach_stage_name || '-'}</td>
          <td style="font-size: 12px; color: rgba(255,255,255,0.5);">
            ${m.gender ? '' : '性别→女'}${(!m.gender && !m.name) ? ' ' : ''}${m.name ? '' : '姓名→' + m.coach_stage_name}
          </td>
        </tr>
      `).join('');
    }
    
    function toggleAllSync(checked) {
      document.querySelectorAll('.sync-check').forEach(cb => cb.checked = checked);
      updateSyncCount();
    }
    
    function updateSyncCount() {
      const count = document.querySelectorAll('.sync-check:checked').length;
      document.getElementById('syncCount').textContent = count;
      document.getElementById('syncExecBtn').disabled = count === 0;
    }
    
    async function executeSync() {
      const checkedBoxes = document.querySelectorAll('.sync-check:checked');
      if (checkedBoxes.length === 0) {
        showToast('请勾选需要同步的会员');
        return;
      }
      
      const items = [];
      checkedBoxes.forEach(cb => {
        const idx = parseInt(cb.dataset.index);
        const m = syncCoachMatches[idx];
        items.push({
          member_no: m.member_no,
          coach_employee_id: m.coach_employee_id,
          coach_stage_name: m.coach_stage_name
        });
      });
      
      const btn = document.getElementById('syncExecBtn');
      btn.disabled = true;
      btn.textContent = '同步中...';
      
      try {
        const data = await api('/api/admin/members/sync-coaches/execute', {
          method: 'POST',
          body: JSON.stringify({ items })
        });
        
        showToast(`同步成功！已更新 ${data.syncedCount} 位会员`);
        closeSyncCoachModal();
        loadMembers(currentPage);
        
      } catch (err) {
        showToast('同步失败：' + (err.error || '网络错误'));
        btn.disabled = false;
        btn.innerHTML = '确认同步 (<span id="syncCount">0</span>)';
      }
    }
    
    function renderPagination() {
      const container = document.getElementById('pagination');
      const totalPages = Math.ceil(totalMembers / PAGE_SIZE);
      if (totalPages <= 1) { container.innerHTML = ''; return; }

      let html = `<span class="page-info">共 ${totalMembers} 条</span>`;
      html += `<button onclick="loadMembers(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`;

      const maxVisible = 7;
      let start = Math.max(1, currentPage - 3);
      let end = Math.min(totalPages, start + maxVisible - 1);
      if (end - start < maxVisible - 1) start = Math.max(1, end - maxVisible + 1);

      if (start > 1) html += `<button onclick="loadMembers(1)">1</button>`;
      if (start > 2) html += `<button disabled>...</button>`;

      for (let i = start; i <= end; i++) {
        html += `<button class="${i === currentPage ? 'active' : ''}" onclick="loadMembers(${i})">${i}</button>`;
      }

      if (end < totalPages - 1) html += `<button disabled>...</button>`;
      if (end < totalPages) html += `<button onclick="loadMembers(${totalPages})">${totalPages}</button>`;

      html += `<button onclick="loadMembers(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button>`;
      html += `<span class="page-size-info">每页 ${PAGE_SIZE} 条</span>`;

      container.innerHTML = html;
    }

    loadMembers();
  </script>
  <script>
    </script>
  <script src="sidebar.js"></script>
</body>
</html>
