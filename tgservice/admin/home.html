    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: rgba(20,20,30,0.8); border-right: 1px solid rgba(218,165,32,0.1); padding: 20px 0; flex-shrink: 0; overflow-y: auto; height: 100vh; position: sticky; top: 0; }
    .sidebar-logo { padding: 0 20px 30px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .sidebar-logo img { width: 32px; height: 32px; }
    .sidebar-title { font-size: 16px; color: #d4af37; }
    .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .nav-icon { font-size: 18px; }
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }
    .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    
    .config-section { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 20px; border: 1px solid rgba(218,165,32,0.1); margin-bottom: 20px; }
    .section-title { font-size: 16px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .section-hint { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: normal; }
    
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
    .form-input { width: 100%; padding: 12px; background: #1a1a24; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .form-input:focus { outline: none; border-color: #d4af37; }
    .form-textarea { min-height: 80px; resize: vertical; }
    
    /* 小卡片选择网格 */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
    .card-item { 
      padding: 14px 10px;
      background: rgba(255,255,255,0.03); 
      border: 2px solid rgba(255,255,255,0.08); 
      border-radius: 10px; 
      cursor: pointer; 
      transition: all 0.2s;
      text-align: center;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .card-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(212,175,55,0.3); }
    .card-item.selected { background: rgba(212,175,55,0.15); border-color: #d4af37; }
    .card-name { font-size: 13px; margin-bottom: 4px; word-break: break-all; line-height: 1.3; }
    .card-info { font-size: 11px; color: rgba(255,255,255,0.5); }
    .card-check { 
      width: 18px; height: 18px; 
      background: rgba(255,255,255,0.1); 
      border-radius: 50%; 
      margin-bottom: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    .card-item.selected .card-check { background: #d4af37; color: #000; }
    .card-item.selected .card-check::after { content: '✓'; }
    
    .empty-tip { grid-column: 1/-1; text-align: center; padding: 20px; color: rgba(255,255,255,0.3); font-size: 13px; }
    
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 8px; z-index: 1001; display: none; }
    .toast.show { display: block; }
  
    /* 折叠菜单 */
    .nav-group { border-bottom: 1px solid rgba(255,255,255,0.03); }
    .nav-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-group-title:hover { background: rgba(212,175,55,0.05); color: rgba(255,255,255,0.8); }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    
    .nav-submenu { display: none; background: rgba(0,0,0,0.2); }
    .nav-group.open .nav-submenu { display: block; }
    .nav-submenu .nav-item { padding-left: 48px; font-size: 13px; }
</style>

  <div class="main">
    <div class="page-header">
      <div class="page-title">首页配置</div>
      <button class="btn btn-primary" onclick="saveConfig()">保存配置</button>
    </div>
    
    <div class="config-section">
      <div class="section-title">🖼️ 首页Banner</div>
      <div class="form-group">
        <label class="form-label">Banner标题</label>
        <input type="text" class="form-input" id="bannerTitle" placeholder="充值送台费活动">
      </div>
      <div class="form-group">
        <label class="form-label">Banner描述</label>
        <textarea class="form-input form-textarea" id="bannerDesc" placeholder="充值满500送50元台费，多充多送"></textarea>
      </div>
    </div>
    
    <div class="config-section">
      <div class="section-title">
        <span>🛋️ 热销V包</span>
        <span class="section-hint">已选 <span id="vipCount">0</span>/4 个</span>
      </div>
      <div id="vipList" class="card-grid"><div class="empty-tip">加载中...</div></div>
    </div>
    
    <div class="config-section">
      <div class="section-title">
        <span>🔥 热门商品</span>
        <span class="section-hint">已选 <span id="productCount">0</span>/6 个</span>
      </div>
      <div id="productList" class="card-grid"><div class="empty-tip">加载中...</div></div>
    </div>
    
    <div class="config-section">
      <div class="section-title">📢 滚动公告</div>
      <div class="form-group">
        <textarea class="form-input form-textarea" id="notice" placeholder="输入公告内容"></textarea>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';
    
    // 数据
    let allProducts = [];
    let allVipRooms = [];
    let selectedProducts = [];
    let selectedVips = [];
    
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
    
    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }
    
    async function loadData() {
      try {
        const [prodData, vipData, configData] = await Promise.all([
          api('/api/admin/products'),
          api('/api/admin/vip-rooms'),
          api('/api/admin/home-config')
        ]);
        
        allProducts = (prodData || []).filter(p => p.status === '上架');
        allVipRooms = vipData || [];
        
        // 表单数据
        document.getElementById('bannerTitle').value = configData?.banner_title || '';
        document.getElementById('bannerDesc').value = configData?.banner_desc || '';
        document.getElementById('notice').value = configData?.notice || '';
        
        // 已选项 - 注意：数据库存的是JSON字符串，需要解析
        let hp = configData?.hot_products;
        let hv = configData?.hot_vip_rooms;
        
        // 如果是字符串则解析
        if (typeof hp === 'string') {
          try { hp = JSON.parse(hp); } catch(e) { hp = []; }
        }
        if (typeof hv === 'string') {
          try { hv = JSON.parse(hv); } catch(e) { hv = []; }
        }
        
        selectedProducts = hp || [];
        selectedVips = (hv || []).map(Number);
        
        console.log('数据加载完成:', {
          products: allProducts.length,
          vips: allVipRooms.length,
          selectedProducts,
          selectedVips
        });
        
        renderProducts();
        renderVips();
      } catch (e) {
        console.error('加载数据失败:', e);
        showToast('加载数据失败');
      }
    }
    
    // 商品
    function renderProducts() {
      const el = document.getElementById('productList');
      if (!allProducts.length) {
        el.innerHTML = '<div class="empty-tip">暂无商品</div>';
        return;
      }
      el.innerHTML = allProducts.map(p => `
        <div class="card-item ${selectedProducts.includes(p.name) ? 'selected' : ''}" onclick="toggleProduct('${p.name}')">
          <div class="card-check"></div>
          <div class="card-name">${p.name}</div>
          <div class="card-info">¥${p.price || 0}</div>
        </div>
      `).join('');
      document.getElementById('productCount').textContent = selectedProducts.length;
    }
    
    function toggleProduct(name) {
      const idx = selectedProducts.indexOf(name);
      if (idx >= 0) {
        selectedProducts.splice(idx, 1);
      } else if (selectedProducts.length < 6) {
        selectedProducts.push(name);
      } else {
        showToast('最多选择6个商品');
        return;
      }
      renderProducts();
    }
    
    // 包房
    function renderVips() {
      const el = document.getElementById('vipList');
      if (!allVipRooms.length) {
        el.innerHTML = '<div class="empty-tip">暂无包房</div>';
        return;
      }
      el.innerHTML = allVipRooms.map(r => {
        const id = Number(r.id);
        const isSelected = selectedVips.includes(id);
        return `
          <div class="card-item ${isSelected ? 'selected' : ''}" onclick="toggleVip(${id})">
            <div class="card-check"></div>
            <div class="card-name">${r.name || ''}</div>
            <div class="card-info">${r.status || '空闲'}</div>
          </div>
        `;
      }).join('');
      document.getElementById('vipCount').textContent = selectedVips.length;
    }
    
    function toggleVip(id) {
      const idx = selectedVips.indexOf(id);
      if (idx >= 0) {
        selectedVips.splice(idx, 1);
      } else if (selectedVips.length < 4) {
        selectedVips.push(id);
      } else {
        showToast('最多选择4个包房');
        return;
      }
      renderVips();
    }
    
    async function saveConfig() {
      try {
        await api('/api/admin/home-config', {
          method: 'PUT',
          body: JSON.stringify({
            bannerTitle: document.getElementById('bannerTitle').value,
            bannerDesc: document.getElementById('bannerDesc').value,
            notice: document.getElementById('notice').value,
            hotProducts: selectedProducts,
            hotVipRooms: selectedVips
          })
        });
        showToast('保存成功');
      } catch (e) {
        console.error('保存失败:', e);
        showToast('保存失败');
      }
    }
    
    loadData();
  </script>
  <script src="nav-control.js"></script>
  <script>
    // 折叠菜单切换
    function toggleGroup(el) {
      el.parentElement.classList.toggle('open');
    }
</script>
