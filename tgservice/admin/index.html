<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台管理 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 220px; background: rgba(20,20,30,0.8); border-right: 1px solid rgba(218,165,32,0.1); padding: 20px 0; flex-shrink: 0; overflow-y: auto; height: 100vh; position: sticky; top: 0; }
    .sidebar-logo { padding: 0 20px 30px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .sidebar-logo img { width: 32px; height: 32px; filter: sepia(60%) saturate(200%) hue-rotate(10deg); }
    .sidebar-title { font-size: 16px; color: #d4af37; }
    .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: all 0.2s; cursor: pointer; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .nav-icon { font-size: 18px; }
    
    /* 折叠菜单 */
    .nav-group { border-bottom: 1px solid rgba(255,255,255,0.03); }
    .nav-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-group-title:hover { background: rgba(212,175,55,0.05); color: rgba(255,255,255,0.8); }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    
    .nav-submenu { display: none; background: rgba(0,0,0,0.2); }
    .nav-group.open .nav-submenu { display: block; }
    .nav-submenu .nav-item { padding-left: 48px; font-size: 13px; }
    
    /* Main Content */
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 22px; }
    .logout-btn { padding: 8px 16px; background: transparent; border: 1px solid rgba(231,76,60,0.3); border-radius: 8px; color: #e74c3c; font-size: 13px; cursor: pointer; }
    
    /* Stats Cards */
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: rgba(20,20,30,0.6); border-radius: 12px; padding: 20px; border: 1px solid rgba(218,165,32,0.1); }
    .stat-value { font-size: 28px; color: #d4af37; }
    .stat-label { font-size: 13px; color: rgba(255,255,255,0.5); margin-top: 8px; }
    
    /* Table */
    .data-table { width: 100%; background: rgba(20,20,30,0.6); border-radius: 12px; border: 1px solid rgba(218,165,32,0.1); overflow: hidden; }
    .data-table th, .data-table td { padding: 14px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .data-table th { background: rgba(212,175,55,0.1); font-weight: 500; font-size: 13px; color: rgba(255,255,255,0.7); }
    .data-table td { font-size: 14px; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }
    
    /* Buttons */
    .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #d4af37 0%, #ffd700 100%); color: #000; }
    .btn-danger { background: rgba(231,76,60,0.2); color: #e74c3c; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    
    /* Modal */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .modal.show { display: flex; }
    .modal-content { background: rgba(20,20,30,0.95); border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; border: 1px solid rgba(218,165,32,0.2); }
    .modal-title { font-size: 18px; margin-bottom: 20px; }
    .modal-form { display: flex; flex-direction: column; gap: 16px; }
    .form-row { display: flex; flex-direction: column; gap: 8px; }
    .form-row label { font-size: 13px; color: rgba(255,255,255,0.6); }
    .form-row input, .form-row select, .form-row textarea { padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-size: 14px; }
    .modal-actions { display: flex; gap: 12px; margin-top: 20px; }
    .modal-actions .btn { flex: 1; padding: 12px; }
    
    /* Badge */
    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; }
    .badge-success { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .badge-warning { background: rgba(241,196,15,0.2); color: #f1c40f; }
    .badge-danger { background: rgba(231,76,60,0.2); color: #e74c3c; }
    
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1001; display: none; }
    .toast.show { display: block; animation: fadeOut 3s forwards; }
    @keyframes fadeOut { 0%, 70% { opacity: 1; } 100% { opacity: 0; } }
    
    /* 人气值卡片 - 与小程序一致 */
    .popularity-section { margin-bottom: 24px; }
    .popularity-title { font-size: 15px; color: #d4af37; margin-bottom: 16px; display: block; text-align: center; }
    .popularity-row { display: flex; justify-content: center; gap: 10px; margin-bottom: 12px; }
    .popularity-row.first-row { justify-content: center; }
    
    /* 大卡片 - 第1名 */
    .pop-card.large { width: 140px; padding: 16px 12px; }
    .pop-card.large .pop-avatar { width: 72px; height: 72px; }
    .pop-card.large .pop-name { font-size: 14px; }
    .pop-card.large .pop-value { font-size: 20px; }
    
    /* 中等卡片 - 第2-3名 */
    .pop-card.medium { width: 110px; padding: 14px 10px; }
    .pop-card.medium .pop-avatar { width: 60px; height: 60px; }
    
    /* 小卡片 - 第4-6名 */
    .pop-card.small { width: 85px; padding: 10px 6px; }
    .pop-card.small .pop-avatar { width: 48px; height: 48px; }
    .pop-card.small .pop-name { font-size: 11px; }
    .pop-card.small .pop-value { font-size: 14px; }
    
    /* 金色卡片 - 第1名 */
    .pop-card.card-gold {
      background: linear-gradient(135deg, rgba(255,215,0,0.25), rgba(255,170,0,0.15));
      border: 1px solid rgba(255,215,0,0.4);
    }
    .pop-card.card-gold .pop-name { color: #fff; }
    .pop-card.card-gold .pop-value { color: #ffd700; }
    
    /* 银色卡片 - 第2名 */
    .pop-card.card-silver {
      background: linear-gradient(135deg, rgba(192,192,192,0.2), rgba(160,160,160,0.1));
      border: 1px solid rgba(192,192,192,0.4);
    }
    .pop-card.card-silver .pop-name { color: #fff; }
    .pop-card.card-silver .pop-value { color: #e0e0e0; }
    
    /* 铜色卡片 - 第3名 */
    .pop-card.card-bronze {
      background: linear-gradient(135deg, rgba(205,127,50,0.2), rgba(184,115,51,0.1));
      border: 1px solid rgba(205,127,50,0.4);
    }
    .pop-card.card-bronze .pop-name { color: #fff; }
    .pop-card.card-bronze .pop-value { color: #daa06d; }
    
    /* 基础卡片样式 */
    .pop-card {
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      background: rgba(30,30,40,0.6);
      border-radius: 12px;
      border: 1px solid rgba(218,165,32,0.2);
    }
    .pop-card .pop-medal {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      z-index: 1;
      font-weight: 600;
    }
    .pop-card .pop-medal.gold { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; }
    .pop-card .pop-medal.silver { background: linear-gradient(135deg, #c0c0c0, #a0a0a0); color: #000; }
    .pop-card .pop-medal.bronze { background: linear-gradient(135deg, #cd7f32, #b87333); color: #fff; }
    .pop-card .pop-medal.normal { background: rgba(255,255,255,0.15); font-size: 14px; color: rgba(255,255,255,0.6); }
    .pop-card .pop-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(30,30,40,0.5);
      margin-bottom: 8px;
      margin-top: 4px;
      border: 2px solid rgba(218,165,32,0.3);
      object-fit: cover;
    }
    .pop-card .pop-name { font-size: 12px; color: #fff; text-align: center; margin-bottom: 4px; word-break: break-all; line-height: 1.3; }
    .pop-card .pop-value { font-size: 16px; color: #d4af37; font-weight: 600; }
  </style>
</head>
<body>

    <!-- 配置 -->
    <div class="nav-group">

        <span class="group-icon">⚙️</span>

      <div class="nav-submenu">

  <div class="main">
    <div class="page-header">
      <div class="page-title">数据概览</div>
      <button class="logout-btn" onclick="logout()">退出登录</button>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statProducts">-</div>
        <div class="stat-label">商品数量</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statCoaches">-</div>
        <div class="stat-label">助教数量</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statOrders">-</div>
        <div class="stat-label">今日订单</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statRevenue">-</div>
        <div class="stat-label">今日销售额</div>
      </div>
    </div>
    
    <!-- 设备统计 -->
    <div class="stats-grid" style="grid-template-columns: repeat(3, 1fr);">
      <div class="stat-card">
        <div class="stat-value" id="statDeviceToday">-</div>
        <div class="stat-label">今日访问设备</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statDeviceWeek">-</div>
        <div class="stat-label">本周访问设备</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statDeviceTrend" style="font-size:14px;color:rgba(255,255,255,0.5)">-</div>
        <div class="stat-label">近12周趋势</div>
      </div>
    </div>
    
    <!-- 设备趋势图 -->
    <div style="background:rgba(20,20,30,0.6);border-radius:12px;padding:20px;border:1px solid rgba(218,165,32,0.1);margin-bottom:24px;">
      <h3 style="margin-bottom:16px;font-size:15px;">📊 设备访问趋势（近12周）</h3>
      <div id="deviceChart" style="height:200px;display:flex;align-items:flex-end;gap:8px;"></div>
    </div>
    
    <div class="popularity-section">
      <h3 style="margin-bottom:16px">🔥 人气助教 TOP6</h3>
      <div id="popularityContainer">
        <div style="color:rgba(255,255,255,0.3)">加载中...</div>
      </div>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // 格式化为北京时区时间（数据库存的是UTC，需要转换）
    function formatBeijingTime(timeStr) {
      if (!timeStr) return '-';
      // 数据库存的是UTC时间，需要加8小时转为北京时间
      const d = new Date(timeStr + ' UTC');
      return d.toLocaleString('zh-CN', { 
        timeZone: 'Asia/Shanghai',
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
    
    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }
    
    async function loadStats() {
      const products = await api('/api/admin/products');
      const coaches = await api('/api/admin/coaches');
      document.getElementById('statProducts').textContent = products.length || 0;
      document.getElementById('statCoaches').textContent = coaches.length || 0;
      
      // 加载订单统计
      loadOrderStats();
    }
    
    // 加载订单统计（仅统计，不显示列表）
    async function loadOrderStats() {
      try {
        const orders = await api('/api/admin/orders?status=待处理');
        document.getElementById('statOrders').textContent = orders.length || 0;
        const totalRevenue = (orders || []).reduce((sum, o) => sum + (o.total_price || 0), 0);
        document.getElementById('statRevenue').textContent = '¥' + totalRevenue.toFixed(0);
      } catch (e) {
        document.getElementById('statOrders').textContent = '0';
        document.getElementById('statRevenue').textContent = '¥0';
      }
    }
    
    async function loadPopularity() {
      try {
        const coaches = await api('/api/coaches/popularity/top6');
        const container = document.getElementById('popularityContainer');
        if (!coaches || coaches.length === 0) {
          container.innerHTML = '<div style="color:rgba(255,255,255,0.3)">暂无数据</div>';
          return;
        }
        
        let html = '<span class="popularity-title">🔥 人气榜 TOP6</span>';
        
        // 第一行：第1名（大卡片，金色）
        if (coaches.length > 0) {
          html += '<div class="popularity-row first-row">';
          const c = coaches[0];
          html += `
            <div class="pop-card large card-gold">
              <div class="pop-medal gold">🥇</div>
              <img class="pop-avatar" src="${c.photos?.[0] || '/static/avatar-default.png'}" onerror="this.src='/static/avatar-default.png'">
              <div class="pop-name">${c.employee_id || '-'}号 ${c.stage_name || '-'}</div>
              <div class="pop-value">${c.popularity || 0}</div>
            </div>
          `;
          html += '</div>';
        }
        
        // 第二行：第2-3名（中等卡片，银色、铜色）
        if (coaches.length > 1) {
          html += '<div class="popularity-row">';
          const cardClasses = ['card-silver', 'card-bronze'];
          const medalClasses = ['silver', 'bronze'];
          const medalIcons = ['🥈', '🥉'];
          for (let i = 1; i < Math.min(3, coaches.length); i++) {
            const c = coaches[i];
            html += `
              <div class="pop-card medium ${cardClasses[i-1]}">
                <div class="pop-medal ${medalClasses[i-1]}">${medalIcons[i-1]}</div>
                <img class="pop-avatar" src="${c.photos?.[0] || '/static/avatar-default.png'}" onerror="this.src='/static/avatar-default.png'">
                <div class="pop-name">${c.employee_id || '-'}号 ${c.stage_name || '-'}</div>
                <div class="pop-value">${c.popularity || 0}</div>
              </div>
            `;
          }
          html += '</div>';
        }
        
        // 第三行：第4-6名（小卡片）
        if (coaches.length > 3) {
          html += '<div class="popularity-row">';
          for (let i = 3; i < Math.min(6, coaches.length); i++) {
            const c = coaches[i];
            html += `
              <div class="pop-card small">
                <div class="pop-medal normal">${i + 1}</div>
                <img class="pop-avatar" src="${c.photos?.[0] || '/static/avatar-default.png'}" onerror="this.src='/static/avatar-default.png'">
                <div class="pop-name">${c.employee_id || '-'}号 ${c.stage_name || '-'}</div>
                <div class="pop-value">${c.popularity || 0}</div>
              </div>
            `;
          }
          html += '</div>';
        }
        
        container.innerHTML = html;
      } catch (e) {
        document.getElementById('popularityContainer').innerHTML = '<div style="color:rgba(255,255,255,0.3)">加载失败</div>';
      }
    }
    
    async function loadDeviceStats() {
      try {
        const stats = await api('/api/admin/device-stats');
        document.getElementById('statDeviceToday').textContent = stats.today || 0;
        document.getElementById('statDeviceWeek').textContent = stats.week || 0;
        
        // 绘制趋势图
        if (stats.weeks12 && stats.weeks12.length > 0) {
          const maxCount = Math.max(...stats.weeks12.map(w => w.count), 1);
          const chart = document.getElementById('deviceChart');
          chart.innerHTML = stats.weeks12.map((w, i) => {
            const height = Math.max((w.count / maxCount) * 180, 4);
            const isLast = i === stats.weeks12.length - 1;
            return `
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                <div style="width:100%;height:${height}px;background:${isLast ? '#d4af37' : 'rgba(212,175,55,0.4)'};border-radius:4px 4px 0 0;"></div>
                <div style="font-size:10px;color:rgba(255,255,255,0.5);">${w.count}</div>
                <div style="font-size:10px;color:rgba(255,255,255,0.3);">W${12-i}</div>
              </div>
            `;
          }).join('');
          
          document.getElementById('statDeviceTrend').textContent = `本周: ${stats.weeks12[11]?.count || 0} ↑`;
        }
      } catch (e) {
        document.getElementById('statDeviceToday').textContent = '-';
        document.getElementById('statDeviceWeek').textContent = '-';
      }
    }
    
    function logout() {
      localStorage.removeItem('adminToken');
      window.location.href = 'login.html';
    }
    
    // 折叠菜单切换
    function toggleGroup(el) {
      el.parentElement.classList.toggle('open');
    }
    
    loadStats();
    loadPopularity();
    loadDeviceStats();
  </script>
  <script src="nav-control.js"></script>
</body>
