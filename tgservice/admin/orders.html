<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>订单管理 - 天宫国际</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: 'PingFang SC', sans-serif; color: #fff; display: flex; min-height: 100vh; }
    .sidebar { width: 220px; background: rgba(20,20,30,0.8); border-right: 1px solid rgba(218,165,32,0.1); padding: 20px 0; }
    .sidebar-logo { padding: 0 20px 30px; display: flex; align-items: flex-start; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
    .sidebar-logo img { width: 32px; height: 32px; filter: sepia(60%) saturate(200%) hue-rotate(10deg); }
    .sidebar-title { font-size: 16px; color: #d4af37; }
    .sidebar-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
    
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; transition: all 0.2s; }
    .nav-item:hover, .nav-item.active { background: rgba(212,175,55,0.1); color: #d4af37; }
    .main { flex: 1; padding: 20px; overflow-y: auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .page-title { font-size: 22px; display: flex; align-items: center; gap: 12px; }
    
    /* 警示灯 */
    .alert-light { 
      width: 16px; height: 16px; border-radius: 50%; 
      background: rgba(255,255,255,0.2); 
      transition: all 0.3s; 
      cursor: pointer;
    }
    .alert-light.active { 
      background: #e74c3c; 
      box-shadow: 0 0 20px #e74c3c, 0 0 40px #e74c3c;
      animation: pulse 1s infinite;
    }
    
    /* 音频状态提示 */
    .audio-hint { 
      font-size: 12px; 
      color: #e74c3c; 
      margin-left: 8px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .audio-icon { 
      font-size: 16px; 
      margin-left: 8px; 
      cursor: pointer;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .filter-bar { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: rgba(255,255,255,0.6); font-size: 13px; cursor: pointer; }
    .filter-btn.active { background: rgba(212,175,55,0.2); border-color: #d4af37; color: #d4af37; }
    .order-count { font-size: 13px; color: rgba(255,255,255,0.5); margin-left: auto; }
    
    /* 卡片网格 */
    .order-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    @media (max-width: 900px) { .order-grid { grid-template-columns: 1fr; } }
    
    /* 订单卡片 */
    .order-card { 
      background: rgba(20,20,30,0.8); 
      border: 1px solid rgba(218,165,32,0.15); 
      border-radius: 12px; 
      padding: 16px; 
      transition: all 0.2s;
    }
    .order-card:hover { border-color: rgba(218,165,32,0.3); }
    .order-card.new { border-color: #e74c3c; animation: highlight 2s ease-out; }
    @keyframes highlight {
      0% { background: rgba(231,76,60,0.2); }
      100% { background: rgba(20,20,30,0.8); }
    }
    
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .order-time { font-size: 18px; font-weight: 600; color: #d4af37; }
    .order-table { font-size: 18px; color: #fff; background: rgba(212,175,55,0.15); padding: 6px 14px; border-radius: 6px; font-weight: 500; }
    
    .card-items { margin-bottom: 16px; min-height: 60px; }
    .item-row { display: flex; align-items: center; padding: 8px 0; font-size: 16px; gap: 10px; }
    .item-img { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: rgba(255,255,255,0.1); flex-shrink: 0; }
    .item-info { flex: 1; display: flex; justify-content: space-between; align-items: center; }
    .item-name { color: rgba(255,255,255,0.9); font-weight: 500; }
    .item-qty { color: #d4af37; font-weight: 600; }
    
    /* 类别分组样式 */
    .category-group { margin-bottom: 8px; }
    .category-title { font-size: 13px; color: rgba(212,175,55,0.8); padding: 4px 0; border-bottom: 1px dashed rgba(218,165,32,0.2); margin-bottom: 4px; }
    .category-items { }
    
    .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05); }
    .order-total { font-size: 16px; font-weight: 600; }
    .btn-group { display: flex; gap: 20px; }
    
    .btn { padding: 10px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
    .btn-complete { background: #2ecc71; color: #fff; font-weight: 600; min-width: 100px; }
    .btn-complete:hover { background: #27ae60; }
    .btn-cancel { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); font-size: 12px; padding: 8px 12px; }
    .btn-cancel:hover { background: rgba(231,76,60,0.2); color: #e74c3c; }
    
    .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; }
    .badge-pending { background: rgba(241,196,15,0.2); color: #f1c40f; }
    .badge-done { background: rgba(46,204,113,0.2); color: #2ecc71; }
    .badge-cancel { background: rgba(231,76,60,0.2); color: #e74c3c; }
    
    /* 新订单弹窗 */
    .new-order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
    .new-order-modal.show { display: flex; }
    .new-order-content { background: rgba(30,30,40,0.98); border-radius: 16px; padding: 24px; width: 90%; max-width: 400px; border: 2px solid #e74c3c; }
    .new-order-title { font-size: 18px; color: #e74c3c; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .new-order-body { margin-bottom: 20px; }
    .new-order-btn { width: 100%; padding: 12px; background: #d4af37; color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    
    .empty-tip { text-align: center; color: rgba(255,255,255,0.3); padding: 60px 20px; font-size: 14px; }
    
    .toast { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 8px; z-index: 1002; display: none; border: 1px solid rgba(218,165,32,0.3); }
    .toast.show { display: block; }
  
    /* 折叠菜单 */
    .nav-group { border-bottom: 1px solid rgba(255,255,255,0.03); }
    .nav-group-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      color: rgba(255,255,255,0.6);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-group-title:hover { background: rgba(212,175,55,0.05); color: rgba(255,255,255,0.8); }
    .nav-group-title .arrow { transition: transform 0.2s; font-size: 12px; }
    .nav-group.open .nav-group-title .arrow { transform: rotate(180deg); }
    .nav-group-title .group-icon { font-size: 18px; margin-right: 12px; }
    .nav-group-title .group-text { flex: 1; }
    
    .nav-submenu { display: none; background: rgba(0,0,0,0.2); }
    .nav-group.open .nav-submenu { display: block; }
    .nav-submenu .nav-item { padding-left: 48px; font-size: 13px; }
</style>
</head>
<body>

  <div class="main">
    <div class="page-header">
      <div class="page-title">
        订单管理
        <div class="alert-light" id="alertLight" title="有待处理订单" onclick="initAudio()"></div>
        <span class="audio-hint" id="audioHint" onclick="initAudio()">请点击警报灯启动警报音</span>
        <span class="audio-icon" id="audioIcon" style="display:none" title="警报音已启动">🔊</span>
      </div>
    </div>
    
    <div class="filter-bar">
      <button class="filter-btn" data-status="待处理">待处理</button>
      <button class="filter-btn" data-status="全部">全部</button>
      <button class="filter-btn" data-status="已完成">已完成</button>
      <button class="filter-btn" data-status="已取消">已取消</button>
      <span class="order-count" id="orderCount"></span>
    </div>
    
    <div class="order-grid" id="orderGrid"></div>
  </div>
  
  <!-- 订单详情弹窗 -->
  <div class="modal" id="orderDetailModal">
    <div class="modal-content" style="max-width: 600px;">
      <div class="modal-title">订单详情</div>
      <div id="orderDetailBody"></div>
      <div class="modal-actions">
        <button class="btn btn-primary" onclick="closeOrderDetailModal()">关闭</button>
      </div>
    </div>
  </div>
  
  <!-- 新订单弹窗 -->
  <div class="new-order-modal" id="newOrderModal">
    <div class="new-order-content">
      <div class="new-order-title">🔴 新订单提醒</div>
      <div class="new-order-body" id="newOrderBody"></div>
      <button class="new-order-btn" onclick="closeNewOrderModal()">我知道了</button>
    </div>
  </div>
  
  <div class="toast" id="toast"></div>
  
  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'login.html';
    
    let orders = [];
    let currentFilter = '待处理';
    let lastOrderCount = 0;
    let checkInterval = null;
    
    async function api(url, options = {}) {
      options.headers = { ...options.headers, 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }
      return res.json();
    }
    
    function showToast(msg) { 
      const t = document.getElementById('toast'); 
      t.textContent = msg; 
      t.classList.add('show'); 
      setTimeout(() => t.classList.remove('show'), 3000); 
    }
    
    // 格式化时间：3-15 19:07
    function formatTime(timeStr) {
      if (!timeStr) return '-';
      const d = new Date(timeStr + ' UTC');
      return `${d.getMonth()+1}-${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    
    // 设置筛选
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.status;
        renderOrders();
      });
    });
    // 默认选中"待处理"
    document.querySelector('.filter-btn[data-status="待处理"]').classList.add('active');
    
    async function loadOrders() {
      orders = await api('/api/admin/orders');
      renderOrders();
      checkAlert();
    }
    
    function renderOrders() {
      let filtered = currentFilter === '全部' ? orders : orders.filter(o => o.status === currentFilter);
      filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      
      const pendingCount = orders.filter(o => o.status === '待处理').length;
      document.getElementById('orderCount').textContent = `待处理: ${pendingCount} 单`;
      
      // 警示灯
      const alertLight = document.getElementById('alertLight');
      if (pendingCount > 0) {
        alertLight.classList.add('active');
        alertLight.title = `有 ${pendingCount} 个待处理订单`;
      } else {
        alertLight.classList.remove('active');
        alertLight.title = '暂无待处理订单';
      }
      
      if (filtered.length === 0) {
        document.getElementById('orderGrid').innerHTML = '<div class="empty-tip">暂无订单</div>';
        return;
      }
      
      document.getElementById('orderGrid').innerHTML = filtered.map(o => {
        const items = o.items || [];
        const statusClass = o.status === '待处理' ? 'pending' : o.status === '已完成' ? 'done' : 'cancel';
        const canOperate = o.status === '待处理';
        // 截取设备指纹前8位显示
        const fpShort = o.device_fingerprint ? o.device_fingerprint.substring(0, 8) : '-';
        
        // 按类别分组商品
        const categoryMap = {};
        items.forEach(item => {
          const cat = item.category || '其他';
          if (!categoryMap[cat]) categoryMap[cat] = [];
          categoryMap[cat].push(item);
        });
        
        // 生成按类别分组的商品HTML
        const categoryOrder = ['酒水', '小吃', '饮料', '茶水', '其他'];
        const sortedCategories = Object.keys(categoryMap).sort((a, b) => {
          const ia = categoryOrder.indexOf(a);
          const ib = categoryOrder.indexOf(b);
          if (ia === -1 && ib === -1) return a.localeCompare(b);
          if (ia === -1) return 1;
          if (ib === -1) return -1;
          return ia - ib;
        });
        
        const itemsHtml = sortedCategories.map(cat => `
          <div class="category-group">
            <div class="category-title">📁 ${cat}</div>
            <div class="category-items">
              ${categoryMap[cat].map(i => `
                <div class="item-row">
                  <img class="item-img" src="${i.image_url || '/images/default-product.png'}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%20viewBox=%220%200%2040%2040%22><rect fill=%22%23333%22 width=%2240%22 height=%2240%22/><text x=%2220%22 y=%2225%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2212%22>暂无</text></svg>'" alt="${i.name}">
                  <div class="item-info">
                    <span class="item-name">${i.name}</span>
                    <span class="item-qty">x${i.quantity}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `).join('');
        
        return `
          <div class="order-card ${o.isNew ? 'new' : ''}" data-id="${o.id}">
            <div class="card-header">
              <span class="order-time">${formatTime(o.created_at)}</span>
              <span class="order-table">${o.table_no || '未指定'}</span>
            </div>
            <div class="card-items">
              ${itemsHtml}
            </div>
            <div class="card-footer">
              <div>
                <span class="order-total">¥${o.total_price || 0}</span>
                <span style="font-size:11px;color:rgba(255,255,255,0.4);margin-left:8px;cursor:pointer;" onclick="showOrderDetail(${o.id})" title="点击查看详情">设备:${fpShort}</span>
              </div>
              ${canOperate ? `
                <div class="btn-group">
                  <button class="btn btn-cancel" onclick="updateStatus(${o.id}, '已取消')">取消</button>
                  <button class="btn btn-complete" onclick="updateStatus(${o.id}, '已完成')">完成</button>
                </div>
              ` : `<span class="badge badge-${statusClass}">${o.status}</span>`}
            </div>
          </div>
        `;
      }).join('');
    }
    
    // 显示订单详情
    function showOrderDetail(id) {
      const order = orders.find(o => o.id === id);
      if (!order) return;
      
      const items = order.items || [];
      const body = document.getElementById('orderDetailBody');
      body.innerHTML = `
        <div style="display:grid;gap:12px;">
          <div style="display:flex;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;">
            <span style="color:rgba(255,255,255,0.6);">订单号</span>
            <span>${order.order_no || '-'}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;">
            <span style="color:rgba(255,255,255,0.6);">台桌号</span>
            <span>${order.table_no || '-'}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;">
            <span style="color:rgba(255,255,255,0.6);">状态</span>
            <span class="badge badge-${order.status === '待处理' ? 'pending' : order.status === '已完成' ? 'done' : 'cancel'}">${order.status}</span>
          </div>
          <div style="display:flex;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;">
            <span style="color:rgba(255,255,255,0.6);">设备指纹</span>
            <span style="font-family:monospace;cursor:pointer;" onclick="copyToClipboard('${order.device_fingerprint || ''}')" title="点击复制">${order.device_fingerprint || '-'}</span>
          </div>
          <div style="padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;">
            <div style="color:rgba(255,255,255,0.6);margin-bottom:8px;">商品明细</div>
            ${items.map(i => `
              <div style="display:flex;align-items:center;padding:6px 0;gap:10px;">
                <img src="${i.image_url || '/images/default-product.png'}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%20viewBox=%220%200%2040%2040%22><rect fill=%22%23333%22 width=%2240%22 height=%2240%22/><text x=%2220%22 y=%2225%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2212%22>暂无</text></svg>'" style="width:36px;height:36px;border-radius:6px;object-fit:cover;background:rgba(255,255,255,0.1);">
                <span style="flex:1;">${i.name}</span>
                <span>x${i.quantity} = ¥${(i.price * i.quantity).toFixed(0)}</span>
              </div>
            `).join('')}
            <div style="display:flex;justify-content:space-between;padding-top:8px;margin-top:8px;border-top:1px solid rgba(255,255,255,0.1);font-weight:600;">
              <span>合计</span>
              <span style="color:#d4af37;">¥${order.total_price || 0}</span>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;padding:12px;background:rgba(255,255,255,0.05);border-radius:8px;">
            <span style="color:rgba(255,255,255,0.6);">下单时间</span>
            <span>${order.created_at || '-'}</span>
          </div>
        </div>
      `;
      document.getElementById('orderDetailModal').classList.add('show');
    }
    
    function closeOrderDetailModal() {
      document.getElementById('orderDetailModal').classList.remove('show');
    }
    
    // 复制到剪贴板
    function copyToClipboard(text) {
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制: ' + text);
      }).catch(() => {
        showToast('复制失败');
      });
    }
    
    async function updateStatus(id, status) {
      if (!confirm(`确定${status === '已完成' ? '完成' : '取消'}该订单吗？`)) return;
      
      try {
        const endpoint = status === '已完成' ? 'complete' : 'cancel';
        await api(`/api/admin/orders/${id}/${endpoint}`, { method: 'POST' });
        showToast(`订单已${status === '已完成' ? '完成' : '取消'}`);
        await loadOrders();
      } catch (err) {
        showToast('操作失败');
      }
    }
    
    // 检测新订单
    async function checkNewOrders() {
      const newOrders = await api('/api/admin/orders');
      const newPending = newOrders.filter(o => o.status === '待处理');
      const oldPending = orders.filter(o => o.status === '待处理');
      
      // 找出新增的订单
      const newIds = newPending.map(o => o.id);
      const oldIds = oldPending.map(o => o.id);
      const addedIds = newIds.filter(id => !oldIds.includes(id));
      
      if (addedIds.length > 0) {
        // 有新订单
        const newOrderList = newPending.filter(o => addedIds.includes(o.id));
        showNewOrderAlert(newOrderList);
        
        // 自动切换到待处理筛选
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('.filter-btn[data-status="待处理"]').classList.add('active');
        currentFilter = '待处理';
        
        orders = newOrders;
        // 标记新订单
        orders.forEach(o => { if (addedIds.includes(o.id)) o.isNew = true; });
        renderOrders();
        checkAlert(); // 检查并启动报警音
      } else {
        orders = newOrders;
        renderOrders();
        checkAlert(); // 检查报警状态
      }
    }
    
    function showNewOrderAlert(newOrders) {
      const body = document.getElementById('newOrderBody');
      body.innerHTML = newOrders.map(o => {
        const items = o.items || [];
        return `
          <div style="background:rgba(255,255,255,0.05);padding:12px;border-radius:8px;margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
              <span style="color:#d4af37;font-weight:600;">${formatTime(o.created_at)}</span>
              <span style="background:rgba(212,175,55,0.2);padding:2px 8px;border-radius:4px;">${o.table_no || '未指定'}</span>
            </div>
            ${items.map(i => `
              <div style="display:flex;align-items:center;padding:4px 0;gap:8px;">
                <img src="${i.image_url || '/images/default-product.png'}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%20viewBox=%220%200%2036%2036%22><rect fill=%22%23333%22 width=%2236%22 height=%2236%22/><text x=%2218%22 y=%2222%22 text-anchor=%22middle%22 fill=%22%23666%22 font-size=%2210%22>暂无</text></svg>'" style="width:28px;height:28px;border-radius:4px;object-fit:cover;background:rgba(255,255,255,0.1);">
                <span style="flex:1;">${i.name}</span>
                <span>x${i.quantity}</span>
              </div>
            `).join('')}
            <div style="text-align:right;margin-top:8px;font-weight:600;">¥${o.total_price || 0}</div>
          </div>
        `;
      }).join('');
      
      document.getElementById('newOrderModal').classList.add('show');
    }
    
    function closeNewOrderModal() {
      document.getElementById('newOrderModal').classList.remove('show');
    }
    
    function checkAlert() {
      const pendingCount = orders.filter(o => o.status === '待处理').length;
      const alertLight = document.getElementById('alertLight');
      if (pendingCount > 0) {
        alertLight.classList.add('active');
        startAlertSound();
      } else {
        alertLight.classList.remove('active');
        stopAlertSound();
      }
    }
    
    // === 报警音功能 ===
    let audioContext = null;
    let alertSoundInterval = null;
    let audioInitialized = false;
    
    // 初始化音频（需要用户点击触发）
    function initAudio() {
      if (audioInitialized) return;
      
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      audioInitialized = true;
      
      // 更新UI
      document.getElementById('audioHint').style.display = 'none';
      document.getElementById('audioIcon').style.display = 'inline';
      
      console.log('音频已初始化');
      
      // 如果当前有待处理订单，立即启动报警音
      const pendingCount = orders.filter(o => o.status === '待处理').length;
      if (pendingCount > 0) {
        startAlertSound();
      }
    }
    
    // 播放报警音
    function playAlertSound() {
      if (!audioContext || !audioInitialized) return;
      
      try {
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = 800; // 800Hz
        oscillator.type = 'sine';
        gainNode.gain.value = 1.0; // 音量100%
        
        oscillator.start();
        oscillator.stop(audioContext.currentTime + 0.3); // 响0.3秒
      } catch (e) {
        console.log('播放报警音失败', e);
      }
    }
    
    // 启动报警音定时器
    function startAlertSound() {
      if (alertSoundInterval) return; // 已经在运行
      if (!audioInitialized) return; // 音频未初始化
      playAlertSound(); // 立即播放一次
      alertSoundInterval = setInterval(playAlertSound, 10000); // 每10秒播放
      console.log('报警音已启动');
    }
    
    // 停止报警音定时器
    function stopAlertSound() {
      if (alertSoundInterval) {
        clearInterval(alertSoundInterval);
        alertSoundInterval = null;
        console.log('报警音已停止');
      }
    }
    
    // 页面加载时监听点击（不再自动移除，保持可重新初始化）
    document.addEventListener('click', function onFirstClick() {
      initAudio();
    });
    
    // 初始化
    loadOrders();
    // 每60秒检测新订单
    checkInterval = setInterval(checkNewOrders, 60000);
  </script>
  <script src="nav-control.js"></script>
  <script>
    // 折叠菜单切换
    function toggleGroup(el) {
      el.parentElement.classList.toggle('open');
    }
</script>
</body>
